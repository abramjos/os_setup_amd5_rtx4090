    # =========================================================================
    # 25. FIRMWARE UPDATE PREPARATION
    #
    # Create script for manual DMCUB firmware update (Phase 2 of INSTALLATION-PROMPT).
    # This is NOT run during autoinstall — run it after first boot.
    # See COMPATIBILITY-MATRIX.md §2 for DMCUB version history.
    # =========================================================================
    - |
      cat > /target/usr/local/bin/update-dmcub-firmware.sh << 'DMCUB_SCRIPT'
      #!/bin/bash
      # DMCUB Firmware Update Script for Raphael iGPU (DCN 3.1.5)
      #
      # Current firmware from linux-firmware 20240318 loads as 0x05000F00 — CRITICALLY
      # OUTDATED, predating the July 2024 DMCUB state machine fix (Debian #1057656).
      # Previous runLog-04 reported 0x05002F00; runLog-05 shows 0x05000F00 (even older).
      # Target: >= 0.0.224.0 (post-fix), conservative: 0.0.255.0 (tag 20250305)
      #
      # Usage: sudo ./update-dmcub-firmware.sh [--dry-run]
      #
      # See: COMPATIBILITY-MATRIX.md, INSTALLATION-PROMPT.md Phase 2

      set -euo pipefail

      DRY_RUN=false
      [[ "${1:-}" == "--dry-run" ]] && DRY_RUN=true

      FIRMWARE_TAG="20250509"  # Nearest valid tag (20250305 doesn't exist)
      BACKUP_DIR="/var/log/ml-workstation-setup/backups/firmware-$(date +%Y%m%d-%H%M%S)"
      FIRMWARE_DIR="/lib/firmware/amdgpu"
      BLOBS=(
        dcn_3_1_5_dmcub
        psp_13_0_5_toc
        psp_13_0_5_ta
        psp_13_0_5_asd
        gc_10_3_6_ce
        gc_10_3_6_me
        gc_10_3_6_mec
        gc_10_3_6_mec2
        gc_10_3_6_pfp
        gc_10_3_6_rlc
        sdma_5_2_6
        vcn_3_1_2
      )

      echo "=== DMCUB Firmware Update ==="
      echo "Current DMCUB version:"
      dmesg | grep "DMUB firmware.*version" || echo "  (not found in dmesg — may need reboot)"

      echo ""
      echo "Checking current firmware files:"
      for blob in "${BLOBS[@]}"; do
        ls -la "${FIRMWARE_DIR}/${blob}".bin* 2>/dev/null || echo "  ${blob}: NOT FOUND"
      done

      if $DRY_RUN; then
        echo ""
        echo "[DRY RUN] Would download linux-firmware tag ${FIRMWARE_TAG}"
        echo "[DRY RUN] Would backup existing firmware to ${BACKUP_DIR}"
        echo "[DRY RUN] Would install new firmware and compress to .bin.zst"
        echo "[DRY RUN] Would rebuild initramfs"
        exit 0
      fi

      echo ""
      echo "Downloading linux-firmware tag ${FIRMWARE_TAG}..."
      cd /tmp
      rm -rf fw-update
      git clone --depth 1 --branch "${FIRMWARE_TAG}" \
        https://git.kernel.org/pub/scm/linux/kernel/git/firmware/linux-firmware.git fw-update

      echo "Backing up existing firmware to ${BACKUP_DIR}..."
      mkdir -p "${BACKUP_DIR}"
      for blob in "${BLOBS[@]}"; do
        cp -a "${FIRMWARE_DIR}/${blob}".bin* "${BACKUP_DIR}/" 2>/dev/null || true
      done

      echo "Installing new firmware..."
      for blob in "${BLOBS[@]}"; do
        src="/tmp/fw-update/amdgpu/${blob}.bin"
        if [ -f "$src" ]; then
          cp "$src" "${FIRMWARE_DIR}/${blob}.bin"
          # CRITICAL: Ubuntu has CONFIG_FW_LOADER_COMPRESS_ZSTD=y
          # Kernel loads .bin.zst FIRST. Must compress and remove bare .bin.
          zstd -f "${FIRMWARE_DIR}/${blob}.bin" -o "${FIRMWARE_DIR}/${blob}.bin.zst"
          rm -f "${FIRMWARE_DIR}/${blob}.bin"
          echo "  Updated: ${blob} (compressed to .bin.zst)"
        else
          echo "  SKIP: ${blob} not found in downloaded firmware"
        fi
      done

      echo "Rebuilding initramfs..."
      update-initramfs -u -k all

      echo ""
      echo "Verifying firmware in initramfs..."
      lsinitramfs /boot/initrd.img-$(uname -r) | grep dcn_3_1_5

      echo ""
      echo "=== Done. Reboot required. ==="
      echo "After reboot, verify with: dmesg | grep 'DMUB firmware.*version'"
      echo "Expected: version >= 0x0500E000 (0.0.224.0)"

      rm -rf /tmp/fw-update
      DMCUB_SCRIPT
    - chmod 0755 /target/usr/local/bin/update-dmcub-firmware.sh

    # =========================================================================
    # 26. POST-FIRST-BOOT VERIFICATION — One-shot systemd service
    #
    # Runs on first boot to capture system state and check for GPU errors.
    # Creates verification report at /var/log/ml-workstation-setup/first-boot-report.txt
    # =========================================================================
    - mkdir -p /target/var/log/ml-workstation-setup
    - |
      cat > /target/etc/systemd/system/ml-first-boot-check.service << 'FIRST_BOOT'
      [Unit]
      Description=ML Workstation First Boot Verification
      After=multi-user.target display-manager.service
      ConditionPathExists=!/var/log/ml-workstation-setup/first-boot-complete

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/ml-first-boot-check.sh
      RemainAfterExit=yes

      [Install]
      WantedBy=multi-user.target
      FIRST_BOOT
    - curtin in-target -- systemctl enable ml-first-boot-check.service

    - |
      cat > /target/usr/local/bin/ml-first-boot-check.sh << 'FIRST_BOOT_SCRIPT'
      #!/bin/bash
      # First boot verification for ML workstation
      REPORT="/var/log/ml-workstation-setup/first-boot-report.txt"

      echo "=== ML Workstation First Boot Report ===" > "$REPORT"
      echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$REPORT"
      echo "" >> "$REPORT"

      # Kernel
      echo "--- Kernel ---" >> "$REPORT"
      uname -a >> "$REPORT" 2>&1
      echo "" >> "$REPORT"

      # Boot command line
      echo "--- Boot Parameters ---" >> "$REPORT"
      cat /proc/cmdline >> "$REPORT" 2>&1
      echo "" >> "$REPORT"

      # DMUB firmware
      echo "--- DMUB Firmware ---" >> "$REPORT"
      dmesg | grep -i "DMUB\|dmcub" >> "$REPORT" 2>&1
      echo "" >> "$REPORT"

      # DRM card ordering
      echo "--- DRM Card Ordering ---" >> "$REPORT"
      for card in /sys/class/drm/card[0-9]; do
        vendor=$(cat "$card/device/vendor" 2>/dev/null || echo "N/A")
        driver=$(basename $(readlink "$card/device/driver" 2>/dev/null) 2>/dev/null || echo "N/A")
        echo "$(basename $card): vendor=$vendor driver=$driver" >> "$REPORT"
      done
      echo "" >> "$REPORT"

      # amdgpu parameters
      echo "--- amdgpu Parameters ---" >> "$REPORT"
      for param in sg_display ppfeaturemask dcdebugmask gpu_recovery reset_method seamless dc; do
        val=$(cat /sys/module/amdgpu/parameters/$param 2>/dev/null || echo "N/A")
        echo "  $param = $val" >> "$REPORT"
      done
      echo "" >> "$REPORT"

      # GPU errors
      echo "--- GPU Errors ---" >> "$REPORT"
      echo "REG_WAIT timeouts: $(dmesg | grep -c 'REG_WAIT timeout' 2>/dev/null || echo 0)" >> "$REPORT"
      echo "Ring timeouts: $(dmesg | grep -c 'ring.*timeout' 2>/dev/null || echo 0)" >> "$REPORT"
      echo "GPU resets: $(dmesg | grep -c 'GPU reset' 2>/dev/null || echo 0)" >> "$REPORT"
      echo "Xid errors: $(dmesg | grep -c 'Xid' 2>/dev/null || echo 0)" >> "$REPORT"
      echo "" >> "$REPORT"

      # Display
      echo "--- Display ---" >> "$REPORT"
      if command -v glxinfo &>/dev/null; then
        glxinfo 2>/dev/null | grep -E "OpenGL renderer|OpenGL vendor|OpenGL version" >> "$REPORT" 2>&1
      else
        echo "glxinfo not available (install mesa-utils)" >> "$REPORT"
      fi
      echo "" >> "$REPORT"

      # NVIDIA (if installed)
      echo "--- NVIDIA ---" >> "$REPORT"
      if command -v nvidia-smi &>/dev/null; then
        nvidia-smi --query-gpu=name,driver_version,display_active,display_mode,persistence_mode --format=csv >> "$REPORT" 2>&1
      else
        echo "nvidia-smi not available (NVIDIA driver not yet installed — expected at this stage)" >> "$REPORT"
      fi
      echo "" >> "$REPORT"

      # Loaded modules
      echo "--- GPU Modules ---" >> "$REPORT"
      lsmod | grep -E "amdgpu|nvidia|nouveau|simpledrm" >> "$REPORT" 2>&1
      echo "" >> "$REPORT"

      # Summary
      echo "--- Summary ---" >> "$REPORT"
      REG_WAIT=$(dmesg | grep -c 'REG_WAIT timeout' 2>/dev/null || echo 0)
      RING_TO=$(dmesg | grep -c 'ring.*timeout' 2>/dev/null || echo 0)
      GPU_RESET=$(dmesg | grep -c 'GPU reset' 2>/dev/null || echo 0)

      if [ "$REG_WAIT" -eq 0 ] && [ "$RING_TO" -eq 0 ] && [ "$GPU_RESET" -eq 0 ]; then
        echo "RESULT: CLEAN BOOT - No GPU errors detected" >> "$REPORT"
      else
        echo "RESULT: ERRORS DETECTED - Review report above" >> "$REPORT"
        echo "  REG_WAIT timeouts: $REG_WAIT" >> "$REPORT"
        echo "  Ring timeouts: $RING_TO" >> "$REPORT"
        echo "  GPU resets: $GPU_RESET" >> "$REPORT"
        echo "" >> "$REPORT"
        echo "NEXT STEPS:" >> "$REPORT"
        echo "  1. Run: sudo /usr/local/bin/update-dmcub-firmware.sh" >> "$REPORT"
        echo "  2. Reboot and check this report again" >> "$REPORT"
        echo "  3. See INSTALLATION-PROMPT.md Phase 2 for debugging" >> "$REPORT"
      fi

      # Mark first boot complete (won't run again)
      touch /var/log/ml-workstation-setup/first-boot-complete

      echo ""
      echo "First boot report saved to: $REPORT"
      cat "$REPORT"
      FIRST_BOOT_SCRIPT
    - chmod 0755 /target/usr/local/bin/ml-first-boot-check.sh

    # =========================================================================
    # 27. POST-INSTALL PHASE SCRIPTS DIRECTORY
    #
    # Create directory structure for the phased installation scripts.
    # =========================================================================
    - curtin in-target -- mkdir -p /opt/ml-workstation-setup/scripts
    - curtin in-target -- mkdir -p /opt/ml-workstation-setup/logs
    - |
      cat > /target/opt/ml-workstation-setup/README.md << 'SETUP_README'
      # ML Workstation Setup — Post-Install Phases

      This directory contains the phased installation scripts.
      The autoinstall.yaml handled Phase 0 (BIOS) and Phase 1 (OS install) + most of Phase 2.

      ## Remaining Steps After First Boot

      1. **Verify first boot:** `cat /var/log/ml-workstation-setup/first-boot-report.txt`
      2. **Update DMCUB firmware:** `sudo /usr/local/bin/update-dmcub-firmware.sh`
      3. **Reboot and verify:** Check for GPU errors in dmesg
      4. **Install NVIDIA drivers (Phase 4):**
         ```bash
         sudo apt update
         sudo apt install cuda-drivers-595 cuda-toolkit-13-0
         # NOTE: The package is "nvidia-headless-595" — NOT "nvidia-headless-595-server"
         # (the -server variant does not exist for 595 in the CUDA repo).
         ```
         After installation, enable persistence:
         ```bash
         sudo systemctl enable nvidia-persistenced.service
         sudo systemctl start nvidia-persistenced.service
         sudo systemctl enable nvidia-power-limit.service
         ```
      5. **Install ML stack:** Phase 5 scripts (PyTorch, Docker GPU, venv)
      6. **Run stability tests:** Phase 6 scripts (10-boot, stress, thermal)

      See INSTALLATION-PROMPT.md for full details on each phase.
      SETUP_README

    # =========================================================================
    # 28. COPY HARDWARE LOG from early-commands
    # =========================================================================
    - cp /tmp/autoinstall-hw.log /target/var/log/ml-workstation-setup/autoinstall-hw.log 2>/dev/null || true

    # =========================================================================
    # 29. REBUILD INITRAMFS — MUST be the LAST late-command
    #
    # Includes all modprobe.d, initramfs-tools/modules, blacklists,
    # and firmware changes from prior steps.
    # =========================================================================
    - curtin in-target -- update-initramfs -u -k all

  # ---------------------------------------------------------------------------
  # USER-DATA (cloud-init) — Additional cloud-init configuration
  # ---------------------------------------------------------------------------
  user-data:
    # Disable cloud-init after first boot (not needed for bare metal)
    runcmd:
      - systemctl disable cloud-init.service || true
      - systemctl disable cloud-config.service || true
      - systemctl disable cloud-final.service || true
    # Hostname is set by identity section — preserve it here
    preserve_hostname: true
    manage_etc_hosts: true

  # ---------------------------------------------------------------------------
  # REPORTING — Installation reporting
  # ---------------------------------------------------------------------------
  reporting:
    hook:
      type: print

  # ---------------------------------------------------------------------------
  # SHUTDOWN — Reboot after installation
  # ---------------------------------------------------------------------------
  shutdown: reboot

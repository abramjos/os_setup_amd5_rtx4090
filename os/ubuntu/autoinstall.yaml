#cloud-config
autoinstall:
  version: 1

  # ---------------------------------------------------------------------------
  # INTERACTIVITY
  # ---------------------------------------------------------------------------
  # Allow the installer to prompt for sections not fully defined here.
  # Set to false for fully unattended install.
  interactive-sections: []

  # ---------------------------------------------------------------------------
  # LOCALE & KEYBOARD
  # ---------------------------------------------------------------------------
  locale: en_US.UTF-8

  keyboard:
    layout: us
    variant: ""

  # ---------------------------------------------------------------------------
  # TIMEZONE & NTP
  # ---------------------------------------------------------------------------
  timezone: America/New_York

  # ---------------------------------------------------------------------------
  # REFRESH INSTALLER
  # ---------------------------------------------------------------------------
  refresh-installer:
    update: true
    channel: stable

  # ---------------------------------------------------------------------------
  # SOURCE — Ubuntu 24.04.4 Desktop (ships HWE 6.17 + Mesa 25.2.8)
  # ---------------------------------------------------------------------------
  source:
    id: ubuntu-desktop-minimal
    search_drivers: true

  # ---------------------------------------------------------------------------
  # KERNEL — HWE kernel (6.17) ships by default with 24.04.4 ISO
  # If using 24.04.1 ISO, this selects the HWE kernel explicitly.
  # ---------------------------------------------------------------------------
  kernel:
    package: linux-generic-hwe-24.04

  # ---------------------------------------------------------------------------
  # NETWORK — DHCP by default; edit for static IP
  # ---------------------------------------------------------------------------
  network:
    version: 2
    ethernets:
      # Primary NIC — matched by interface name to avoid CHANGE eno1 flapping
      eno1:
        dhcp4: true
        dhcp6: false
        optional: true

  # ---------------------------------------------------------------------------
  # PROXY
  # ---------------------------------------------------------------------------
  proxy: ""

  # ---------------------------------------------------------------------------
  # APT — Repositories and package mirrors
  # ---------------------------------------------------------------------------
  apt:
    preserve_sources_list: false
    primary:
      - arches: [amd64]
        uri: http://archive.ubuntu.com/ubuntu
    security:
      - arches: [amd64]
        uri: http://security.ubuntu.com/ubuntu
    # NOTE: NVIDIA CUDA and Container Toolkit repos are configured in late-commands
    # (step 10) which installs GPG keys and sources lists together. They cannot be
    # declared here because keys must be installed before apt processes sources.

  # ---------------------------------------------------------------------------
  # STORAGE — Dual-boot: preserve Windows on nvme0n1, replace existing Ubuntu
  #
  # Disk layout on nvme0n1 (2 TB, physical order):
  #   p1:  104 MB  VFAT  EFI  — Windows Boot Manager   → PRESERVE, reuse for GRUB
  #   p2:   17 MB        MSR  — Windows reserved        → PRESERVE
  #   p3:  975 GB  NTFS       — Windows C:              → PRESERVE
  #   p5: 1.02 TB  ext4       — Ubuntu 24.04.4 (old)   → DELETE, replaced below
  #   p4:  931 MB  NTFS       — Windows Recovery        → PRESERVE
  #
  # New Ubuntu partitions replace p5 (~1.02 TB free after deletion):
  #   new:   1 GB   Ubuntu EFI (/boot/efi)
  #   new:   2 GB   /boot (ext4)
  #   new:  64 GB   swap  (matches RAM for hibernate)
  #   new: 200 GB   /     (ext4, root)
  #   new: ~756 GB  /home (ext4, combined home + ML data)
  #                        ML datasets/models/docker live under /home/data/
  #                        /data → /home/data symlink added in late-commands
  # ---------------------------------------------------------------------------
  storage:
    version: 2
    config:
      # Disk — preserve GPT table; only p5 (old Ubuntu) is removed
      # serial: used instead of path so curtin finds the correct disk
      # regardless of nvme enumeration order (drives can swap nvme0/nvme1)
      - id: nvme-disk
        type: disk
        ptable: gpt
        serial: Samsung_SSD_990_PRO_2TB_S73WNJ0W206133V_1
        preserve: true
        wipe: none
        grub_device: false

      # p1: Windows Boot Manager EFI (104.86 MB VFAT) — DO NOT mount or touch
      # Ubuntu gets its own separate EFI partition (efi-part) below
      - id: efi-windows-part
        type: partition
        device: nvme-disk
        number: 1
        size: 100M
        preserve: true
        # No grub_device, no format, no mount — Windows EFI untouched

      # p2: Windows MSR (16 MiB) — preserve, no mount
      - id: msr-part
        type: partition
        device: nvme-disk
        number: 2
        size: 16M
        preserve: true

      # p3: Windows C: (908.4 GiB / 975.35 GB NTFS) — preserve, no mount
      - id: windows-part
        type: partition
        device: nvme-disk
        number: 3
        size: 975345549312
        preserve: true

      # p4: Windows Recovery (888 MiB) — physically last on disk; preserve, no mount
      # offset: sector 3905210368 * 512 — explicit so curtin v2 can locate it
      - id: winre-part
        type: partition
        device: nvme-disk
        number: 4
        size: 888M
        offset: 1999467708416
        preserve: true

      # Ubuntu EFI partition (new, 1 GB) — completely separate from Windows p1
      # offset: start of freed ubuntu-old-part space (sector 1905211392)
      - id: efi-part
        type: partition
        device: nvme-disk
        size: 1G
        offset: 975468232704
        flag: esp
        grub_device: true

      - id: efi-format
        type: format
        volume: efi-part
        fstype: fat32
        label: EFI-UBUNTU

      - id: efi-mount
        type: mount
        device: efi-format
        path: /boot/efi

      # /boot partition (new, in reclaimed space)
      - id: boot-part
        type: partition
        device: nvme-disk
        size: 2G
        offset: 976541974528

      - id: boot-format
        type: format
        volume: boot-part
        fstype: ext4
        label: BOOT

      - id: boot-mount
        type: mount
        device: boot-format
        path: /boot

      # Swap partition (64G = RAM size for hibernate support)
      - id: swap-part
        type: partition
        device: nvme-disk
        size: 64G
        offset: 978689458176

      - id: swap-format
        type: format
        volume: swap-part
        fstype: swap
        label: SWAP

      - id: swap-mount
        type: mount
        device: swap-format
        path: none

      # Root partition
      - id: root-part
        type: partition
        device: nvme-disk
        size: 200G
        offset: 1047408934912

      - id: root-format
        type: format
        volume: root-part
        fstype: ext4
        label: ROOT

      - id: root-mount
        type: mount
        device: root-format
        path: /

      # /home partition — combined with /data (~756 GB: 200 GB home + 556 GB data)
      # ML datasets, models, checkpoints etc. live under /home/data/
      # /data is symlinked → /home/data in late-commands for compatibility
      # NOTE: p4 (Windows Recovery) is preserved at end of disk; -1 fills up to it
      - id: home-part
        type: partition
        device: nvme-disk
        size: -1
        offset: 1262157299712

      - id: home-format
        type: format
        volume: home-part
        fstype: ext4
        label: HOME

      - id: home-mount
        type: mount
        device: home-format
        path: /home

  # ---------------------------------------------------------------------------
  # IDENTITY — Primary user account
  # ---------------------------------------------------------------------------
  identity:
    hostname: vortex
    realname: Abraham
    username: abraham
    password: "$6$tgmHIWX35Qendhwj$hSQ0dDsaUy2zJwnh8uRoMBEHybDjWXsmnjgi2fcECzmAZGrMfpuSDnOnTVG/uJ/G23Yf403i//i984JlbFvhy1"

  # ---------------------------------------------------------------------------
  # SSH — OpenSSH server
  # ---------------------------------------------------------------------------
  ssh:
    install-server: true
    allow-pw: true
    authorized-keys: []
    # Add your SSH public keys above, e.g.:
    # authorized-keys:
    #   - "ssh-ed25519 AAAA... user@host"

  # ---------------------------------------------------------------------------
  # DRIVERS — Third-party driver installation (NVIDIA)
  # ---------------------------------------------------------------------------
  drivers:
    install: true

  # ---------------------------------------------------------------------------
  # CODECS
  # ---------------------------------------------------------------------------
  codecs:
    install: true

  # ---------------------------------------------------------------------------
  # UPDATES — Install security updates during installation
  # ---------------------------------------------------------------------------
  updates: security

  # ---------------------------------------------------------------------------
  # PACKAGES — Core system packages installed during OS installation
  #
  # Split into logical groups:
  #   1. System essentials
  #   2. Build tools (for DKMS, kernel module compilation)
  #   3. GPU/display stack
  #   4. XFCE desktop environment (replaces GNOME — avoids Mutter crash)
  #   5. Firmware & kernel tools
  #   6. Networking & remote access
  #   7. Storage & filesystem
  #   8. Monitoring & diagnostics
  #   9. ML prerequisites (Python, venv, Docker)
  #  10. Development tools
  # ---------------------------------------------------------------------------
  packages:
    # --- 1. System essentials ---
    - ubuntu-minimal
    - ubuntu-standard
    - apt-transport-https
    - ca-certificates
    - curl
    - wget
    - gnupg
    - software-properties-common
    - lsb-release
    - unzip
    - zstd
    - pciutils
    - usbutils
    - dmidecode
    - lm-sensors
    - cpufrequtils
    - acpi
    - smartmontools
    - ethtool
    - net-tools

    # --- 2. Build tools (required for NVIDIA DKMS) ---
    - build-essential
    - dkms
    - gcc
    - g++
    - make
    - cmake
    - linux-headers-generic
    - linux-headers-generic-hwe-24.04

    # --- 3. GPU/display stack ---
    - mesa-utils
    - mesa-vulkan-drivers
    - libgl1-mesa-dri
    - libgl1
    - libglx-mesa0
    - libdrm-dev
    - libdrm-amdgpu1
    - xserver-xorg
    - xserver-xorg-core
    - xserver-xorg-video-amdgpu
    - x11-utils
    - x11-xserver-utils
    - vainfo
    - vulkan-tools
    - clinfo

    # --- 4. XFCE desktop environment ---
    # XFCE uses XRender (zero GFX ring submissions) — avoids the
    # gnome-shell ring timeout crash loop on Raphael iGPU.
    # See COMPATIBILITY-MATRIX.md §5 and INSTALLATION-PROMPT.md Phase 3.
    - xfce4
    - xfce4-goodies
    - xfce4-terminal
    - xfce4-power-manager
    - xfce4-screenshooter
    - xfce4-taskmanager
    - thunar-archive-plugin
    - lightdm
    - lightdm-gtk-greeter
    - lightdm-gtk-greeter-settings

    # --- 5. Firmware & kernel tools ---
    - linux-firmware
    - fwupd
    - initramfs-tools
    - mokutil
    - efibootmgr
    - amd64-microcode

    # --- 6. Networking & remote access ---
    - openssh-server
    - openssh-client
    - network-manager
    - firewalld
    - iptables
    - rsync
    - tmux
    - screen

    # --- 7. Storage & filesystem ---
    - nvme-cli
    - hdparm
    - parted
    - gdisk
    - lvm2
    - e2fsprogs
    - xfsprogs
    - dosfstools

    # --- 8. Monitoring & diagnostics ---
    - htop
    - nvtop
    - iotop
    - sysstat
    - dstat
    - strace
    - ltrace
    - perf-tools-unstable
    - linux-tools-generic-hwe-24.04
    - inxi

    # --- 9. ML prerequisites ---
    - python3
    - python3-pip
    - python3-venv
    - python3-dev
    - python3-setuptools
    - python3-wheel
    - python3-numpy
    - docker.io
    - docker-compose-v2

    # --- 10. Development tools ---
    - git
    - git-lfs
    - vim
    - nano
    - jq
    - tree
    - ripgrep
    - fd-find
    - bat
    - xxd
    - bc

  # ---------------------------------------------------------------------------
  # SNAPS — Minimise snap usage on ML workstation
  # ---------------------------------------------------------------------------
  snaps: []

  # ---------------------------------------------------------------------------
  # EARLY-COMMANDS — Run before installation begins
  # ---------------------------------------------------------------------------
  early-commands:
    # Log hardware info for diagnostics
    - echo "=== ML Workstation Autoinstall — $(date -u +%Y-%m-%dT%H:%M:%SZ) ===" > /tmp/autoinstall-hw.log
    - lspci -nn >> /tmp/autoinstall-hw.log 2>&1 || true
    - dmidecode -t system >> /tmp/autoinstall-hw.log 2>&1 || true
    - cat /proc/cpuinfo | head -30 >> /tmp/autoinstall-hw.log 2>&1 || true

  # ---------------------------------------------------------------------------
  # LATE-COMMANDS — Post-installation configuration (runs in chroot)
  #
  # This is the critical section. It configures:
  #   1. GRUB kernel command line (amdgpu, NVIDIA, PCIe, IOMMU params)
  #   2. modprobe.d (amdgpu.conf, nvidia.conf, blacklist-nouveau.conf)
  #   3. initramfs module load order (amdgpu FIRST for card0)
  #   4. modules-load.d GPU module ordering
  #   5. Mutter KMS thread workaround (safety net)
  #   6. Display manager configuration (LightDM + XFCE)
  #   7. Disable gpu-manager (Ubuntu auto-rewrites GPU config)
  #   8. NVIDIA repository GPG keys (for post-install driver install)
  #   9. CUDA environment variables
  #  10. systemd services (nvidia-persistenced, nvidia-power-limit)
  #  11. Xorg dual-GPU configuration
  #  12. udev rules for GPU device permissions
  #  13. XFCE compositor disable (zero GFX ring pressure)
  #  14. Power & performance tuning
  #  15. /data directory permissions
  #  16. Post-first-boot verification service
  #
  # runLog-05 fixes applied (2026-03-28):
  #   - Removed amdgpu.reset_method=1 (NOT SUPPORTED on Raphael APU)
  #   - Added amdgpu.lockup_timeout=30000 (30s vs 10s default)
  #   - Removed NVreg_RegisterPCIDriverOnEarlyBoot=1 (rejected by driver 580)
  #   - Added LightDM XFCE session default (prevent GNOME session launch)
  #   - Added GNOME session desktop file diversions
  #   - Disabled gnome-initial-setup and gnome-shell services
  # ---------------------------------------------------------------------------
  late-commands:

    # =========================================================================
    # 1. GRUB KERNEL COMMAND LINE
    #
    # Parameters rationale (see CLAUDE.md and INSTALLATION-PROMPT.md):
    #   amdgpu.sg_display=0          — Contiguous VRAM, bypass GART/TLB issues
    #   amdgpu.dcdebugmask=0x18      — Disable PSR + DCN clock gating (0x10+0x08)
    #   amdgpu.ppfeaturemask=0xfffd7fff — Disable GFXOFF (bit 15)
    #   amdgpu.gpu_recovery=1        — Enable GPU reset on hang
    #   amdgpu.seamless=1            — Force seamless boot: skip pipe teardown during
    #                                  amdgpu init (avoids optc31_disable_crtc timeout).
    #                                  Promoted from "Test" based on kernel 6.13 commit
    #                                  391cea4fff00 adding this codepath for DCN31.
    #                                  Requires HWE 6.13+ kernel to be effective.
    #                                  NOTE: runLog-05 showed optc31 timeout STILL fired
    #                                  with seamless=1. May require DMCUB firmware update
    #                                  to be fully effective on DCN 3.1.5.
    #   amdgpu.lockup_timeout=30000  — 30s ring timeout (default 10s). Gives DMCUB more
    #                                  time to complete display init before ring timeout
    #                                  fires. Addresses the 19s gap between optc31 timeout
    #                                  and first ring timeout seen in runLog-05.
    #   video=HDMI-A-1:... — REMOVED: DRM rejects user-defined modes on this connector.
    #                                  Let DRM auto-detect resolution instead.
    #   nvidia-drm.modeset=1         — NVIDIA kernel modesetting (default in 595)
    #   nvidia-drm.fbdev=1           — NVIDIA DRM framebuffer device
    #   pcie_aspm=off                — Prevent Xid 79 link loss on RTX 4090
    #   iommu=pt                     — IOMMU passthrough for GPU compute
    #   processor.max_cstate=1       — Prevent deep idle PCIe link drops
    #   amd_pstate=active            — AMD P-State EPP driver
    #   modprobe.blacklist=nouveau,nova_core
    #                                — Block open-source NVIDIA drivers (nouveau +
    #                                  nova_core from kernel 6.15+; nova_core is
    #                                  harmless on Ubuntu HWE 6.17 which doesn't ship
    #                                  the nova module, but forward-compatible)
    #   nogpumanager                 — Disable Ubuntu gpu-manager auto-rewrite
    #   initcall_blacklist=simpledrm_platform_driver_init
    #                                — Prevent simpledrm stealing card0
    #                                  (amdgpu gets card0 for display)
    #                                  Screen black until amdgpu loads (OK for workstation)
    #
    # REMOVED (runLog-05 finding):
    #   amdgpu.reset_method=1        — MODE0/BACO NOT SUPPORTED on Raphael APU.
    #                                  Kernel 6.17 explicitly logs: "Specified reset
    #                                  method:1 isn't supported, using AUTO instead."
    #                                  AUTO defaults to MODE2 on Raphael (only resets
    #                                  GFX/SDMA, not DCN). This is a hardware limitation.
    # =========================================================================
    - >-
      curtin in-target -- bash -c '
      GRUB_PARAMS="quiet splash amdgpu.sg_display=0 amdgpu.dcdebugmask=0x18 amdgpu.ppfeaturemask=0xfffd7fff amdgpu.gpu_recovery=1 amdgpu.seamless=1 amdgpu.lockup_timeout=30000 nvidia-drm.modeset=1 nvidia-drm.fbdev=1 pcie_aspm=off iommu=pt processor.max_cstate=1 amd_pstate=active modprobe.blacklist=nouveau,nova_core nogpumanager initcall_blacklist=simpledrm_platform_driver_init";
      grep -q "^GRUB_CMDLINE_LINUX_DEFAULT=" /etc/default/grub
      && sed -i "s|^GRUB_CMDLINE_LINUX_DEFAULT=.*|GRUB_CMDLINE_LINUX_DEFAULT=\"${GRUB_PARAMS}\"|" /etc/default/grub
      || echo "GRUB_CMDLINE_LINUX_DEFAULT=\"${GRUB_PARAMS}\"" >> /etc/default/grub'

    # Set GRUB timeout to 5s for kernel selection
    - curtin in-target -- bash -c 'grep -q "^GRUB_TIMEOUT=" /etc/default/grub && sed -i "s|^GRUB_TIMEOUT=.*|GRUB_TIMEOUT=5|" /etc/default/grub || echo "GRUB_TIMEOUT=5" >> /etc/default/grub'

    # Enable GRUB menu (hidden by default on Ubuntu)
    - curtin in-target -- bash -c 'grep -q "^GRUB_TIMEOUT_STYLE=" /etc/default/grub && sed -i "s|^GRUB_TIMEOUT_STYLE=.*|GRUB_TIMEOUT_STYLE=menu|" /etc/default/grub || echo "GRUB_TIMEOUT_STYLE=menu" >> /etc/default/grub'

    # Rebuild GRUB configuration
    - curtin in-target -- update-grub

    # =========================================================================
    # 2. MODPROBE.D — amdgpu.conf
    #
    # Belt-and-suspenders with GRUB params (kernel cmdline + modprobe.d).
    # See CLAUDE.md "modprobe.d Parameters" section.
    # =========================================================================
    - |
      cat > /target/etc/modprobe.d/amdgpu.conf << 'MODPROBE_AMDGPU'
      # ML Workstation: AMD Raphael iGPU (RDNA2, GC 10.3.6, DCN 3.1.5)
      # Display-only GPU — all compositing on iGPU, NVIDIA is headless compute.
      #
      # sg_display=0      : Contiguous VRAM for display FB (bypass GART scatter/gather)
      # ppfeaturemask     : Disable GFXOFF (bit 15) to prevent power gating during display ops
      # dcdebugmask=0x18  : Disable PSR + DCN clock gating (keeps OPTC registers powered)
      # gpu_recovery=1    : Enable GPU reset on ring timeout
      # lockup_timeout    : 30s ring timeout (default 10s). Gives DMCUB more time to complete
      #                     display init before ring timeout fires.
      # dc=1              : Enable Display Core (required for Raphael)
      # audio=1           : Enable HDMI/DP audio
      #
      # REMOVED: reset_method=1 — MODE0/BACO NOT SUPPORTED on Raphael APU.
      #   Kernel 6.17 logs: "Specified reset method:1 isn't supported, using AUTO instead."
      #   AUTO = MODE2 (only resets GFX/SDMA, not DCN). Hardware limitation.
      options amdgpu sg_display=0
      options amdgpu ppfeaturemask=0xfffd7fff
      options amdgpu dcdebugmask=0x18
      options amdgpu gpu_recovery=1
      options amdgpu lockup_timeout=30000
      options amdgpu dc=1
      options amdgpu audio=1
      MODPROBE_AMDGPU

    # =========================================================================
    # 3. MODPROBE.D — nvidia.conf
    #
    # NVIDIA RTX 4090 — headless CUDA/ML compute, zero display.
    # See INSTALLATION-PROMPT.md Phase 2, Step 9.
    # =========================================================================
    - |
      cat > /target/etc/modprobe.d/nvidia.conf << 'MODPROBE_NVIDIA'
      # ML Workstation: NVIDIA RTX 4090 (AD102, 24GB GDDR6X) — headless compute
      #
      # NVreg_EnableGpuFirmware=1       : REQUIRED for 580 open kernel modules (=0 breaks them)
      # NVreg_UsePageAttributeTable=1   : Better memory mapping performance
      # NVreg_InitializeSystemMemoryAllocations=0 : Skip zeroing (faster init)
      # NVreg_DynamicPowerManagement=0x02 : Fine-grained power management
      # NVreg_PreserveVideoMemoryAllocations=1 : Preserve VRAM across suspend/resume
      # NVreg_TemporaryFilePath=/var/tmp : Temp path for NVIDIA scratch files
      # NVreg_RegistryDwords="RmGpuComputeExecTimeout=0" : No timeout for long-running CUDA kernels
      # nvidia_drm modeset=1            : Kernel modesetting (default in 580, explicit for safety)
      # nvidia_drm fbdev=1              : DRM framebuffer device
      #
      # REMOVED: NVreg_RegisterPCIDriverOnEarlyBoot=1 — rejected by driver 580.126.09
      #   ("nvidia: unknown parameter 'NVreg_RegisterPCIDriverOnEarlyBoot' ignored")
      blacklist nouveau
      options nouveau modeset=0
      options nvidia NVreg_UsePageAttributeTable=1
      options nvidia NVreg_InitializeSystemMemoryAllocations=0
      options nvidia NVreg_DynamicPowerManagement=0x02
      options nvidia NVreg_EnableGpuFirmware=1
      options nvidia NVreg_PreserveVideoMemoryAllocations=1
      options nvidia NVreg_TemporaryFilePath=/var/tmp
      options nvidia NVreg_RegistryDwords="RmGpuComputeExecTimeout=0"
      options nvidia_drm modeset=1
      options nvidia_drm fbdev=1
      MODPROBE_NVIDIA

    # =========================================================================
    # 4. MODPROBE.D — blacklist-nouveau.conf
    # =========================================================================
    - |
      cat > /target/etc/modprobe.d/blacklist-nouveau.conf << 'BLACKLIST_NOUVEAU'
      # Block all open-source NVIDIA drivers — proprietary/open-kernel-module only
      # nova_core: kernel 6.15+ (Fedora) ships the nova DRM module.
      #   Ubuntu HWE 6.17 does NOT ship nova_core — this blacklist is harmless but
      #   forward-compatible for future Ubuntu kernels that may include it.
      blacklist nouveau
      blacklist nova_core
      blacklist lbm-nouveau
      alias nouveau off
      alias lbm-nouveau off
      BLACKLIST_NOUVEAU

    # =========================================================================
    # 5. INITRAMFS MODULE LOAD ORDER
    #
    # amdgpu MUST be listed first to claim card0 for display.
    # Modules listed here trigger auto-inclusion of their firmware via modinfo.
    # See INSTALLATION-PROMPT.md Phase 2, Step 11.
    # =========================================================================
    - |
      cat > /target/etc/initramfs-tools/modules << 'INITRAMFS_MODULES'
      # GPU module load order — amdgpu FIRST for card0 (display)
      amdgpu
      nvidia
      nvidia_uvm
      nvidia_modeset
      nvidia_drm
      INITRAMFS_MODULES

    # =========================================================================
    # 6. MODULES-LOAD.D — Ensure GPU modules load at boot
    # =========================================================================
    - |
      cat > /target/etc/modules-load.d/gpu.conf << 'MODULES_LOAD'
      # GPU modules — load order mirrors initramfs
      amdgpu
      nvidia
      nvidia_uvm
      nvidia_modeset
      nvidia_drm
      MODULES_LOAD

    # =========================================================================
    # 7. MUTTER KMS THREAD WORKAROUND
    #
    # Mutter 46.x creates RT-priority KMS page-flip thread that gets SIGKILL'd
    # when amdgpu takes too long on page flip. This sets normal priority.
    # Safety net even for XFCE — in case user ever switches to GNOME.
    # See COMPATIBILITY-MATRIX.md §5.
    # =========================================================================
    - |
      mkdir -p /target/etc/environment.d
      cat > /target/etc/environment.d/90-mutter-kms.conf << 'MUTTER_KMS'
      MUTTER_DEBUG_KMS_THREAD_TYPE=user
      MUTTER_KMS

    # =========================================================================
    # 8. DISPLAY MANAGER — Set LightDM + XFCE as default session
    #
    # GDM3 runs gnome-shell for the login screen, which can trigger the
    # ring timeout crash loop. LightDM is lightweight and doesn't use GL.
    #
    # CRITICAL (runLog-05 finding): Without explicitly setting the default
    # session to XFCE, LightDM may launch a GNOME session (pulled in by
    # ubuntu-desktop-minimal). runLog-05 Boot -1 showed gnome-shell,
    # gnome-initial-setup, and gnome-keyring all running — defeating the
    # entire purpose of switching to XFCE. The ring timeouts were ALL
    # triggered by Xorg running gnome-shell compositing.
    # =========================================================================
    - curtin in-target -- bash -c 'echo "/usr/sbin/lightdm" > /etc/X11/default-display-manager'
    - curtin in-target -- dpkg-reconfigure -f noninteractive lightdm || true

    # Force XFCE as the default session for LightDM greeter and autologin
    - mkdir -p /target/etc/lightdm/lightdm.conf.d
    - |
      cat > /target/etc/lightdm/lightdm.conf.d/50-xfce-session.conf << 'LIGHTDM_XFCE'
      # Force XFCE session — prevent LightDM from defaulting to GNOME
      # (runLog-05: gnome-shell ran despite XFCE packages installed, causing ring timeouts)
      [Seat:*]
      user-session=xfce
      greeter-session=lightdm-gtk-greeter
      LIGHTDM_XFCE

    # Disable GNOME session components that ubuntu-desktop-minimal pulls in
    # These cause GFX ring submissions and trigger the crash loop
    - curtin in-target -- bash -c 'rm -f /usr/share/xsessions/ubuntu.desktop 2>/dev/null || true'
    - curtin in-target -- bash -c 'rm -f /usr/share/xsessions/ubuntu-xorg.desktop 2>/dev/null || true'
    - curtin in-target -- bash -c 'dpkg-divert --rename --divert /usr/share/xsessions/gnome.desktop.disabled /usr/share/xsessions/gnome.desktop 2>/dev/null || true'
    - curtin in-target -- bash -c 'dpkg-divert --rename --divert /usr/share/xsessions/gnome-xorg.desktop.disabled /usr/share/xsessions/gnome-xorg.desktop 2>/dev/null || true'

    # =========================================================================
    # 9. DISABLE GPU-MANAGER
    #
    # Ubuntu's gpu-manager auto-rewrites GPU configuration on every boot,
    # overriding manual dual-GPU config. MUST disable.
    # See INSTALLATION-PROMPT.md Phase 1 "gpu-manager WARNING".

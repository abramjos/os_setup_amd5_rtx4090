#cloud-config
autoinstall:
  version: 1

  # ---------------------------------------------------------------------------
  # INTERACTIVITY
  # ---------------------------------------------------------------------------
  # Fully unattended install. Set to [identity] to prompt for user/password.
  interactive-sections: []

  # ---------------------------------------------------------------------------
  # LOCALE & KEYBOARD
  # ---------------------------------------------------------------------------
  locale: en_US.UTF-8

  keyboard:
    layout: us
    variant: ""

  # ---------------------------------------------------------------------------
  # TIMEZONE & NTP
  # ---------------------------------------------------------------------------
  timezone: America/New_York

  # ---------------------------------------------------------------------------
  # REFRESH INSTALLER
  # ---------------------------------------------------------------------------
  refresh-installer:
    update: true
    channel: stable

  # ---------------------------------------------------------------------------
  # SOURCE — Ubuntu 24.04.1 Desktop
  #
  # NOTE: 24.04.1 ships with kernel 6.8 GA (NOT HWE). The HWE kernel (6.17)
  # is installed explicitly via the kernel section below. This is the key
  # difference from the 24.04.4 ISO which ships HWE by default.
  #
  # Both kernels are retained for fallback:
  #   - 6.17 HWE: Primary (all 6 DCN31 patches)
  #   - 6.8 GA:   Fallback (accessible via GRUB Advanced Options)
  # ---------------------------------------------------------------------------
  source:
    id: ubuntu-desktop-minimal
    search_drivers: true

  # ---------------------------------------------------------------------------
  # KERNEL — Install HWE kernel (6.17) on top of 24.04.1's GA kernel (6.8)
  #
  # The GA 6.8 kernel remains installed as fallback. GRUB Advanced Options
  # shows both. Default boot = HWE 6.17 (has all 6 critical DCN31 patches).
  #
  # DCN31 patch coverage:
  #   6.8:  0 of 6 patches — most vulnerable to optc31 timeout
  #   6.17: 6 of 6 patches — ODM bypass, OTG state wait, DMCUB idle fix, etc.
  #
  # See COMPATIBILITY-MATRIX.md §3 for full kernel patch table.
  # ---------------------------------------------------------------------------
  kernel:
    package: linux-generic-hwe-24.04

  # ---------------------------------------------------------------------------
  # NETWORK — DHCP by default; edit for static IP
  # ---------------------------------------------------------------------------
  network:
    version: 2
    ethernets:
      # Primary NIC — matched by interface name to avoid CHANGE eno1 flapping
      eno1:
        dhcp4: true
        dhcp6: false
        optional: true

  # ---------------------------------------------------------------------------
  # PROXY
  # ---------------------------------------------------------------------------
  proxy: ""

  # ---------------------------------------------------------------------------
  # APT — Repositories and package mirrors
  # ---------------------------------------------------------------------------
  apt:
    preserve_sources_list: false
    primary:
      - arches: [amd64]
        uri: http://archive.ubuntu.com/ubuntu
    security:
      - arches: [amd64]
        uri: http://security.ubuntu.com/ubuntu
    # NVIDIA CUDA + Container Toolkit repos configured in late-commands
    # (GPG keys must be installed before apt processes sources)

  # ---------------------------------------------------------------------------
  # STORAGE — Dual-boot: preserve Windows on nvme0n1, replace existing Ubuntu
  #
  # Disk layout on nvme0n1 (2 TB, physical order):
  #   p1:  104 MB  VFAT  EFI  — Windows Boot Manager   → PRESERVE, reuse for GRUB
  #   p2:   17 MB        MSR  — Windows reserved        → PRESERVE
  #   p3:  975 GB  NTFS       — Windows C:              → PRESERVE
  #   p5: 1.02 TB  ext4       — Ubuntu 24.04.4 (old)   → DELETE, replaced below
  #   p4:  931 MB  NTFS       — Windows Recovery        → PRESERVE
  #
  # New Ubuntu partitions replace p5 (~1.02 TB free after deletion):
  #   new:   1 GB   Ubuntu EFI (/boot/efi)
  #   new:   2 GB   /boot (ext4)
  #   new:  64 GB   swap  (matches RAM for hibernate)
  #   new: 200 GB   /     (ext4, root)
  #   new: ~756 GB  /home (ext4, combined home + ML data)
  #                        ML datasets/models/docker live under /home/data/
  #                        /data → /home/data symlink added in late-commands
  # ---------------------------------------------------------------------------
  storage:
    version: 2
    config:
      # Disk — preserve GPT table; only p5 (old Ubuntu) is removed
      - id: nvme-disk
        type: disk
        ptable: gpt
        path: /dev/nvme0n1
        serial: Samsung_SSD_990_PRO_2TB_S73WNJ0W206133V_1
        preserve: true
        wipe: none
        grub_device: false

      # p1: Windows Boot Manager EFI (104.86 MB VFAT) — DO NOT mount or touch
      # Ubuntu gets its own separate EFI partition (efi-part) below
      - id: efi-windows-part
        type: partition
        device: nvme-disk
        number: 1
        size: 100M
        preserve: true
        # No grub_device, no format, no mount — Windows EFI untouched

      # p2: Windows MSR (16 MiB) — preserve, no mount
      - id: msr-part
        type: partition
        device: nvme-disk
        number: 2
        size: 16M
        preserve: true

      # p3: Windows C: (908.4 GiB / 975.35 GB NTFS) — preserve, no mount
      - id: windows-part
        type: partition
        device: nvme-disk
        number: 3
        size: 975345549312
        preserve: true

      # p4: Windows Recovery (888 MiB) — physically last on disk; preserve, no mount
      # offset: sector 3905210368 * 512 — explicit so curtin v2 can locate it
      - id: winre-part
        type: partition
        device: nvme-disk
        number: 4
        size: 888M
        offset: 1999467708416
        preserve: true

      # Ubuntu EFI partition (new, 1 GB) — completely separate from Windows p1
      # offset: start of freed ubuntu-old-part space (sector 1905211392)
      - id: efi-part
        type: partition
        device: nvme-disk
        size: 1G
        offset: 975468232704
        flag: esp
        grub_device: true

      - id: efi-format
        type: format
        volume: efi-part
        fstype: fat32
        label: EFI-UBUNTU

      - id: efi-mount
        type: mount
        device: efi-format
        path: /boot/efi

      # /boot partition (new, in reclaimed space)
      - id: boot-part
        type: partition
        device: nvme-disk
        size: 2G
        offset: 976541974528

      - id: boot-format
        type: format
        volume: boot-part
        fstype: ext4
        label: BOOT

      - id: boot-mount
        type: mount
        device: boot-format
        path: /boot

      # Swap partition (64G = RAM size for hibernate support)
      - id: swap-part
        type: partition
        device: nvme-disk
        size: 64G
        offset: 978689458176

      - id: swap-format
        type: format
        volume: swap-part
        fstype: swap
        label: SWAP

      - id: swap-mount
        type: mount
        device: swap-format
        path: none

      # Root partition
      - id: root-part
        type: partition
        device: nvme-disk
        size: 200G
        offset: 1047408934912

      - id: root-format
        type: format
        volume: root-part
        fstype: ext4
        label: ROOT

      - id: root-mount
        type: mount
        device: root-format
        path: /

      # /home partition — combined with /data (~756 GB: 200 GB home + 556 GB data)
      # ML datasets, models, checkpoints etc. live under /home/data/
      # /data is symlinked → /home/data in late-commands for compatibility
      # NOTE: p4 (Windows Recovery) is preserved at end of disk; -1 fills up to it
      - id: home-part
        type: partition
        device: nvme-disk
        size: -1
        offset: 1262157299712

      - id: home-format
        type: format
        volume: home-part
        fstype: ext4
        label: HOME

      - id: home-mount
        type: mount
        device: home-format
        path: /home

  # ---------------------------------------------------------------------------
  # IDENTITY — Primary user account
  # ---------------------------------------------------------------------------
  identity:
    hostname: vortex
    realname: Abraham
    username: abraham
    password: "$6$tgmHIWX35Qendhwj$hSQ0dDsaUy2zJwnh8uRoMBEHybDjWXsmnjgi2fcECzmAZGrMfpuSDnOnTVG/uJ/G23Yf403i//i984JlbFvhy1"

  # ---------------------------------------------------------------------------
  # SSH — OpenSSH server
  # ---------------------------------------------------------------------------
  ssh:
    install-server: true
    allow-pw: true
    authorized-keys: []
    # Add your SSH public keys above, e.g.:
    # authorized-keys:
    #   - "ssh-ed25519 AAAA... user@host"

  # ---------------------------------------------------------------------------
  # DRIVERS — Third-party driver installation (NVIDIA)
  # ---------------------------------------------------------------------------
  drivers:
    install: true

  # ---------------------------------------------------------------------------
  # CODECS
  # ---------------------------------------------------------------------------
  codecs:
    install: true

  # ---------------------------------------------------------------------------
  # UPDATES — Install security updates during installation
  # ---------------------------------------------------------------------------
  updates: security

  # ---------------------------------------------------------------------------
  # PACKAGES — Core system packages installed during OS installation
  #
  # Split into logical groups:
  #   1. System essentials
  #   2. Build tools (for DKMS, kernel module compilation)
  #   3. GPU/display stack
  #   4. XFCE desktop environment (replaces GNOME — avoids Mutter crash)
  #   5. Firmware & kernel tools
  #   6. Networking & remote access
  #   7. Storage & filesystem
  #   8. Monitoring & diagnostics
  #   9. ML prerequisites (Python, venv, Docker)
  #  10. Development tools
  # ---------------------------------------------------------------------------
  packages:
    # --- 1. System essentials ---
    - ubuntu-minimal
    - ubuntu-standard
    - apt-transport-https
    - ca-certificates
    - curl
    - wget
    - gnupg
    - software-properties-common
    - lsb-release
    - unzip
    - zstd
    - pciutils
    - usbutils
    - dmidecode
    - lm-sensors
    - cpufrequtils
    - acpi
    - smartmontools
    - ethtool
    - net-tools

    # --- 2. Build tools (required for NVIDIA DKMS) ---
    - build-essential
    - dkms
    - gcc
    - g++
    - make
    - cmake
    - linux-headers-generic
    - linux-headers-generic-hwe-24.04

    # --- 3. GPU/display stack ---
    - mesa-utils
    - mesa-vulkan-drivers
    - libgl1-mesa-dri
    - libgl1
    - libglx-mesa0
    - libdrm-dev
    - libdrm-amdgpu1
    - xserver-xorg
    - xserver-xorg-core
    - xserver-xorg-video-amdgpu
    - x11-utils
    - x11-xserver-utils
    - vainfo
    - vulkan-tools
    - clinfo

    # --- 4. XFCE desktop environment ---
    # XFCE uses XRender (zero GFX ring submissions) — avoids the gnome-shell
    # ring timeout crash loop on Raphael iGPU.
    #
    # Evidence: runLog-04 boot-13/boot-14 achieved stability with full
    # parameter set, but gnome-shell is ALWAYS the trigger process.
    # XFCE eliminates condition #2 of the crash (GFX ring pressure).
    #
    # See COMPATIBILITY-MATRIX.md §5 and INSTALLATION-PROMPT.md Phase 3.
    - xfce4
    - xfce4-goodies
    - xfce4-terminal
    - xfce4-power-manager
    - xfce4-screenshooter
    - xfce4-taskmanager
    - thunar-archive-plugin
    - lightdm
    - lightdm-gtk-greeter
    - lightdm-gtk-greeter-settings

    # --- 5. Firmware & kernel tools ---
    - linux-firmware
    - fwupd
    - initramfs-tools
    - mokutil
    - efibootmgr
    - amd64-microcode

    # --- 6. Networking & remote access ---
    - openssh-server
    - openssh-client
    - network-manager
    - firewalld
    - iptables
    - rsync
    - tmux
    - screen

    # --- 7. Storage & filesystem ---
    - nvme-cli
    - hdparm
    - parted
    - gdisk
    - lvm2
    - e2fsprogs
    - xfsprogs
    - dosfstools

    # --- 8. Monitoring & diagnostics ---
    - htop
    - nvtop
    - iotop
    - sysstat
    - dstat
    - strace
    - ltrace
    - perf-tools-unstable
    - linux-tools-generic-hwe-24.04
    - inxi

    # --- 9. ML prerequisites ---
    - python3
    - python3-pip
    - python3-venv
    - python3-dev
    - python3-setuptools
    - python3-wheel
    - python3-numpy
    - docker.io
    - docker-compose-v2

    # --- 10. Development tools ---
    - git
    - git-lfs
    - vim
    - nano
    - jq
    - tree
    - ripgrep
    - fd-find
    - bat
    - xxd
    - bc

  # ---------------------------------------------------------------------------
  # SNAPS — Minimise snap usage on ML workstation
  # ---------------------------------------------------------------------------
  snaps: []

  # ---------------------------------------------------------------------------
  # EARLY-COMMANDS — Run before installation begins
  # ---------------------------------------------------------------------------
  early-commands:
    # Log hardware info for diagnostics
    - echo "=== ML Workstation Autoinstall (stable) — $(date -u +%Y-%m-%dT%H:%M:%SZ) ===" > /tmp/autoinstall-hw.log
    - lspci -nn >> /tmp/autoinstall-hw.log 2>&1 || true
    - dmidecode -t system >> /tmp/autoinstall-hw.log 2>&1 || true
    - cat /proc/cpuinfo | head -30 >> /tmp/autoinstall-hw.log 2>&1 || true

  # ---------------------------------------------------------------------------
  # LATE-COMMANDS — Post-installation configuration (runs in chroot)
  #
  # This is the critical section. It configures:
  #   1.  GRUB kernel command line (amdgpu, NVIDIA, PCIe, IOMMU params)
  #       — VALIDATED against runLog-04 boot-13/boot-14 winning config
  #   2.  modprobe.d (amdgpu.conf, nvidia.conf, blacklist-nouveau.conf)
  #   3.  initramfs module load order (amdgpu FIRST for card0)
  #   4.  modules-load.d GPU module ordering
  #   5.  Mutter KMS thread workaround (safety net)
  #   6.  Display manager configuration (LightDM + XFCE)
  #   7.  Disable gpu-manager (Ubuntu auto-rewrites GPU config)
  #   8.  NVIDIA repository GPG keys (for post-install driver install)
  #   9.  CUDA environment variables
  #  10.  systemd services (nvidia-persistenced, nvidia-power-limit)
  #  11.  Xorg dual-GPU configuration (with ServerLayout)
  #  12.  udev rules for GPU device permissions
  #  13.  XFCE compositor disable (zero GFX ring pressure)
  #  14.  Power & performance tuning
  #  15.  /data directory permissions
  #  16.  Docker configuration (NVIDIA runtime pre-staged)
  #  17.  User groups
  #  18.  Disable unnecessary services
  #  19.  Enable required services
  #  20.  DMCUB firmware update script
  #  21.  Post-first-boot verification service
  #  22.  Post-install phase scripts directory
  #  23.  Rebuild initramfs (MUST BE LAST)
  # ---------------------------------------------------------------------------
  late-commands:

    # =========================================================================
    # 1. GRUB KERNEL COMMAND LINE
    #
    # VALIDATED AGAINST: runLog-04 boot-13 (6.8, STABLE) and boot-14
    # (6.17, STABLE). These are the ONLY two fully stable boots in the
    # 20-boot diagnostic.
    #
    # Parameters from winning config:
    #   amdgpu.sg_display=0          — Contiguous VRAM, bypass GART/TLB
    #   amdgpu.dcdebugmask=0x10      — Disable PSR, reduce DCN complexity
    #                                  (0x12 caused 9 timeouts in boot-10)
    #   amdgpu.ppfeaturemask=0xfffd7fff — Disable GFXOFF (bit 15) + STUTTER
    #                                  (Layer 2 of 3-layer GFXOFF defense)
    #   amdgpu.gfx_off=0             — Driver-level GFXOFF disable
    #                                  (Layer 3 of 3-layer GFXOFF defense)
    #                                  NOTE: kernel 6.8 may reject this with
    #                                  error -22 if placed in modprobe.d.
    #                                  GRUB cmdline ONLY.
    #   amdgpu.pg_mask=0             — Disable ALL power gating
    #                                  (stabilizes DCN by preventing gating)
    #   amdgpu.runpm=0               — Disable runtime PM, keep GPU awake
    #   amdgpu.noretry=0             — Disable page fault retry that stalls ring
    #   amdgpu.vm_fragment_size=9    — 512KB VM page fragments, reduces TLB
    #   amdgpu.seamless=0            — Force full pipe teardown during init
    #                                  (boot-13/14 used seamless=0, NOT 1)
    #   amdgpu.lockup_timeout=10000,10000,10000,10000
    #                                — Per-ring 10s timeouts (gfx/compute/
    #                                  sdma/video). Prevents premature GPU
    #                                  reset during slow DMCUB init.
    #   amdgpu.reset_method=1        — MODE0 full ASIC reset (resets ALL IP
    #                                  blocks including DCN/DCHUB). MODE2
    #                                  (default) only resets GFX/SDMA.
    #                                  UNTESTED on Raphael APU — revert to
    #                                  reset_method=3 if it causes worse hangs.
    #   amdgpu.gpu_recovery=1        — Enable GPU reset on hang
    #   nvidia-drm.modeset=1         — NVIDIA KMS (default in 595, explicit)
    #   nvidia-drm.fbdev=1           — NVIDIA DRM framebuffer device
    #   pcie_aspm=off                — Prevent Xid 79 link loss on RTX 4090
    #   iommu=pt                     — IOMMU passthrough for GPU compute
    #   processor.max_cstate=1       — Prevent deep idle PCIe link drops
    #                                  (Ryzen freeze bug with C2+/C6)
    #   amd_pstate=active            — AMD P-State EPP driver
    #   modprobe.blacklist=nouveau,nova_core
    #                                — Block open-source NVIDIA drivers
    #   nogpumanager                 — Disable Ubuntu gpu-manager auto-rewrite
    #   initcall_blacklist=simpledrm_platform_driver_init
    #                                — Prevent simpledrm stealing card0
    #                                  (amdgpu gets card0 for display)
    #                                  Screen black until amdgpu loads.
    # =========================================================================
    - >-
      curtin in-target -- sed -i
      's|^GRUB_CMDLINE_LINUX_DEFAULT=.*|GRUB_CMDLINE_LINUX_DEFAULT="quiet splash amdgpu.sg_display=0 amdgpu.dcdebugmask=0x10 amdgpu.ppfeaturemask=0xfffd7fff amdgpu.gfx_off=0 amdgpu.pg_mask=0 amdgpu.runpm=0 amdgpu.noretry=0 amdgpu.vm_fragment_size=9 amdgpu.seamless=0 amdgpu.lockup_timeout=10000,10000,10000,10000 amdgpu.reset_method=1 amdgpu.gpu_recovery=1 nvidia-drm.modeset=1 nvidia-drm.fbdev=1 pcie_aspm=off iommu=pt processor.max_cstate=1 amd_pstate=active modprobe.blacklist=nouveau,nova_core nogpumanager initcall_blacklist=simpledrm_platform_driver_init"|'
      /etc/default/grub

    # Set GRUB timeout to 5s for kernel selection (important: dual kernel)
    - curtin in-target -- bash -c 'grep -q "^GRUB_TIMEOUT=" /etc/default/grub && sed -i "s|^GRUB_TIMEOUT=.*|GRUB_TIMEOUT=5|" /etc/default/grub || echo "GRUB_TIMEOUT=5" >> /etc/default/grub'

    # Enable GRUB menu (hidden by default on Ubuntu) — needed for kernel fallback
    - curtin in-target -- bash -c 'grep -q "^GRUB_TIMEOUT_STYLE=" /etc/default/grub && sed -i "s|^GRUB_TIMEOUT_STYLE=.*|GRUB_TIMEOUT_STYLE=menu|" /etc/default/grub || echo "GRUB_TIMEOUT_STYLE=menu" >> /etc/default/grub'

    # Rebuild GRUB configuration
    - curtin in-target -- update-grub

    # =========================================================================
    # 2. MODPROBE.D — amdgpu.conf
    #
    # Belt-and-suspenders with GRUB params. Only parameters that work in
    # modprobe.d are listed here. gfx_off, dcdebugmask, and some others
    # are GRUB-ONLY on kernel 6.8 GA (error -22 if in modprobe.d).
    #
    # See setup/scripts_v3/01-first-boot-display-fix.sh lines 155-162.
    # =========================================================================
    - |
      cat > /target/etc/modprobe.d/amdgpu.conf << 'MODPROBE_AMDGPU'
      # ML Workstation: AMD Raphael iGPU (RDNA2, GC 10.3.6, DCN 3.1.5)
      # Display-only GPU — all compositing on iGPU, NVIDIA is headless compute.
      #
      # NOTE: gfx_off, dcdebugmask, pg_mask, runpm, noretry, vm_fragment_size,
      # seamless, lockup_timeout are set via GRUB cmdline ONLY. On kernel 6.8 GA
      # these cause "unknown parameter" error -22 if placed here, which cascades
      # into amdgpu probe failure. HWE 6.17 may accept them here, but GRUB is
      # authoritative and more reliable.
      #
      # Parameters validated: runLog-04 boot-13 (STABLE), boot-14 (STABLE)
      options amdgpu sg_display=0
      options amdgpu ppfeaturemask=0xfffd7fff
      options amdgpu gpu_recovery=1
      options amdgpu reset_method=1
      options amdgpu dc=1
      options amdgpu audio=1
      MODPROBE_AMDGPU

    # =========================================================================
    # 3. MODPROBE.D — nvidia.conf
    #
    # NVIDIA RTX 4090 — headless CUDA/ML compute, zero display.
    # Validated against setup/scripts_v3/02-install-nvidia-driver.sh
    # =========================================================================
    - |
      cat > /target/etc/modprobe.d/nvidia.conf << 'MODPROBE_NVIDIA'
      # ML Workstation: NVIDIA RTX 4090 (AD102, 24GB GDDR6X) — headless compute
      #
      # NVreg_EnableGpuFirmware=1       : REQUIRED for 595 open kernel modules
      # NVreg_RegisterPCIDriverOnEarlyBoot=1 : Improve PCIe init stability
      # NVreg_UsePageAttributeTable=1   : Better memory mapping performance
      # NVreg_InitializeSystemMemoryAllocations=0 : Skip zeroing (faster init)
      # NVreg_DynamicPowerManagement=0x02 : Fine-grained power management
      # NVreg_EnableResizableBar=1      : 5-15% ML performance gain (ReBAR)
      # NVreg_PreserveVideoMemoryAllocations=1 : Preserve VRAM across suspend
      # NVreg_TemporaryFilePath=/var/tmp : Temp path for suspend VRAM dump
      # RmGpuComputeExecTimeout=0       : CRITICAL — disable 2s CUDA watchdog
      blacklist nouveau
      options nouveau modeset=0
      options nvidia NVreg_RegisterPCIDriverOnEarlyBoot=1
      options nvidia NVreg_UsePageAttributeTable=1
      options nvidia NVreg_InitializeSystemMemoryAllocations=0
      options nvidia NVreg_DynamicPowerManagement=0x02
      options nvidia NVreg_EnableGpuFirmware=1
      options nvidia NVreg_EnableResizableBar=1
      options nvidia NVreg_PreserveVideoMemoryAllocations=1
      options nvidia NVreg_TemporaryFilePath=/var/tmp
      options nvidia NVreg_RegistryDwords="RmGpuComputeExecTimeout=0"
      options nvidia_drm modeset=1
      options nvidia_drm fbdev=1
      MODPROBE_NVIDIA

    # =========================================================================
    # 4. MODPROBE.D — blacklist-nouveau.conf
    # =========================================================================
    - |
      cat > /target/etc/modprobe.d/blacklist-nouveau.conf << 'BLACKLIST_NOUVEAU'
      # Block all open-source NVIDIA drivers
      # nova_core: kernel 6.15+ may ship the nova DRM module
      blacklist nouveau
      blacklist nova_core
      blacklist lbm-nouveau
      alias nouveau off
      alias lbm-nouveau off
      BLACKLIST_NOUVEAU

    # =========================================================================
    # 5. INITRAMFS MODULE LOAD ORDER
    #
    # amdgpu MUST be listed first to claim card0 for display.
    # Combined with initcall_blacklist=simpledrm_platform_driver_init,
    # this ensures amdgpu is card0 in every boot.
    #
    # Evidence: runLog-04 shows card0=NVIDIA, card1=AMD in EVERY boot
    # without this fix. This causes compositor confusion.
    # =========================================================================
    - |
      cat > /target/etc/initramfs-tools/modules << 'INITRAMFS_MODULES'
      # GPU module load order — amdgpu FIRST for card0 (display)
      amdgpu
      nvidia
      nvidia_uvm
      nvidia_modeset
      nvidia_drm
      INITRAMFS_MODULES

    # =========================================================================
    # 6. MODULES-LOAD.D — Ensure GPU modules load at boot
    # =========================================================================
    - |
      cat > /target/etc/modules-load.d/gpu.conf << 'MODULES_LOAD'
      # GPU modules — load order mirrors initramfs
      amdgpu
      nvidia
      nvidia_uvm
      nvidia_modeset
      nvidia_drm
      MODULES_LOAD

    # =========================================================================
    # 7. MUTTER KMS THREAD WORKAROUND
    #
    # Safety net even for XFCE — in case user ever switches to GNOME.
    # Mutter 46.x RT-priority KMS thread gets SIGKILL'd when amdgpu is slow.
    # =========================================================================
    - |
      mkdir -p /target/etc/environment.d
      cat > /target/etc/environment.d/90-mutter-kms.conf << 'MUTTER_KMS'
      MUTTER_DEBUG_KMS_THREAD_TYPE=user
      MUTTER_KMS

    # =========================================================================
    # 8. DISPLAY MANAGER — Set LightDM as default (instead of GDM3)
    #
    # GDM3 runs gnome-shell for the login screen, which triggers the ring
    # timeout crash loop. LightDM is lightweight and doesn't use GL.
    # Evidence: Every ring timeout in runLog-04 was triggered by gnome-shell.
    # =========================================================================
    - curtin in-target -- bash -c 'echo "/usr/sbin/lightdm" > /etc/X11/default-display-manager'
    - curtin in-target -- dpkg-reconfigure -f noninteractive lightdm || true

    # =========================================================================
    # 9. DISABLE GPU-MANAGER
    #
    # Ubuntu's gpu-manager auto-rewrites GPU configuration on every boot.
    # LP #2033157: iGPU/dGPU mix-up — NVIDIA incorrectly selected as primary.
    # =========================================================================
    - curtin in-target -- systemctl disable gpu-manager.service || true
    - curtin in-target -- systemctl mask gpu-manager.service || true

    # =========================================================================
    # 10. NVIDIA REPOSITORY GPG KEYS
    #
    # Pre-stage keys so Phase 4 (NVIDIA compute stack) can apt install
    # cuda-drivers, cuda-toolkit, nvidia-container-toolkit.
    # =========================================================================
    - |
      curtin in-target -- bash -c '
        # CUDA repository keyring
        wget -q https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb -O /tmp/cuda-keyring.deb
        dpkg -i /tmp/cuda-keyring.deb
        rm -f /tmp/cuda-keyring.deb

        # NVIDIA Container Toolkit GPG key
        curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | \
          gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
        curl -s -L https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list | \
          sed "s#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g" | \
          tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
      '

    # =========================================================================
    # 11. CUDA + GPU ENVIRONMENT VARIABLES
    #
    # Includes CUDA_DEVICE_ORDER=PCI_BUS_ID for stable GPU ordering and
    # __GLX_VENDOR_LIBRARY_NAME=mesa to force Mesa for desktop rendering.
    # Both from setup/scripts_v3/03-configure-display.sh.
    # =========================================================================
    - |
      cat > /target/etc/profile.d/cuda.sh << 'CUDA_ENV'
      # CUDA Toolkit environment — installed by Phase 4 (phase-04-nvidia.sh)
      if [ -d /usr/local/cuda ]; then
        export PATH=/usr/local/cuda/bin${PATH:+:${PATH}}
        export LD_LIBRARY_PATH=/usr/local/cuda/lib64${LD_LIBRARY_PATH:+:${LD_LIBRARY_PATH}}
      fi
      # Force CUDA to use only the NVIDIA dGPU (device 0 = RTX 4090)
      export CUDA_VISIBLE_DEVICES=0
      # Stable GPU ordering by PCI bus ID (survives reboots)
      export CUDA_DEVICE_ORDER=PCI_BUS_ID
      CUDA_ENV
    - chmod 0644 /target/etc/profile.d/cuda.sh


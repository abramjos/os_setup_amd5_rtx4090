    # =========================================================================
    # 13. XORG DUAL-GPU CONFIGURATION
    #
    # Uses ServerLayout to explicitly control GPU roles:
    #   - AMD iGPU: Primary display (Screen 0)
    #   - NVIDIA dGPU: Inactive for display, available for CUDA
    #
    # AllowNVIDIAGPUScreens is MANDATORY for CUDA to work on headless GPU.
    # (from setup/scripts_v3/03-configure-display.sh line 145)
    # =========================================================================
    - mkdir -p /target/etc/X11/xorg.conf.d

    # ServerLayout — controls which GPU does display vs compute
    - |
      cat > /target/etc/X11/xorg.conf.d/00-serverlayout.conf << 'XORG_LAYOUT'
      # ML Workstation: AMD iGPU = display, NVIDIA dGPU = headless compute
      # AllowNVIDIAGPUScreens: CRITICAL for CUDA on headless GPU
      Section "ServerLayout"
          Identifier "ML-Workstation"
          Screen 0 "Screen-amd" 0 0
          Inactive "Screen-nvidia"
          Option "AllowNVIDIAGPUScreens"
      EndSection

      Section "Screen"
          Identifier "Screen-amd"
          Device "Device-amd"
      EndSection

      Section "Screen"
          Identifier "Screen-nvidia"
          Device "Device-nvidia"
      EndSection

      Section "Device"
          Identifier "Device-amd"
          Driver "amdgpu"
          Option "TearFree" "true"
          Option "DRI" "3"
          Option "AccelMethod" "glamor"
      EndSection

      Section "Device"
          Identifier "Device-nvidia"
          Driver "nvidia"
          Option "AllowEmptyInitialConfiguration"
          Option "IgnoreDisplayDevices" "CRT"
          Option "Coolbits" "28"
      EndSection
      XORG_LAYOUT

    # OutputClass fallback — matches by driver name (works even without BusID)
    - |
      cat > /target/etc/X11/xorg.conf.d/10-amdgpu.conf << 'XORG_AMD'
      # AMD Raphael iGPU — primary display device
      Section "OutputClass"
          Identifier "AMDgpu"
          MatchDriver "amdgpu"
          Driver "amdgpu"
          Option "TearFree" "true"
          Option "DRI" "3"
          Option "VariableRefresh" "true"
          Option "AccelMethod" "glamor"
          Option "PrimaryGPU" "yes"
      EndSection
      XORG_AMD

    - |
      cat > /target/etc/X11/xorg.conf.d/20-nvidia-headless.conf << 'XORG_NVIDIA'
      # NVIDIA RTX 4090 — headless compute only, no display
      Section "OutputClass"
          Identifier "nvidia-headless"
          MatchDriver "nvidia-drm"
          Driver "nvidia"
          Option "PrimaryGPU" "no"
          Option "AllowEmptyInitialConfiguration"
      EndSection
      XORG_NVIDIA

    # =========================================================================
    # 14. UDEV RULES — GPU device permissions + GDM AMD primary
    # =========================================================================
    - |
      cat > /target/etc/udev/rules.d/61-gdm-amd-primary.rules << 'UDEV_GDM'
      # Force GDM/LightDM to use AMD iGPU (card0) for login screen
      TAG+="seat", TAG+="master-of-seat", ENV{ID_SEAT}="seat0", SUBSYSTEM=="drm", KERNEL=="card0", DRIVERS=="amdgpu"
      UDEV_GDM

    - |
      cat > /target/etc/udev/rules.d/99-gpu.rules << 'UDEV_GPU'
      # NVIDIA device nodes — accessible by 'video' and 'render' groups
      KERNEL=="nvidia[0-9]*", MODE="0666"
      KERNEL=="nvidiactl", MODE="0666"
      KERNEL=="nvidia-uvm", MODE="0666"
      KERNEL=="nvidia-uvm-tools", MODE="0666"
      KERNEL=="nvidia-modeset", MODE="0666"

      # DRM render nodes — accessible for GPU compute
      SUBSYSTEM=="drm", KERNEL=="renderD*", MODE="0666"

      # NVIDIA runtime power management (auto → 15W idle for headless)
      ACTION=="add", SUBSYSTEM=="pci", ATTR{vendor}=="0x10de", ATTR{class}=="0x030000", ATTR{power/control}="auto"
      UDEV_GPU

    # =========================================================================
    # 15. XFCE COMPOSITOR — Disable by default (zero GFX ring pressure)
    #
    # XFCE's xfwm4 compositor uses XRender (CPU-based), which is safe.
    # But disabling it entirely eliminates any possible GFX ring interaction.
    # Re-enable after stability is confirmed (Phase 6).
    # =========================================================================
    - mkdir -p /target/etc/xdg/xfce4/xfconf/xfce-perchannel-xml
    - |

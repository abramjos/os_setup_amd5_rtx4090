#cloud-config
autoinstall:
  version: 1

  # =========================================================================
  # VARIANT K-NEXT: MODERN DESKTOP v3 (Dual-Session, Zero GFX Ring, Full ML Stack,
  #   CUDA Toolkit Pre-Installed, Full CUDA Samples Validation, GPU/CPU Test Suites,
  #   ML Benchmarks, MacBook-Like UX)
  #
  # Based on Variant K (stable) with additions:
  #   - CUDA toolkit 12.6 pre-installed (cuda-toolkit-12-6, cuDNN, NCCL)
  #   - Full NVIDIA CUDA Samples build + validation (180+ samples via run_tests.py)
  #   - GPU hardware stress tests (gpu_burn, DCGM diagnostics)
  #   - ML benchmark suite (PyTorch GEMM, ResNet-50, BERT)
  #   - CUDA toolchain validation (nvcc, cuBLAS, cuDNN, cuFFT, NCCL)
  #   - CPU benchmark suite (sysbench, stress-ng, STREAM)
  #   - Master test launcher with menu-driven interface
  #   - Font/DPI scaling for 4K displays (120 DPI, 12pt fonts, 32px cursors)
  #   - MacBook-like keyboard shortcuts (Ctrl+Q, Super+Tab, Super+Shift+3/4)
  #   - Bibata cursor theme + Inter font properly installed
  #
  # WHAT'S NEW vs Variant H:
  #   - snap refresh --hold=24h subiquity in early-commands (prevents mid-install refresh)
  #   - Latest DMUB firmware: kernel.org main branch first (may get >= 0x050FF000
  #     v0.0.255.0 which may eliminate optc31 REG_WAIT), then tag 20250509 fallback
  #   - nvidia-drm.modeset=1 (KMS for DRM framebuffer — needed for nvidia-drm.fbdev=1)
  #   - nvidia-drm.fbdev=1 (NVIDIA framebuffer device for console)
  #   - amdgpu.noretry=0 added (let GPU retry faulted pages instead of killing jobs)
  #   - nvidia-graphics-drivers-kms.conf removed (conflicts with headless compute)
  #   - Expanded USB search paths (6 paths: /cdrom /media/cdrom /mnt/usb
  #     /isodevice /run/live/medium /run/mnt/ubuntu-seed)
  #   - 90-mutter-kms.conf removed (Mutter not used in XFCE/labwc)
  #   - shutdown: poweroff
  #
  # PURPOSE: The "best of all worlds" variant. Combines:
  #   - Modern XFCE (X11) from Variant F — Plank dock, Arc-Dark, compositing
  #   - labwc pixman (Wayland) from Variant D — zero GFX ring, modern Wayland
  #   - NVIDIA headless + ML stack from Variant G — Docker, CUDA, sysctl
  #   - Dual-session at LightDM, unified theme, waybar dock, wofi launcher
  #
  # ARCHITECTURE: Two desktop sessions sharing one visual identity.
  #   Users pick at LightDM login:
  #
  #   SESSION 1: "XFCE" (X11) — Safe Mode
  #     xfwm4 + XRender compositing (vblank=xpresent) = ZERO GFX ring
  #     AccelMethod "none" = ZERO GFX ring for 2D
  #     Plank dock (bottom) + XFCE panel (top)
  #     Full X11 system tray (nm-applet, blueman, etc.)
  #
  #   SESSION 2: "labwc (pixman)" (Wayland) — Modern Mode
  #     labwc + WLR_RENDERER=pixman = ZERO GFX ring
  #     waybar top bar (macOS-style) + waybar bottom dock (wlr/taskbar)
  #     wofi launcher (Spotlight-like) + mako notifications
  #     grim+slurp screenshots, cliphist clipboard history
  #
  # RISK: LOWEST for display — BOTH sessions have zero GFX ring pressure.
  #   The two-condition crash model (DCN stall + GFX pressure) is broken
  #   by eliminating GFX pressure entirely in both sessions.
  #   NVIDIA is headless compute only — no display processes.
  #
  # TEST RESULTS (runlog-K_v1, 2026-04-01):
  #   Verdict: STABLE (validated production configuration)
  #   - Kernel: 6.17.0-20-generic HWE
  #   - DMCUB: 0x05002000 loaded correctly (init count=1)
  #   - Card ordering: card0=AMD, card1=NVIDIA (correct)
  #   - 4 boots analyzed: ALL stable (0 ring timeouts, 0 GPU resets)
  #   - optc31 REG_WAIT timeout: 1 per boot at T+5.058s (expected, harmless)
  #   - NVIDIA: headless, display=Off, driver 580.126.09, 0 Xid errors
  #   - LightDM: active, XFCE session running
  #   - PCIe: RTX 4090 at Gen1 2.5GT/s (BIOS fix required — set PCIEX16_1=Gen4)
  #   ISSUES FOUND:
  #   - nvidia.conf inline comment parsed as 25 unknown parameters (FIXED)
  #   - nvidia-drm.modeset=1 in GRUB/modprobe but header says 0 (discrepancy)
  #   - ml-boot-verify.service references "Variant H" not "Variant K"
  #
  # KNOWN LIMITATIONS:
  #   1. Screen sharing broken in labwc session (pixman can't provide DMABUF
  #      for xdg-desktop-portal-wlr screencast). Use XFCE session for that.
  #   2. nm-applet tray limited on Wayland — waybar network module + nmcli.
  #   3. Plank dock X11-only — labwc uses waybar bottom dock instead.
  #   4. Thunar on labwc via XWayland — drag-and-drop may have issues.
  #   5. swaylock-effects (blur) not in repos — solid color lock screen only.
  #
  # HARDWARE:
  #   CPU: AMD Ryzen 9 7950X
  #   iGPU: AMD Raphael (GFX10.3.6, DCN 3.1.5)
  #   dGPU: NVIDIA RTX 4090 (headless compute only)
  #   MB: ASUS ROG Crosshair X670E Hero
  #   NVMe: Samsung 990 PRO 2TB
  #
  # PREREQUISITES:
  #   BIOS settings (REQUIRED):
  #     - GFXOFF = Disabled (prevents ring gfx_0.0.0 timeout on Raphael)
  #       NOTE: amdgpu.gfx_off=0 is NOT a valid module param on kernel 6.17+;
  #       BIOS is the ONLY way to disable GFXOFF.
  #     - IGFX Multi-Monitor = Enabled (keeps iGPU active alongside dGPU)
  #   Firmware: auto-downloaded during install (USB or network)
  #   Optional pre-download: script/diag-v2/prepare-firmware-usb.sh
  #
  # THEME: Arc-Dark + Papirus-Dark + Bibata-Modern-Classic + Inter font
  #   Applied identically across both sessions for a unified experience.
  # =========================================================================

  interactive-sections: []

  locale: en_US.UTF-8
  keyboard:
    layout: us
    variant: ""
  timezone: America/New_York

  refresh-installer:
    update: true
    channel: stable

  source:

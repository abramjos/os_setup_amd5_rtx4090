      UDEV_GPU

    - |
      cat > /target/etc/udev/rules.d/99-nvidia-compute.rules << 'UDEV_NVIDIA_COMPUTE'
      # Variant K-Next: NVIDIA RTX 4090 — unprivileged compute access
      KERNEL=="nvidia", RUN+="/usr/bin/nvidia-modprobe -c 0 -u"
      KERNEL=="nvidia_uvm", RUN+="/usr/bin/nvidia-modprobe -c 0 -u"
      KERNEL=="nvidia[0-9]*", MODE="0666"
      KERNEL=="nvidiactl", MODE="0666"
      KERNEL=="nvidia-uvm", MODE="0666"
      KERNEL=="nvidia-uvm-tools", MODE="0666"
      KERNEL=="nvidia-modeset", MODE="0666"
      KERNEL=="nvidia-caps/nvidia-cap*", MODE="0666"
      UDEV_NVIDIA_COMPUTE


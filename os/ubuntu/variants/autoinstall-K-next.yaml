    # =========================================================================
    - curtin in-target -- bash -c 'add-apt-repository -y ppa:ful1metal/cursor-themes && apt-get update -q && apt-get install -y bibata-cursor-theme || true'
    - curtin in-target -- bash -c 'mkdir -p /usr/local/share/fonts/inter && curl -fsSL "https://github.com/rsms/inter/releases/download/v4.0/Inter-4.0.zip" -o /tmp/inter.zip && unzip -o /tmp/inter.zip -d /tmp/inter-extract && find /tmp/inter-extract -name "*.ttf" -exec cp {} /usr/local/share/fonts/inter/ \; && fc-cache -fv && rm -rf /tmp/inter.zip /tmp/inter-extract || true'


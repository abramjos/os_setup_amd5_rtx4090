    # =========================================================================
    # 19. NVIDIA services + CUDA env (from Variant G)
    # =========================================================================
    - |
      cat > /target/etc/systemd/system/nvidia-power-limit.service << 'NVIDIA_PL'
      [Unit]
      Description=NVIDIA GPU Power Limit (auto-detect max TDP)
      After=nvidia-persistenced.service
      Wants=nvidia-persistenced.service
      ConditionPathExists=/usr/bin/nvidia-smi

      [Service]
      Type=oneshot
      ExecStart=/bin/bash -c 'MAX=$(/usr/bin/nvidia-smi --query-gpu=power.max_limit --format=csv,noheader,nounits | head -1); /usr/bin/nvidia-smi -pl ${MAX%%.*}'
      RemainAfterExit=yes

      [Install]
      WantedBy=multi-user.target
      NVIDIA_PL
    - curtin in-target -- systemctl enable nvidia-power-limit.service || true

    - |

    # =========================================================================
    # 29. CUDA TOOLKIT PRE-INSTALLATION
    #
    # Install cuda-toolkit-12-6 (NOT the cuda metapackage which pulls drivers).
    # cuda-keyring is already added in section 20. Pin Ubuntu NVIDIA driver.
    # =========================================================================
    - |
      curtin in-target -- bash -c '
        apt-get update -q
        DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
          cuda-toolkit-12-6 \
          libcudnn9-cuda-12 libcudnn9-dev-cuda-12 \
          libnccl2 libnccl-dev || true

        # Pin Ubuntu-installed nvidia driver to prevent CUDA repo from upgrading it
        apt-mark hold nvidia-driver-* nvidia-dkms-* 2>/dev/null || true

        echo "=== CUDA toolkit installation complete ===" >> /var/log/ml-workstation-setup/cuda-install.log
        dpkg -l | grep -E "cuda-toolkit|libcudnn|libnccl" >> /var/log/ml-workstation-setup/cuda-install.log 2>&1
        apt-mark showhold >> /var/log/ml-workstation-setup/cuda-install.log 2>&1
      ' || true

    # =========================================================================
    # 30. DCGM INSTALLATION (from CUDA repo, not packages list)

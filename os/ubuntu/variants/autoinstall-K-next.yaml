  snaps: []

  early-commands:
    - 'echo "=== Variant K: Modern Desktop v2 — $(date -u +%Y-%m-%dT%H:%M:%SZ) ===" > /tmp/autoinstall-hw.log'
    - lspci -nn >> /tmp/autoinstall-hw.log 2>&1 || true
    - dmidecode -t system >> /tmp/autoinstall-hw.log 2>&1 || true
    - cat /proc/cpuinfo | head -30 >> /tmp/autoinstall-hw.log 2>&1 || true
    - |
      echo "=== Autoinstall Repo Version ===" >> /tmp/autoinstall-hw.log
      GIT_COMMIT="unknown"; GIT_BRANCH="unknown"; GIT_REMOTE="unknown"; GIT_MSG="unknown"; REPODIR="not_found"
      for usbbase in /cdrom /media/cdrom /mnt/usb /isodevice /run/live/medium /run/mnt/ubuntu-seed /run/media/*; do
        CANDIDATE="${usbbase}/UbuntuAutoInstall"
        if [ -d "${CANDIDATE}/.git" ]; then
          REPODIR="$CANDIDATE"
          echo "repo: $REPODIR" >> /tmp/autoinstall-hw.log
          if command -v git >/dev/null 2>&1; then
            GIT_COMMIT=$(git -C "$REPODIR" rev-parse HEAD 2>/dev/null || echo "unknown")
            GIT_BRANCH=$(git -C "$REPODIR" rev-parse --abbrev-ref HEAD 2>/dev/null || echo "unknown")
            GIT_REMOTE=$(git -C "$REPODIR" remote get-url origin 2>/dev/null || echo "unknown")
            GIT_MSG=$(git -C "$REPODIR" log --format='%s' -1 2>/dev/null || echo "unknown")
            echo "commit: $GIT_COMMIT" >> /tmp/autoinstall-hw.log
            echo "branch: $GIT_BRANCH" >> /tmp/autoinstall-hw.log
            echo "remote: $GIT_REMOTE" >> /tmp/autoinstall-hw.log
            echo "message: $GIT_MSG" >> /tmp/autoinstall-hw.log
          else
            echo "git not in PATH; listing variants dir" >> /tmp/autoinstall-hw.log
            ls -la "$REPODIR/os/ubuntu/variants/" >> /tmp/autoinstall-hw.log 2>&1 || true
          fi
          break
        fi
      done
      printf 'variant: K\ndate: %s\ncommit: %s\nbranch: %s\nremote: %s\nmessage: %s\nusb_repo: %s\n' \
        "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$GIT_COMMIT" "$GIT_BRANCH" "$GIT_REMOTE" "$GIT_MSG" "$REPODIR" \
        > /tmp/autoinstall-version.txt
      [ "$REPODIR" = "not_found" ] && echo "WARNING: USB repo not found at any known mount point" >> /tmp/autoinstall-hw.log || true

  late-commands:

    # =========================================================================
    # 1. GRUB — Full dual-GPU + NVIDIA modesetting (from Variant G)
    # =========================================================================
    - >-
      curtin in-target -- bash -c '
      GRUB_PARAMS="quiet splash amdgpu.sg_display=0 amdgpu.dcdebugmask=0x10 amdgpu.ppfeaturemask=0xfffd7fff amdgpu.gpu_recovery=1 amdgpu.seamless=1 amdgpu.lockup_timeout=30000 amdgpu.noretry=0 nvidia-drm.modeset=1 nvidia-drm.fbdev=1 pcie_aspm=off iommu=pt processor.max_cstate=1 amd_pstate=active modprobe.blacklist=nouveau,nova_core nogpumanager initcall_blacklist=simpledrm_platform_driver_init video=efifb:off amdgpu.dc=1 amdgpu.dpm=1";
      grep -q "^GRUB_CMDLINE_LINUX_DEFAULT=" /etc/default/grub
      && sed -i "s|^GRUB_CMDLINE_LINUX_DEFAULT=.*|GRUB_CMDLINE_LINUX_DEFAULT=\"${GRUB_PARAMS}\"|" /etc/default/grub
      || echo "GRUB_CMDLINE_LINUX_DEFAULT=\"${GRUB_PARAMS}\"" >> /etc/default/grub'

    - curtin in-target -- bash -c 'grep -q "^GRUB_TIMEOUT=" /etc/default/grub && sed -i "s|^GRUB_TIMEOUT=.*|GRUB_TIMEOUT=5|" /etc/default/grub || echo "GRUB_TIMEOUT=5" >> /etc/default/grub'
    - curtin in-target -- bash -c 'grep -q "^GRUB_TIMEOUT_STYLE=" /etc/default/grub && sed -i "s|^GRUB_TIMEOUT_STYLE=.*|GRUB_TIMEOUT_STYLE=menu|" /etc/default/grub || echo "GRUB_TIMEOUT_STYLE=menu" >> /etc/default/grub'
    - curtin in-target -- update-grub

    # =========================================================================
    # 2. MODPROBE — amdgpu + nvidia with softdep ordering (from Variant G)
    # =========================================================================
    - |
      cat > /target/etc/modprobe.d/amdgpu.conf << 'MODPROBE_AMDGPU'
      # Variant K-Next: Modern Desktop — AMD iGPU for display
      options amdgpu sg_display=0
      options amdgpu ppfeaturemask=0xfffd7fff
      options amdgpu dcdebugmask=0x10
      options amdgpu gpu_recovery=1
      options amdgpu lockup_timeout=30000
      options amdgpu seamless=1
      options amdgpu dc=1
      options amdgpu audio=1
      MODPROBE_AMDGPU

    - |
      cat > /target/etc/modprobe.d/nvidia.conf << 'MODPROBE_NVIDIA'
      # Variant K-Next: NVIDIA RTX 4090 — headless compute
      softdep nvidia pre: amdgpu
      softdep nvidia_drm pre: amdgpu
      blacklist nouveau
      options nouveau modeset=0
      options nvidia NVreg_UsePageAttributeTable=1
      options nvidia NVreg_InitializeSystemMemoryAllocations=0
      options nvidia NVreg_DynamicPowerManagement=0x02
      options nvidia NVreg_EnableGpuFirmware=1
      options nvidia NVreg_PreserveVideoMemoryAllocations=1
      options nvidia NVreg_TemporaryFilePath=/var/tmp
      options nvidia NVreg_RegistryDwords="RmGpuComputeExecTimeout=0"
      # Forces NVIDIA PCI driver registration during early boot;
      # prevents NVIDIA failing to register when amdgpu loads first on dual-GPU systems
      options nvidia NVreg_RegisterPCIDriverOnEarlyBoot=1
      options nvidia_drm modeset=1
      options nvidia_drm fbdev=1
      MODPROBE_NVIDIA

    - |
      cat > /target/etc/modprobe.d/blacklist-nouveau.conf << 'BLACKLIST_NOUVEAU'
      blacklist nouveau
      blacklist nova_core
      blacklist lbm-nouveau
      alias nouveau off
      alias lbm-nouveau off
      BLACKLIST_NOUVEAU

    # =========================================================================
    # 3. INITRAMFS — amdgpu FIRST, then nvidia (from Variant G)
    # =========================================================================
    - |
      cat > /target/etc/initramfs-tools/modules << 'INITRAMFS_MODULES'
      # GPU module load order — amdgpu FIRST for card0 (display)
      amdgpu
      nvidia
      nvidia_uvm
      nvidia_modeset
      nvidia_drm
      INITRAMFS_MODULES

    - |
      cat > /target/etc/modules-load.d/gpu.conf << 'MODULES_LOAD'
      amdgpu
      nvidia
      nvidia_uvm
      nvidia_modeset
      nvidia_drm
      MODULES_LOAD

    # =========================================================================
    # 4. FIRMWARE UPDATE — kernel.org first, GitHub second, USB fallback
    # =========================================================================
    - |
      export PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      echo "=== Variant K-Next: Firmware update ===" >> /tmp/autoinstall-hw.log
      FIRMWARE_FOUND=false
      FWDEST="/target/lib/firmware/amdgpu"
      FW_TAG="20250509"
      FW_BASE_URL="https://git.kernel.org/pub/scm/linux/kernel/git/firmware/linux-firmware.git/plain"
      BLOBS="dcn_3_1_5_dmcub psp_13_0_5_toc psp_13_0_5_ta psp_13_0_5_asd gc_10_3_6_ce gc_10_3_6_me gc_10_3_6_mec gc_10_3_6_mec2 gc_10_3_6_pfp gc_10_3_6_rlc sdma_5_2_6 vcn_3_1_2"

      # --- Try kernel.org first (primary) ---
      FWDIR="/tmp/firmware-download"
      mkdir -p "$FWDIR"
      echo "Downloading from kernel.org (tag $FW_TAG)..." >> /tmp/autoinstall-hw.log
      DL_OK=0
      for blob in $BLOBS; do
        if curl -sfL -o "$FWDIR/${blob}.bin" "${FW_BASE_URL}/amdgpu/${blob}.bin?h=${FW_TAG}" 2>>/tmp/autoinstall-hw.log \
           || wget -qO "$FWDIR/${blob}.bin" "${FW_BASE_URL}/amdgpu/${blob}.bin?h=${FW_TAG}" 2>>/tmp/autoinstall-hw.log; then
          DL_OK=$((DL_OK + 1))
        fi
      done
      # Require critical DMCUB blob + majority of blobs for firmware to count as found
      if [ "$DL_OK" -ge 10 ] && [ -f "$FWDIR/dcn_3_1_5_dmcub.bin" ]; then
        FIRMWARE_FOUND=true
        echo "Source: kernel.org ($DL_OK/12 blobs, DMCUB present)" >> /tmp/autoinstall-hw.log
      elif [ "$DL_OK" -gt 0 ]; then
        echo "WARNING: kernel.org partial download ($DL_OK/12 blobs) — falling through" >> /tmp/autoinstall-hw.log
      fi

      # --- GitHub repo fallback ---
      if [ "$FIRMWARE_FOUND" = "false" ]; then
        echo "kernel.org incomplete — trying GitHub repo..." >> /tmp/autoinstall-hw.log
        GH_BASE_URL="https://raw.githubusercontent.com/abramjos/os_setup_amd5_rtx4090/master/firmware/amdgpu"
        DL_OK=0
        for blob in $BLOBS; do
          if curl -sfL -o "$FWDIR/${blob}.bin" "${GH_BASE_URL}/${blob}.bin" 2>>/tmp/autoinstall-hw.log \
             || wget -qO "$FWDIR/${blob}.bin" "${GH_BASE_URL}/${blob}.bin" 2>>/tmp/autoinstall-hw.log; then
            DL_OK=$((DL_OK + 1))
          fi
        done
        if [ "$DL_OK" -ge 10 ] && [ -f "$FWDIR/dcn_3_1_5_dmcub.bin" ]; then
          FIRMWARE_FOUND=true
          echo "Source: GitHub ($DL_OK/12 blobs, DMCUB present)" >> /tmp/autoinstall-hw.log
        elif [ "$DL_OK" -gt 0 ]; then
          echo "WARNING: GitHub partial download ($DL_OK/12 blobs) — falling through to USB" >> /tmp/autoinstall-hw.log
        fi
      fi

      # --- USB fallback (all known installer mount points) ---
      if [ "$FIRMWARE_FOUND" = "false" ]; then
        echo "Network failed — checking USB mount points..." >> /tmp/autoinstall-hw.log
        for usbpath in /cdrom /media/cdrom /mnt/usb /isodevice /run/live/medium /run/mnt/ubuntu-seed; do
          FWDIR="${usbpath}/UbuntuAutoInstall/firmware/amdgpu"
          echo "  USB check: $FWDIR" >> /tmp/autoinstall-hw.log
          if [ -d "$FWDIR" ] && ls "$FWDIR"/*.bin >/dev/null 2>&1; then
            echo "Source: USB ($FWDIR)" >> /tmp/autoinstall-hw.log
            FIRMWARE_FOUND=true
            break
          fi
        done
        [ "$FIRMWARE_FOUND" = "false" ] && echo "  USB: no firmware found at any path" >> /tmp/autoinstall-hw.log
      fi

      if [ "$FIRMWARE_FOUND" = "true" ]; then
        BACKUP="/target/var/log/ml-workstation-setup/firmware-backup"
        mkdir -p "$BACKUP"
        cp -a "$FWDEST"/dcn_3_1_5_dmcub.bin* "$BACKUP/" 2>/dev/null || true
        cp -a "$FWDEST"/psp_13_0_5_*.bin* "$BACKUP/" 2>/dev/null || true
        cp -a "$FWDEST"/gc_10_3_6_*.bin* "$BACKUP/" 2>/dev/null || true
        for blob in "$FWDIR"/*.bin; do
          [ -f "$blob" ] || continue
          bname=$(basename "$blob")
          cp "$blob" "$FWDEST/$bname"
          if zstd -f "$FWDEST/$bname" -o "$FWDEST/${bname}.zst" 2>>/tmp/autoinstall-hw.log; then
            rm -f "$FWDEST/$bname"
            echo "  Installed: $bname -> ${bname}.zst" >> /tmp/autoinstall-hw.log
          fi
        done
        ls -la "$FWDEST"/dcn_3_1_5_dmcub.bin* >> /tmp/autoinstall-hw.log 2>&1
      else
        echo "WARNING: No firmware available — zero-GFX-ring desktops still safe" >> /tmp/autoinstall-hw.log
      fi

    # =========================================================================
    # 5. LightDM — Dual-session (XFCE X11 + labwc Wayland)
    #
    # LightDM GTK greeter runs briefly on X11 (negligible GPU impact).
    # Presents BOTH /usr/share/xsessions/ AND /usr/share/wayland-sessions/.
    # Default session: XFCE (safe mode).
    # =========================================================================
    - curtin in-target -- bash -c 'echo "/usr/sbin/lightdm" > /etc/X11/default-display-manager'
    - curtin in-target -- dpkg-reconfigure -f noninteractive lightdm || true

    - mkdir -p /target/etc/lightdm/lightdm.conf.d
    - |
      cat > /target/etc/lightdm/lightdm.conf.d/50-dual-session.conf << 'LIGHTDM_DUAL'
      [Seat:*]
      user-session=xfce
      greeter-session=lightdm-gtk-greeter
      LIGHTDM_DUAL

    # Themed LightDM greeter (Arc-Dark)
    - |
      cat > /target/etc/lightdm/lightdm-gtk-greeter.conf << 'GREETER_CONF'
      [greeter]
      theme-name = Arc-Dark
      icon-theme-name = Papirus-Dark
      cursor-theme-name = Bibata-Modern-Classic
      cursor-theme-size = 32
      font-name = Inter 12
      background = #2f343f
      user-background = false
      position = 50%,center 50%,center
      xft-antialias = true
      xft-hintstyle = hintslight
      xft-rgba = rgb
      xft-dpi = 120
      panel-position = top
      clock-format = %a %d %b, %H:%M
      GREETER_CONF

    # Remove GNOME session files — both X11 and Wayland (they would crash)
    - curtin in-target -- bash -c 'rm -f /usr/share/xsessions/ubuntu.desktop 2>/dev/null || true'
    - curtin in-target -- bash -c 'rm -f /usr/share/xsessions/ubuntu-xorg.desktop 2>/dev/null || true'
    - curtin in-target -- bash -c 'dpkg-divert --rename --divert /usr/share/xsessions/gnome.desktop.disabled /usr/share/xsessions/gnome.desktop 2>/dev/null || true'
    - curtin in-target -- bash -c 'dpkg-divert --rename --divert /usr/share/xsessions/gnome-xorg.desktop.disabled /usr/share/xsessions/gnome-xorg.desktop 2>/dev/null || true'
    - curtin in-target -- bash -c 'rm -f /usr/share/wayland-sessions/gnome.desktop /usr/share/wayland-sessions/gnome-wayland.desktop /usr/share/wayland-sessions/ubuntu.desktop /usr/share/wayland-sessions/ubuntu-wayland.desktop 2>/dev/null || true'

    # =========================================================================
    # 6. labwc Wayland session .desktop file
    # =========================================================================
    - mkdir -p /target/usr/share/wayland-sessions
    - |
      cat > /target/usr/share/wayland-sessions/labwc-pixman.desktop << 'LABWC_SESSION'

    - |
      curtin in-target -- bash -c '
        DEBIAN_FRONTEND=noninteractive apt-get install -y datacenter-gpu-manager 2>/dev/null || true
      ' || true

    # =========================================================================
    # 31. CUDA SAMPLES FULL VALIDATION SCRIPT
    #
    # Builds and runs all 180+ official NVIDIA CUDA samples using the
    # run_tests.py harness. Produces categorized validation report.
    # =========================================================================
    - |
      cat > /target/opt/ml-workstation-setup/cuda-samples-full-validation.sh << 'CUDA_SAMPLES_SCRIPT'
      #!/usr/bin/env bash
      set -euo pipefail
      LOGDIR="/var/log/ml-workstation-setup"
      TIMESTAMP="$(date +%Y%m%d-%H%M%S)"
      BUILD_LOG="${LOGDIR}/cuda-samples-build-${TIMESTAMP}.log"
      RESULTS_DIR="${LOGDIR}/cuda-samples-results-${TIMESTAMP}"
      REPORT="${LOGDIR}/cuda-samples-validation-${TIMESTAMP}.log"
      SAMPLES_DIR="/opt/cuda-samples"
      mkdir -p "$LOGDIR" "$RESULTS_DIR"

      echo "============================================================="
      echo " NVIDIA CUDA SAMPLES FULL VALIDATION"
      echo " Started: $(date)"
      echo "============================================================="

      # --- Detect CUDA version ---
      if ! command -v nvcc &>/dev/null; then
        echo "ERROR: nvcc not found. Is cuda-toolkit installed?" | tee -a "$REPORT"
        exit 1
      fi
      CUDA_VER=$(nvcc --version | grep -oP 'release \K[0-9]+\.[0-9]+')
      CUDA_TAG="v${CUDA_VER}"
      echo "Detected CUDA ${CUDA_VER}, will use tag ${CUDA_TAG}"

      # --- Clone or update samples ---
      if [ ! -d "$SAMPLES_DIR/.git" ]; then
        echo "Cloning cuda-samples..."
        git clone https://github.com/NVIDIA/cuda-samples.git "$SAMPLES_DIR" 2>&1 | tail -5
      fi
      cd "$SAMPLES_DIR"
      git fetch --tags 2>/dev/null || true
      if git tag -l | grep -q "^${CUDA_TAG}$"; then
        git checkout "${CUDA_TAG}" 2>/dev/null || true
        echo "Checked out tag ${CUDA_TAG}"
      else
        echo "WARNING: Tag ${CUDA_TAG} not found, using default branch"
      fi

      # --- Install build dependencies ---
      echo "Installing build dependencies..."
      DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
        cmake freeglut3-dev libfreeimage-dev libx11-dev libgl-dev libglu-dev \
        libxi-dev libxmu-dev libopenmpi-dev 2>&1 | tail -3

      # ===================== BUILD PHASE =====================
      echo ""
      echo "========== BUILD PHASE =========="
      echo "Building ALL CUDA samples with SM 8.9 (Ada Lovelace)..."
      mkdir -p build && cd build
      set +e
      cmake .. -DCMAKE_CUDA_ARCHITECTURES=89 2>&1 | tee "$BUILD_LOG"
      make -j"$(nproc)" 2>&1 | tee -a "$BUILD_LOG"
      BUILD_EXIT=${PIPESTATUS[0]}
      set -e

      BUILD_TOTAL=$(find ../Samples -name 'CMakeLists.txt' | wc -l)
      BUILD_WARNINGS=$(grep -ci 'warning' "$BUILD_LOG" 2>/dev/null || echo 0)
      BUILD_ERRORS=$(grep -ci 'error' "$BUILD_LOG" 2>/dev/null || echo 0)
      echo "Build complete: exit=${BUILD_EXIT}, warnings=${BUILD_WARNINGS}, errors=${BUILD_ERRORS}"

      # ===================== RUN PHASE =====================
      echo ""
      echo "========== RUN PHASE =========="
      echo "Running official run_tests.py harness..."
      cd "$SAMPLES_DIR"

      RUN_ARGS=""
      if [ -f "test_args.json" ]; then
        RUN_ARGS="--config test_args.json"
      fi

      if [ -f "run_tests.py" ]; then
        python3 run_tests.py \
          --dir ./build/Samples \
          ${RUN_ARGS} \
          --output "$RESULTS_DIR" \
          --parallel 4 2>&1 | tee "${RESULTS_DIR}/run_tests_output.log" || true
      else
        echo "WARNING: run_tests.py not found — running samples manually"
        # Fallback: find and run each executable
        for exe in $(find ./build/Samples -type f -executable ! -name '*.so' ! -name 'CMake*' 2>/dev/null | sort); do
          SAMPLE_NAME=$(basename "$exe")
          echo -n "Running ${SAMPLE_NAME}... "
          timeout 120 "$exe" > "${RESULTS_DIR}/${SAMPLE_NAME}.txt" 2>&1 || true
          RC=$?
          if [ $RC -eq 0 ]; then
            echo "PASS"
          elif [ $RC -eq 124 ]; then
            echo "TIMEOUT"
          else
            echo "FAIL (rc=$RC)"
          fi
          echo "${SAMPLE_NAME}:${RC}" >> "${RESULTS_DIR}/results_summary.csv"
        done
      fi

      # ===================== VALIDATION REPORT =====================
      echo ""
      echo "========== GENERATING VALIDATION REPORT =========="

      GPU_NAME=$(nvidia-smi --query-gpu=name --format=csv,noheader 2>/dev/null | head -1 || echo "Unknown")
      DRIVER_VER=$(nvidia-smi --query-gpu=driver_version --format=csv,noheader 2>/dev/null | head -1 || echo "Unknown")
      CUDA_FULL=$(nvcc --version | grep release || echo "Unknown")
      GPU_MEM=$(nvidia-smi --query-gpu=memory.total --format=csv,noheader 2>/dev/null | head -1 || echo "Unknown")
      GPU_SM=$(nvidia-smi --query-gpu=count --format=csv,noheader 2>/dev/null | head -1 || echo "Unknown")

      cat > "$REPORT" << REPORT_HEADER

      ═══════════════════════════════════════════════════════════════
        NVIDIA CUDA SAMPLES FULL VALIDATION REPORT
        System: AMD Ryzen 9 7950X + ${GPU_NAME} (headless)
        Date: $(date)
        CUDA Toolkit: ${CUDA_FULL}
        Driver: ${DRIVER_VER}
        GPU: ${GPU_NAME}
        GPU Memory: ${GPU_MEM}
        Compute Capability: 8.9
      ═══════════════════════════════════════════════════════════════

      BUILD PHASE:
        Build exit code: ${BUILD_EXIT}
        Build warnings: ${BUILD_WARNINGS}
        Build errors: ${BUILD_ERRORS}
        Build log: ${BUILD_LOG}

      REPORT_HEADER

      # Parse results from run_tests.py output or manual CSV
      TOTAL_TESTS=0; PASSED=0; FAILED=0; SKIPPED=0
      FAIL_LIST=""

      if [ -f "${RESULTS_DIR}/results_summary.csv" ]; then
        while IFS=: read -r name rc; do
          TOTAL_TESTS=$((TOTAL_TESTS + 1))
          if [ "$rc" = "0" ]; then
            PASSED=$((PASSED + 1))
          else
            FAILED=$((FAILED + 1))
            FAIL_LIST="${FAIL_LIST}    ${name} (rc=${rc})\n"
          fi
        done < "${RESULTS_DIR}/results_summary.csv"
      elif [ -f "${RESULTS_DIR}/run_tests_output.log" ]; then
        PASSED=$(grep -c 'PASS' "${RESULTS_DIR}/run_tests_output.log" 2>/dev/null || echo 0)
        FAILED=$(grep -c 'FAIL' "${RESULTS_DIR}/run_tests_output.log" 2>/dev/null || echo 0)
        SKIPPED=$(grep -c 'SKIP\|WAIVED' "${RESULTS_DIR}/run_tests_output.log" 2>/dev/null || echo 0)
        TOTAL_TESTS=$((PASSED + FAILED + SKIPPED))
        FAIL_LIST=$(grep 'FAIL' "${RESULTS_DIR}/run_tests_output.log" 2>/dev/null | head -20 || true)
      fi

      cat >> "$REPORT" << REPORT_RUN
      RUN PHASE (from run_tests.py):
        Total tests: ${TOTAL_TESTS}
        Passed: ${PASSED}
        Failed: ${FAILED}
        Skipped: ${SKIPPED}
        Failed tests:
      $(echo -e "${FAIL_LIST}")

      REPORT_RUN

      # --- Critical checks ---
      echo "═══ CRITICAL CHECKS ═══" >> "$REPORT"

      # deviceQuery
      DQ_OUT=""
      for dq in ./build/Samples/1_Utilities/deviceQuery/deviceQuery ./build/bin/deviceQuery; do
        [ -x "$dq" ] && { DQ_OUT=$("$dq" 2>&1 || true); break; }
      done
      if echo "$DQ_OUT" | grep -q "Compute Capability.*8.9"; then
        echo "[✓] deviceQuery: Compute capability 8.9 detected" >> "$REPORT"
      else
        echo "[✗] deviceQuery: Compute capability 8.9 NOT detected" >> "$REPORT"
      fi
      if echo "$DQ_OUT" | grep -qi "24576\|24564\|24575"; then
        echo "[✓] deviceQuery: ~24GB global memory (RTX 4090)" >> "$REPORT"
      elif echo "$DQ_OUT" | grep -qi "16384\|16376\|16383"; then
        echo "[✓] deviceQuery: ~16GB global memory (4070 Ti Super)" >> "$REPORT"
      else
        MEM_LINE=$(echo "$DQ_OUT" | grep -i "global memory" | head -1)
        echo "[?] deviceQuery: Memory — ${MEM_LINE}" >> "$REPORT"
      fi
      SM_COUNT=$(echo "$DQ_OUT" | grep -oP '\((\d+)\) Multiprocessors' | grep -oP '\d+' | head -1 || true)
      if [ "$SM_COUNT" = "128" ]; then
        echo "[✓] deviceQuery: 128 multiprocessors (RTX 4090)" >> "$REPORT"
      elif [ "$SM_COUNT" = "66" ]; then
        echo "[✓] deviceQuery: 66 multiprocessors (4070 Ti Super)" >> "$REPORT"
      else
        echo "[?] deviceQuery: ${SM_COUNT:-unknown} multiprocessors" >> "$REPORT"
      fi

      # p2pBandwidthLatencyTest
      BW_OUT=""
      for bw in ./build/Samples/5_Domain_Specific/p2pBandwidthLatencyTest/p2pBandwidthLatencyTest \
                ./build/bin/p2pBandwidthLatencyTest; do
        [ -x "$bw" ] && { BW_OUT=$("$bw" 2>&1 || true); break; }
      done
      H2D_BW=$(echo "$BW_OUT" | grep -i "Host to Device" | grep -oP '[0-9]+\.[0-9]+' | head -1 || true)
      D2H_BW=$(echo "$BW_OUT" | grep -i "Device to Host" | grep -oP '[0-9]+\.[0-9]+' | head -1 || true)
      D2D_BW=$(echo "$BW_OUT" | grep -i "Device to Device" | grep -oP '[0-9]+\.[0-9]+' | head -1 || true)

      if [ -n "$H2D_BW" ]; then
        H2D_INT=${H2D_BW%.*}
        if [ "$H2D_INT" -ge 20 ] 2>/dev/null; then
          echo "[✓] p2pBandwidthLatencyTest: PCIe H2D bandwidth ${H2D_BW} GB/s (Gen4 x16)" >> "$REPORT"
        else
          echo "[✗] p2pBandwidthLatencyTest: PCIe H2D bandwidth ${H2D_BW} GB/s — BELOW EXPECTED" >> "$REPORT"
          echo "    ⚠ PCIe Gen1 detected. Fix: BIOS → Advanced → PCIEX16_1 Link Mode → Gen4 (NOT Auto)" >> "$REPORT"
        fi
      else
        echo "[?] p2pBandwidthLatencyTest: Could not parse bandwidth" >> "$REPORT"
      fi

      # Tensor Core samples
      for tc_sample in cudaTensorCoreGemm:FP16 tf32TensorCoreGemm:TF32 bf16TensorCoreGemm:BF16 immaTensorCoreGemm:INT8; do
        TC_NAME="${tc_sample%%:*}"
        TC_TYPE="${tc_sample##*:}"
        TC_FOUND=false
        for tc_path in $(find ./build/Samples -name "$TC_NAME" -type f -executable 2>/dev/null); do
          TC_RESULT=$("$tc_path" 2>&1 || true)
          if echo "$TC_RESULT" | grep -qi "pass\|result.*ok\|test.*pass\|correct"; then
            echo "[✓] ${TC_NAME}: ${TC_TYPE} Tensor Core PASS" >> "$REPORT"
          else
            echo "[✗] ${TC_NAME}: ${TC_TYPE} Tensor Core FAIL" >> "$REPORT"
          fi
          TC_FOUND=true
          break
        done
        [ "$TC_FOUND" = "false" ] && echo "[?] ${TC_NAME}: not built" >> "$REPORT"
      done

      # cuBLAS / cuFFT
      for lib_sample in simpleCUBLAS:cuBLAS simpleCUFFT:cuFFT; do
        LIB_NAME="${lib_sample%%:*}"
        LIB_TYPE="${lib_sample##*:}"
        LIB_FOUND=false
        for lib_path in $(find ./build/Samples -name "$LIB_NAME" -type f -executable 2>/dev/null); do
          LIB_RESULT=$("$lib_path" 2>&1 || true)
          if echo "$LIB_RESULT" | grep -qi "pass\|test.*pass\|completed"; then
            echo "[✓] ${LIB_NAME}: ${LIB_TYPE} operational" >> "$REPORT"
          else
            echo "[✗] ${LIB_NAME}: ${LIB_TYPE} FAIL" >> "$REPORT"
          fi
          LIB_FOUND=true
          break
        done
        [ "$LIB_FOUND" = "false" ] && echo "[?] ${LIB_NAME}: not built" >> "$REPORT"
      done

      # nbody thermal check
      NBODY_PATH=$(find ./build/Samples -name "nbody" -type f -executable 2>/dev/null | head -1)
      if [ -n "$NBODY_PATH" ] && [ -x "$NBODY_PATH" ]; then
        TEMP_BEFORE=$(nvidia-smi --query-gpu=temperature.gpu --format=csv,noheader 2>/dev/null | head -1)
        timeout 30 "$NBODY_PATH" -benchmark -numbodies=256000 > /dev/null 2>&1 || true
        TEMP_AFTER=$(nvidia-smi --query-gpu=temperature.gpu --format=csv,noheader 2>/dev/null | head -1)
        echo "[✓] nbody: Sustained compute stable (temp: ${TEMP_BEFORE}°C → ${TEMP_AFTER}°C)" >> "$REPORT"
      fi

      # PCIe bandwidth detail
      cat >> "$REPORT" << PCIE_DETAIL

      ═══ PCIe BANDWIDTH DETAIL ═══
        Host to Device:   ${H2D_BW:-N/A} GB/s (expected ~25 GB/s at Gen4 x16)
        Device to Host:   ${D2H_BW:-N/A} GB/s
        Device to Device: ${D2D_BW:-N/A} GB/s
      PCIE_DETAIL

      PCIE_SPEED=$(nvidia-smi --query-gpu=pcie.link.gen.current --format=csv,noheader 2>/dev/null | head -1 || true)
      PCIE_WIDTH=$(nvidia-smi --query-gpu=pcie.link.width.current --format=csv,noheader 2>/dev/null | head -1 || true)
      if [ "${PCIE_SPEED:-0}" -lt 4 ] 2>/dev/null; then
        cat >> "$REPORT" << PCIE_WARN
        ⚠ WARNING: RTX 4090 is at PCIe Gen${PCIE_SPEED} x${PCIE_WIDTH}. Expected Gen4 x16.
        Fix: BIOS → Advanced → PCIEX16_1 Link Mode → Gen4 (NOT Auto)
      PCIE_WARN
      else
        echo "  PCIe Gen${PCIE_SPEED} x${PCIE_WIDTH} — OK" >> "$REPORT"
      fi

      echo "" >> "$REPORT"
      echo "Results directory: ${RESULTS_DIR}" >> "$REPORT"
      echo "Build log: ${BUILD_LOG}" >> "$REPORT"
      echo "Report: ${REPORT}" >> "$REPORT"
      echo "" >> "$REPORT"
      echo "Completed: $(date)" >> "$REPORT"

      echo ""
      echo "============================================================="
      echo " VALIDATION COMPLETE"
      echo " Report: ${REPORT}"
      echo "============================================================="
      cat "$REPORT"
      CUDA_SAMPLES_SCRIPT
    - chmod 0755 /target/opt/ml-workstation-setup/cuda-samples-full-validation.sh

    # =========================================================================
    # 32. GPU HARDWARE VALIDATION SCRIPT
    #
    # gpu_burn (Tensor Core stress), DCGM diagnostics, thermal monitoring,
    # ECC error checking. Goes beyond CUDA samples.
    # =========================================================================
    - |
      cat > /target/opt/ml-workstation-setup/gpu-hardware-validation.sh << 'GPU_HW_SCRIPT'
      #!/usr/bin/env bash
      set -euo pipefail
      LOGDIR="/var/log/ml-workstation-setup"
      TIMESTAMP="$(date +%Y%m%d-%H%M%S)"
      REPORT="${LOGDIR}/gpu-hardware-validation-${TIMESTAMP}.log"
      mkdir -p "$LOGDIR"

      echo "============================================================="
      echo " GPU HARDWARE VALIDATION"
      echo " Started: $(date)"
      echo "============================================================="

      {
      echo "═══════════════════════════════════════════════════════════════"
      echo "  GPU HARDWARE VALIDATION REPORT"
      echo "  Date: $(date)"
      echo "═══════════════════════════════════════════════════════════════"

      # --- 1. Device detection ---
      echo ""
      echo "═══ TEST 1: Device Detection ═══"
      nvidia-smi 2>&1 || echo "FAIL: nvidia-smi not available"
      echo ""

      # PCIe speed check
      PCIE_SPEED=$(nvidia-smi --query-gpu=pcie.link.gen.current --format=csv,noheader 2>/dev/null | head -1 || echo "?")
      PCIE_WIDTH=$(nvidia-smi --query-gpu=pcie.link.width.current --format=csv,noheader 2>/dev/null | head -1 || echo "?")
      if [ "${PCIE_SPEED:-0}" -lt 4 ] 2>/dev/null; then
        echo "⚠ WARNING: PCIe Gen${PCIE_SPEED} x${PCIE_WIDTH} detected. Expected Gen4 x16."
        echo "  Fix: BIOS → Advanced → PCIEX16_1 Link Mode → Gen4 (NOT Auto)"
      else
        echo "PCIe Gen${PCIE_SPEED} x${PCIE_WIDTH} — OK"
      fi

      # --- 2. gpu_burn Tensor Core stress (5 min) ---
      echo ""
      echo "═══ TEST 2: Sustained Tensor Core Stress (5 min) ═══"
      GPU_BURN_DIR="/opt/gpu-burn"
      if [ ! -x "${GPU_BURN_DIR}/gpu_burn" ]; then
        echo "Building gpu_burn..."
        mkdir -p "$GPU_BURN_DIR"
        cd "$GPU_BURN_DIR"
        if [ ! -d ".git" ]; then
          git clone https://github.com/wilicc/gpu-burn.git . 2>&1 | tail -3
        fi
        make 2>&1 | tail -5
      fi
      if [ -x "${GPU_BURN_DIR}/gpu_burn" ]; then
        cd "$GPU_BURN_DIR"
        echo "Running gpu_burn -tc 300 (Tensor Cores, 5 minutes)..."
        ./gpu_burn -tc 300 2>&1 || echo "gpu_burn completed with errors"
      else
        echo "SKIP: gpu_burn not available"
      fi

      # --- 3. Extended stress (optional — check arg) ---
      echo ""
      echo "═══ TEST 3: Extended Tensor Core Stress ═══"
      if [ "${1:-}" = "--extended" ] && [ -x "${GPU_BURN_DIR}/gpu_burn" ]; then
        echo "Running gpu_burn -tc 1800 (30 minutes)..."
        cd "$GPU_BURN_DIR"
        ./gpu_burn -tc 1800 2>&1 || echo "Extended gpu_burn completed with errors"
      else
        echo "SKIP: Use --extended flag for 30-minute stress test"
      fi

      # --- 4. DCGM Level 1 ---
      echo ""
      echo "═══ TEST 4: DCGM Level 1 (Quick Health) ═══"
      if command -v dcgmi &>/dev/null; then
        dcgmi diag -r 1 2>&1 || echo "DCGM Level 1 completed with issues"
      else
        echo "SKIP: dcgmi not installed (install datacenter-gpu-manager)"
      fi

      # --- 5. DCGM Level 2 ---
      echo ""
      echo "═══ TEST 5: DCGM Level 2 (Medium) ═══"
      if command -v dcgmi &>/dev/null; then
        dcgmi diag -r 2 2>&1 || echo "DCGM Level 2 completed with issues"
      else
        echo "SKIP: dcgmi not installed"
      fi

      # --- 6. DCGM Level 3 (optional) ---
      echo ""
      echo "═══ TEST 6: DCGM Level 3 (Full) ═══"
      if [ "${1:-}" = "--extended" ] && command -v dcgmi &>/dev/null; then
        dcgmi diag -r 3 2>&1 || echo "DCGM Level 3 completed with issues"
      else
        echo "SKIP: Use --extended for DCGM Level 3"
      fi

      # --- 7. Clock monitoring under load ---
      echo ""
      echo "═══ TEST 7: Persistent Clock Monitoring (60s) ═══"
      if [ -x "${GPU_BURN_DIR}/gpu_burn" ]; then
        cd "$GPU_BURN_DIR"
        ./gpu_burn -tc 60 &
        BURN_PID=$!
        nvidia-smi dmon -s pucvmet -d 5 -c 12 2>&1 || true
        wait $BURN_PID 2>/dev/null || true
      else
        echo "SKIP: gpu_burn not available for load generation"
      fi

      # --- 8. ECC error check ---
      echo ""
      echo "═══ TEST 8: ECC Error Check ═══"
      nvidia-smi --query-gpu=ecc.errors.corrected.volatile.total,ecc.errors.uncorrected.volatile.total \
        --format=csv,noheader 2>&1 || echo "ECC query not supported"

      echo ""
      echo "═══════════════════════════════════════════════════════════════"
      echo "  GPU HARDWARE VALIDATION COMPLETE: $(date)"
      echo "═══════════════════════════════════════════════════════════════"
      } 2>&1 | tee "$REPORT"

      echo "Report: ${REPORT}"
      GPU_HW_SCRIPT
    - chmod 0755 /target/opt/ml-workstation-setup/gpu-hardware-validation.sh

    # =========================================================================
    # 33. ML BENCHMARK SUITE SCRIPT
    #
    # PyTorch GEMM, ResNet-50, BERT inference/training benchmarks.
    # Sets up a venv with PyTorch CUDA 12.6.
    # =========================================================================
    - |
      cat > /target/opt/ml-workstation-setup/ml-benchmark-suite.sh << 'ML_BENCH_SCRIPT'
      #!/usr/bin/env bash
      set -euo pipefail
      LOGDIR="/var/log/ml-workstation-setup"
      TIMESTAMP="$(date +%Y%m%d-%H%M%S)"
      REPORT="${LOGDIR}/ml-benchmark-results-${TIMESTAMP}.log"
      VENV="/opt/ml-benchmarks/venv"
      mkdir -p "$LOGDIR"

      echo "============================================================="
      echo " ML BENCHMARK SUITE"
      echo " Started: $(date)"
      echo "============================================================="

      # --- Setup venv ---
      if [ ! -d "$VENV" ]; then
        echo "Creating Python venv..."
        mkdir -p /opt/ml-benchmarks
        python3 -m venv "$VENV"
      fi
      source "$VENV/bin/activate"

      echo "Installing PyTorch with CUDA 12.6..."
      pip install --upgrade pip 2>&1 | tail -1
      pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cu126 2>&1 | tail -5

      {
      echo "═══════════════════════════════════════════════════════════════"
      echo "  ML BENCHMARK RESULTS"
      echo "  Date: $(date)"
      echo "  GPU: $(nvidia-smi --query-gpu=name --format=csv,noheader 2>/dev/null | head -1)"
      echo "  Driver: $(nvidia-smi --query-gpu=driver_version --format=csv,noheader 2>/dev/null | head -1)"
      echo "  PyTorch: $(python3 -c 'import torch; print(torch.__version__)' 2>/dev/null)"
      echo "  CUDA available: $(python3 -c 'import torch; print(torch.cuda.is_available())' 2>/dev/null)"
      echo "═══════════════════════════════════════════════════════════════"

      # --- GEMM benchmarks ---
      echo ""
      echo "═══ GEMM BENCHMARKS (8192x8192, 100 iterations) ═══"
      python3 << 'GEMM_PY'
      import torch
      import time

      if not torch.cuda.is_available():
          print("CUDA not available!")
          exit(1)

      torch.cuda.synchronize()
      N = 8192
      ITERS = 100

      for dtype_name, dtype in [("FP32", torch.float32), ("FP16", torch.float16),
                                  ("BF16", torch.bfloat16), ("TF32", torch.float32)]:
          if dtype_name == "TF32":
              torch.backends.cuda.matmul.allow_tf32 = True
              torch.backends.cudnn.allow_tf32 = True
          else:
              torch.backends.cuda.matmul.allow_tf32 = False
              torch.backends.cudnn.allow_tf32 = False

          a = torch.randn(N, N, device='cuda', dtype=dtype)
          b = torch.randn(N, N, device='cuda', dtype=dtype)

          # Warmup
          for _ in range(10):
              torch.mm(a, b)
          torch.cuda.synchronize()

          start = time.perf_counter()
          for _ in range(ITERS):
              torch.mm(a, b)
          torch.cuda.synchronize()
          elapsed = time.perf_counter() - start

          ops = 2 * N * N * N * ITERS
          tflops = ops / elapsed / 1e12
          print(f"  {dtype_name}: {tflops:.1f} TFLOPS ({elapsed/ITERS*1000:.1f} ms/iter)")

          del a, b
          torch.cuda.empty_cache()
      GEMM_PY

      # --- ResNet-50 inference ---
      echo ""
      echo "═══ RESNET-50 INFERENCE (batch=64, 100 iterations) ═══"
      python3 << 'RESNET_INF_PY'
      import torch
      import torchvision.models as models
      import time

      model = models.resnet50(weights=None).cuda().eval()
      x = torch.randn(64, 3, 224, 224, device='cuda')

      # FP32
      for _ in range(10):
          model(x)
      torch.cuda.synchronize()
      start = time.perf_counter()
      for _ in range(100):
          model(x)
      torch.cuda.synchronize()
      fp32_time = (time.perf_counter() - start) / 100 * 1000
      print(f"  FP32: {fp32_time:.1f} ms/batch (batch=64)")

      # AMP (FP16)
      with torch.amp.autocast('cuda'):
          for _ in range(10):
              model(x)
          torch.cuda.synchronize()
          start = time.perf_counter()
          for _ in range(100):
              model(x)
          torch.cuda.synchronize()
      amp_time = (time.perf_counter() - start) / 100 * 1000
      print(f"  AMP:  {amp_time:.1f} ms/batch (batch=64)")
      print(f"  Speedup: {fp32_time/amp_time:.2f}x")
      RESNET_INF_PY

      # --- BERT-base inference ---
      echo ""
      echo "═══ BERT-BASE INFERENCE (seq_len=512, batch=32, 100 iterations) ═══"
      python3 << 'BERT_INF_PY'
      import torch
      import torch.nn as nn
      import time

      # Simple transformer encoder as BERT proxy (avoids transformers dependency)
      encoder_layer = nn.TransformerEncoderLayer(d_model=768, nhead=12, batch_first=True).cuda().eval()
      model = nn.TransformerEncoder(encoder_layer, num_layers=12).cuda().eval()
      x = torch.randn(32, 512, 768, device='cuda')

      for _ in range(5):
          model(x)
      torch.cuda.synchronize()
      start = time.perf_counter()
      for _ in range(100):
          model(x)
      torch.cuda.synchronize()
      fp32_time = (time.perf_counter() - start) / 100 * 1000
      print(f"  FP32: {fp32_time:.1f} ms/batch (batch=32, seq=512)")

      with torch.amp.autocast('cuda'):
          for _ in range(5):
              model(x)
          torch.cuda.synchronize()
          start = time.perf_counter()
          for _ in range(100):
              model(x)
          torch.cuda.synchronize()
      amp_time = (time.perf_counter() - start) / 100 * 1000
      print(f"  AMP:  {amp_time:.1f} ms/batch (batch=32, seq=512)")
      print(f"  Speedup: {fp32_time/amp_time:.2f}x")
      BERT_INF_PY

      # --- ResNet-50 training ---
      echo ""
      echo "═══ RESNET-50 TRAINING (batch=64, 50 steps, AMP + torch.compile) ═══"
      python3 << 'RESNET_TRAIN_PY'
      import torch
      import torchvision.models as models
      import time

      model = models.resnet50(weights=None).cuda().train()
      optimizer = torch.optim.SGD(model.parameters(), lr=0.01)
      scaler = torch.amp.GradScaler('cuda')
      x = torch.randn(64, 3, 224, 224, device='cuda')
      target = torch.randint(0, 1000, (64,), device='cuda')
      criterion = torch.nn.CrossEntropyLoss()

      # Warmup
      for _ in range(5):
          optimizer.zero_grad()
          with torch.amp.autocast('cuda'):
              out = model(x)
              loss = criterion(out, target)
          scaler.scale(loss).backward()
          scaler.step(optimizer)
          scaler.update()
      torch.cuda.synchronize()

      start = time.perf_counter()
      for _ in range(50):
          optimizer.zero_grad()
          with torch.amp.autocast('cuda'):
              out = model(x)
              loss = criterion(out, target)
          scaler.scale(loss).backward()
          scaler.step(optimizer)
          scaler.update()
      torch.cuda.synchronize()
      elapsed = (time.perf_counter() - start) / 50 * 1000
      print(f"  AMP training: {elapsed:.1f} ms/step (batch=64)")

      # torch.compile
      try:
          compiled_model = torch.compile(model)
          torch.cuda.synchronize()
          start_compile = time.perf_counter()
          with torch.amp.autocast('cuda'):
              out = compiled_model(x)
              loss = criterion(out, target)
          torch.cuda.synchronize()
          compile_time = (time.perf_counter() - start_compile) * 1000
          print(f"  torch.compile first-run: {compile_time:.0f} ms (includes compilation)")

          torch.cuda.synchronize()
          start = time.perf_counter()
          for _ in range(50):
              optimizer.zero_grad()
              with torch.amp.autocast('cuda'):
                  out = compiled_model(x)
                  loss = criterion(out, target)
              scaler.scale(loss).backward()
              scaler.step(optimizer)
              scaler.update()
          torch.cuda.synchronize()
          compiled_elapsed = (time.perf_counter() - start) / 50 * 1000
          print(f"  torch.compile training: {compiled_elapsed:.1f} ms/step")
          print(f"  Compile speedup: {elapsed/compiled_elapsed:.2f}x")
      except Exception as e:
          print(f"  torch.compile: skipped ({e})")
      RESNET_TRAIN_PY

      # --- CUDA memory stress ---
      echo ""
      echo "═══ CUDA MEMORY STRESS (90% VRAM) ═══"
      python3 << 'MEM_STRESS_PY'
      import torch
      import time

      total_memory = torch.cuda.get_device_properties(0).total_memory
      alloc_bytes = int(total_memory * 0.9)
      alloc_elements = alloc_bytes // 4  # float32

      print(f"  Total VRAM: {total_memory / 1e9:.1f} GB")
      print(f"  Allocating: {alloc_bytes / 1e9:.1f} GB ({alloc_elements} float32 elements)")

      try:
          tensor = torch.ones(alloc_elements, device='cuda', dtype=torch.float32)
          tensor *= 3.14159
          result = tensor.sum().item()
          expected = alloc_elements * 3.14159
          rel_error = abs(result - expected) / expected
          if rel_error < 1e-4:
              print(f"  PASS: Memory write/read verified (rel_error={rel_error:.2e})")
          else:
              print(f"  WARN: Unexpected result (rel_error={rel_error:.2e})")
          del tensor
          torch.cuda.empty_cache()
      except torch.cuda.OutOfMemoryError:
          print("  FAIL: Could not allocate 90% of VRAM")
      MEM_STRESS_PY

      echo ""
      echo "═══════════════════════════════════════════════════════════════"
      echo "  ML BENCHMARKS COMPLETE: $(date)"
      echo "═══════════════════════════════════════════════════════════════"
      } 2>&1 | tee "$REPORT"

      echo "Report: ${REPORT}"
      ML_BENCH_SCRIPT
    - chmod 0755 /target/opt/ml-workstation-setup/ml-benchmark-suite.sh

    # =========================================================================
    # 34. CUDA TOOLCHAIN VALIDATION SCRIPT
    #
    # nvcc compile test, cuBLAS/cuDNN/cuFFT/NCCL checks, NVML queries.
    # =========================================================================
    - |
      cat > /target/opt/ml-workstation-setup/cuda-toolchain-validation.sh << 'CUDA_TC_SCRIPT'
      #!/usr/bin/env bash
      set -euo pipefail
      LOGDIR="/var/log/ml-workstation-setup"
      TIMESTAMP="$(date +%Y%m%d-%H%M%S)"
      REPORT="${LOGDIR}/cuda-toolchain-results-${TIMESTAMP}.log"
      VENV="/opt/ml-benchmarks/venv"
      mkdir -p "$LOGDIR"

      echo "============================================================="
      echo " CUDA TOOLCHAIN VALIDATION"
      echo " Started: $(date)"
      echo "============================================================="

      # Activate ML venv for PyTorch-dependent tests (created by ml-benchmark-suite.sh)
      if [ -d "$VENV" ]; then
        source "$VENV/bin/activate"
        echo "Using venv: $VENV"
      else
        echo "WARNING: ML venv not found at $VENV — run ML Benchmark Suite (option 5) first for PyTorch tests"
        echo "  Non-PyTorch tests (nvcc compile, NVML) will still run."
      fi

      {
      echo "═══════════════════════════════════════════════════════════════"
      echo "  CUDA TOOLCHAIN VALIDATION REPORT"
      echo "  Date: $(date)"
      echo "═══════════════════════════════════════════════════════════════"

      # --- Version cross-check ---
      echo ""
      echo "═══ VERSION CHECK ═══"
      echo "nvcc:"
      nvcc --version 2>&1 || echo "nvcc not found"
      echo ""
      echo "nvidia-smi:"
      nvidia-smi --query-gpu=driver_version,name --format=csv 2>&1 || echo "nvidia-smi not found"

      # --- Compile & run custom CUDA kernel ---
      echo ""
      echo "═══ CUSTOM KERNEL COMPILE+RUN ═══"
      TMPDIR=$(mktemp -d)
      cat > "${TMPDIR}/vecadd.cu" << 'VECADD_CU'
      #include <stdio.h>
      #include <cuda_runtime.h>
      __global__ void vecAdd(float *a, float *b, float *c, int n) {
          int i = blockIdx.x * blockDim.x + threadIdx.x;
          if (i < n) c[i] = a[i] + b[i];
      }
      int main() {
          int n = 1000000;
          size_t sz = n * sizeof(float);
          float *h_a, *h_b, *h_c, *d_a, *d_b, *d_c;
          h_a = (float*)malloc(sz); h_b = (float*)malloc(sz); h_c = (float*)malloc(sz);
          for (int i = 0; i < n; i++) { h_a[i] = i; h_b[i] = i * 2; }
          cudaMalloc(&d_a, sz); cudaMalloc(&d_b, sz); cudaMalloc(&d_c, sz);
          cudaMemcpy(d_a, h_a, sz, cudaMemcpyHostToDevice);
          cudaMemcpy(d_b, h_b, sz, cudaMemcpyHostToDevice);
          vecAdd<<<(n+255)/256, 256>>>(d_a, d_b, d_c, n);
          cudaMemcpy(h_c, d_c, sz, cudaMemcpyDeviceToHost);
          int errors = 0;
          for (int i = 0; i < n; i++) { if (h_c[i] != h_a[i] + h_b[i]) errors++; }
          printf("Vector Add (1M elements): %s (%d errors)\n", errors ? "FAIL" : "PASS", errors);
          cudaFree(d_a); cudaFree(d_b); cudaFree(d_c);
          free(h_a); free(h_b); free(h_c);
          return errors ? 1 : 0;
      }
      VECADD_CU
      nvcc -arch=sm_89 "${TMPDIR}/vecadd.cu" -o "${TMPDIR}/vecadd" 2>&1 && "${TMPDIR}/vecadd" 2>&1 || echo "Custom kernel test FAILED"
      rm -rf "$TMPDIR"

      # --- cuBLAS GEMM benchmark ---
      echo ""
      echo "═══ cuBLAS GEMM BENCHMARK ═══"
      python3 << 'CUBLAS_PY'
      import torch, time
      if not torch.cuda.is_available():
          print("CUDA not available"); exit(1)
      N = 4096
      for name, dt in [("FP32", torch.float32), ("FP16", torch.float16), ("BF16", torch.bfloat16)]:
          a = torch.randn(N, N, device='cuda', dtype=dt)
          b = torch.randn(N, N, device='cuda', dtype=dt)
          for _ in range(10): torch.mm(a, b)
          torch.cuda.synchronize()
          t0 = time.perf_counter()
          for _ in range(100): torch.mm(a, b)
          torch.cuda.synchronize()
          elapsed = (time.perf_counter() - t0) / 100
          tflops = 2*N*N*N / elapsed / 1e12
          print(f"  {name} GEMM (4096x4096): {tflops:.1f} TFLOPS ({elapsed*1000:.2f} ms)")
          del a, b; torch.cuda.empty_cache()
      CUBLAS_PY

      # --- cuDNN convolution ---
      echo ""
      echo "═══ cuDNN CONVOLUTION ═══"
      python3 << 'CUDNN_PY'
      import torch, torch.nn as nn, time
      if not torch.cuda.is_available():
          print("CUDA not available"); exit(1)
      conv = nn.Conv2d(3, 64, 3, padding=1).cuda().eval()
      x = torch.randn(1, 3, 224, 224, device='cuda')
      for _ in range(20): conv(x)
      torch.cuda.synchronize()
      t0 = time.perf_counter()
      for _ in range(100): conv(x)
      torch.cuda.synchronize()
      elapsed = (time.perf_counter() - t0) / 100 * 1000
      print(f"  Conv2d forward (3x224x224 → 64 filters): {elapsed:.2f} ms")
      CUDNN_PY

      # --- cuFFT ---
      echo ""
      echo "═══ cuFFT ═══"
      python3 << 'CUFFT_PY'
      import torch, time
      if not torch.cuda.is_available():
          print("CUDA not available"); exit(1)
      # 1D FFT
      x = torch.randn(1000000, device='cuda', dtype=torch.complex64)
      for _ in range(10): torch.fft.fft(x)
      torch.cuda.synchronize()
      t0 = time.perf_counter()
      for _ in range(100): torch.fft.fft(x)
      torch.cuda.synchronize()
      print(f"  1D FFT (1M elements): {(time.perf_counter()-t0)/100*1000:.2f} ms")
      # 2D FFT
      x2 = torch.randn(1024, 1024, device='cuda', dtype=torch.complex64)
      for _ in range(10): torch.fft.fft2(x2)
      torch.cuda.synchronize()
      t0 = time.perf_counter()
      for _ in range(100): torch.fft.fft2(x2)
      torch.cuda.synchronize()
      print(f"  2D FFT (1024x1024): {(time.perf_counter()-t0)/100*1000:.2f} ms")
      CUFFT_PY

      # --- NCCL single-GPU ---
      echo ""
      echo "═══ NCCL SINGLE-GPU ═══"
      python3 << 'NCCL_PY'
      import torch, torch.distributed as dist, os, time
      # Simple single-GPU NCCL test via process group
      try:
          os.environ['MASTER_ADDR'] = 'localhost'
          os.environ['MASTER_PORT'] = '29500'
          os.environ['RANK'] = '0'
          os.environ['WORLD_SIZE'] = '1'
          dist.init_process_group('nccl', rank=0, world_size=1)
          x = torch.randn(64*1024*1024, device='cuda')  # 256MB
          for _ in range(5): dist.all_reduce(x)
          torch.cuda.synchronize()
          t0 = time.perf_counter()
          for _ in range(20): dist.all_reduce(x)
          torch.cuda.synchronize()
          elapsed = (time.perf_counter() - t0) / 20 * 1000
          print(f"  NCCL all-reduce (256MB, single GPU): {elapsed:.1f} ms")
          dist.destroy_process_group()
      except Exception as e:
          print(f"  NCCL test skipped: {e}")
      NCCL_PY

      # --- NVML via pynvml ---
      echo ""
      echo "═══ NVML API QUERY ═══"
      python3 << 'NVML_PY'
      try:
          import subprocess
          subprocess.check_call(['pip', 'install', '-q', '--break-system-packages', 'pynvml'], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
          import pynvml
          pynvml.nvmlInit()
          handle = pynvml.nvmlDeviceGetHandleByIndex(0)
          name = pynvml.nvmlDeviceGetName(handle)
          mem = pynvml.nvmlDeviceGetMemoryInfo(handle)
          temp = pynvml.nvmlDeviceGetTemperature(handle, pynvml.NVML_TEMPERATURE_GPU)
          power = pynvml.nvmlDeviceGetPowerUsage(handle) / 1000
          print(f"  GPU: {name}")
          print(f"  Memory: {mem.used/1e9:.1f}/{mem.total/1e9:.1f} GB")
          print(f"  Temperature: {temp}°C")
          print(f"  Power: {power:.0f} W")
          pynvml.nvmlShutdown()
      except Exception as e:
          print(f"  NVML query failed: {e}")
      NVML_PY

      # --- CUDA memory info ---
      echo ""
      echo "═══ CUDA MEMORY INFO ═══"
      python3 -c "
      import torch
      free, total = torch.cuda.mem_get_info(0)
      print(f'  Free: {free/1e9:.1f} GB / Total: {total/1e9:.1f} GB')
      " 2>&1 || echo "  Could not query CUDA memory"

      echo ""
      echo "═══════════════════════════════════════════════════════════════"
      echo "  CUDA TOOLCHAIN VALIDATION COMPLETE: $(date)"
      echo "═══════════════════════════════════════════════════════════════"
      } 2>&1 | tee "$REPORT"

      echo "Report: ${REPORT}"
      CUDA_TC_SCRIPT
    - chmod 0755 /target/opt/ml-workstation-setup/cuda-toolchain-validation.sh

    # =========================================================================
    # 35. CPU BENCHMARK SUITE SCRIPT
    #
    # sysbench, stress-ng, STREAM memory bandwidth.
    # =========================================================================
    - |
      cat > /target/opt/ml-workstation-setup/cpu-benchmark-suite.sh << 'CPU_BENCH_SCRIPT'
      #!/usr/bin/env bash
      set -euo pipefail
      LOGDIR="/var/log/ml-workstation-setup"
      TIMESTAMP="$(date +%Y%m%d-%H%M%S)"
      REPORT="${LOGDIR}/cpu-benchmark-results-${TIMESTAMP}.log"
      mkdir -p "$LOGDIR"

      echo "============================================================="
      echo " CPU BENCHMARK SUITE"
      echo " AMD Ryzen 9 7950X (16C/32T, Zen 4)"
      echo " Started: $(date)"
      echo "============================================================="

      {
      echo "═══════════════════════════════════════════════════════════════"
      echo "  CPU BENCHMARK RESULTS"
      echo "  Date: $(date)"
      echo "  CPU: $(lscpu | grep 'Model name' | sed 's/.*: *//')"
      echo "  Cores: $(nproc)"
      echo "═══════════════════════════════════════════════════════════════"

      # --- 1. Prime calculation ---
      echo ""
      echo "═══ TEST 1: Prime Calculation (sysbench, 32 threads, 60s) ═══"
      if command -v sysbench &>/dev/null; then
        sysbench cpu --threads=32 --time=60 run 2>&1
      else
        echo "SKIP: sysbench not installed"
      fi

      # --- 2. Matrix ops ---
      echo ""
      echo "═══ TEST 2: Matrix Operations (stress-ng, 32 workers, 120s) ═══"
      if command -v stress-ng &>/dev/null; then
        stress-ng --matrix 32 --timeout 120 --metrics-brief 2>&1
      else
        echo "SKIP: stress-ng not installed"
      fi

      # --- 3. STREAM memory bandwidth ---
      echo ""
      echo "═══ TEST 3: STREAM Memory Bandwidth (DDR5) ═══"
      STREAM_DIR="/opt/stream-benchmark"
      if [ ! -x "${STREAM_DIR}/stream" ]; then
        echo "Building STREAM..."
        mkdir -p "$STREAM_DIR"
        cd "$STREAM_DIR"
        if [ ! -f "stream.c" ]; then
          curl -fsSL "https://raw.githubusercontent.com/jeffhammond/STREAM/master/stream.c" -o stream.c 2>&1 || \
          wget -q "https://raw.githubusercontent.com/jeffhammond/STREAM/master/stream.c" -O stream.c 2>&1 || true
        fi
        if [ -f "stream.c" ]; then
          gcc -O3 -march=znver4 -fopenmp -DSTREAM_ARRAY_SIZE=80000000 -DNTIMES=20 stream.c -o stream 2>&1
          echo "STREAM built with -march=znver4 -fopenmp"
        else
          echo "Could not download stream.c"
        fi
      fi
      if [ -x "${STREAM_DIR}/stream" ]; then
        OMP_NUM_THREADS=32 "${STREAM_DIR}/stream" 2>&1
      else
        echo "SKIP: STREAM not built"
      fi

      # --- 4. Compression ---
      echo ""
      echo "═══ TEST 4: Compression (stress-ng zlib, 32 workers, 120s) ═══"
      if command -v stress-ng &>/dev/null; then
        stress-ng --zlib 32 --timeout 120 --metrics-brief 2>&1
      else
        echo "SKIP: stress-ng not installed"
      fi

      # --- 5. Full CPU stress ---
      echo ""
      echo "═══ TEST 5: Full CPU Stress (all methods, 32 workers, 300s) ═══"
      if command -v stress-ng &>/dev/null; then
        stress-ng --cpu 32 --cpu-method all --timeout 300 --metrics-brief 2>&1
      else
        echo "SKIP: stress-ng not installed"
      fi

      # --- 6. Memory stress ---
      echo ""
      echo "═══ TEST 6: Memory Stress (4x8GB, 120s) ═══"
      if command -v stress-ng &>/dev/null; then
        stress-ng --vm 4 --vm-bytes 8G --timeout 120 --metrics-brief 2>&1
      else
        echo "SKIP: stress-ng not installed"
      fi

      # --- 7. Cache stress ---
      echo ""
      echo "═══ TEST 7: Cache Stress (L3 64MB, 32 workers, 120s) ═══"
      if command -v stress-ng &>/dev/null; then
        stress-ng --cache 32 --timeout 120 --metrics-brief 2>&1
      else
        echo "SKIP: stress-ng not installed"
      fi

      # --- 8. Context switch ---
      echo ""
      echo "═══ TEST 8: Context Switch (32 workers, 60s) ═══"
      if command -v stress-ng &>/dev/null; then
        stress-ng --context 32 --timeout 60 --metrics-brief 2>&1
      else
        echo "SKIP: stress-ng not installed"
      fi

      echo ""
      echo "═══════════════════════════════════════════════════════════════"
      echo "  CPU BENCHMARKS COMPLETE: $(date)"
      echo "═══════════════════════════════════════════════════════════════"
      } 2>&1 | tee "$REPORT"

      echo "Report: ${REPORT}"
      CPU_BENCH_SCRIPT
    - chmod 0755 /target/opt/ml-workstation-setup/cpu-benchmark-suite.sh

    # =========================================================================
    # 36. MASTER TEST LAUNCHER
    #
    # Menu-driven script that runs any/all test suites.
    # =========================================================================
    - |
      cat > /target/opt/ml-workstation-setup/master-test-launcher.sh << 'MASTER_LAUNCH'
      #!/usr/bin/env bash
      SCRIPT_DIR="/opt/ml-workstation-setup"

      quick_gpu_health() {
        echo "=== Quick GPU Health Check ==="
        nvidia-smi 2>&1
        echo ""
        # Try to find deviceQuery
        DQ=$(find /opt/cuda-samples/build -name deviceQuery -type f -executable 2>/dev/null | head -1)
        [ -n "$DQ" ] && "$DQ" 2>&1 || echo "deviceQuery not built yet (run CUDA Samples validation first)"
        echo ""
        BW=$(find /opt/cuda-samples/build -name bandwidthTest -type f -executable 2>/dev/null | head -1)
        [ -n "$BW" ] && "$BW" 2>&1 || echo "bandwidthTest not built yet"
      }

      show_menu() {
        echo ""
        echo "╔═══════════════════════════════════════════════════════════╗"
        echo "║       ML WORKSTATION VALIDATION & BENCHMARK SUITE        ║"
        echo "║    AMD Ryzen 9 7950X + NVIDIA RTX 4090 (headless)       ║"
        echo "╠═══════════════════════════════════════════════════════════╣"
        echo "║                                                           ║"
        echo "║  [1] Quick GPU Health Check          (~2 min)            ║"
        echo "║      nvidia-smi + deviceQuery + bandwidthTest            ║"
        echo "║                                                           ║"
        echo "║  [2] CUDA Samples Full Validation    (~30-45 min)        ║"
        echo "║      All 180+ official NVIDIA samples via run_tests.py   ║"
        echo "║                                                           ║"
        echo "║  [3] GPU Hardware Stress Test        (~10-30 min)        ║"
        echo "║      gpu_burn (Tensor Cores) + DCGM Level 2/3           ║"
        echo "║                                                           ║"
        echo "║  [4] CUDA Toolchain Validation       (~5 min)            ║"
        echo "║      nvcc compile test + cuBLAS + cuDNN + cuFFT + NCCL   ║"
        echo "║                                                           ║"
        echo "║  [5] ML Benchmarks                   (~15-30 min)        ║"
        echo "║      PyTorch GEMM/ResNet/BERT training+inference         ║"
        echo "║                                                           ║"
        echo "║  [6] CPU Benchmarks                  (~15 min)           ║"
        echo "║      stress-ng + sysbench + STREAM memory bandwidth      ║"
        echo "║                                                           ║"
        echo "║  [7] Run ALL (Full System Validation) (~90-120 min)      ║"
        echo "║      Runs 1-6 sequentially, combined report              ║"
        echo "║                                                           ║"
        echo "║  [0] Exit                                                ║"
        echo "║                                                           ║"
        echo "╚═══════════════════════════════════════════════════════════╝"
        echo ""
      }

      run_all() {
        COMBINED="${LOGDIR:-/var/log/ml-workstation-setup}/full-system-validation-$(date +%Y%m%d-%H%M%S).log"
        echo "Running FULL system validation..." | tee "$COMBINED"
        echo "Started: $(date)" >> "$COMBINED"
        echo "" >> "$COMBINED"

        echo "--- [1/6] Quick GPU Health ---" | tee -a "$COMBINED"
        quick_gpu_health 2>&1 | tee -a "$COMBINED"
        echo "" >> "$COMBINED"

        echo "--- [2/6] CUDA Samples Full Validation ---" | tee -a "$COMBINED"
        "${SCRIPT_DIR}/cuda-samples-full-validation.sh" 2>&1 | tee -a "$COMBINED"
        echo "" >> "$COMBINED"

        echo "--- [3/6] GPU Hardware Stress Test ---" | tee -a "$COMBINED"
        "${SCRIPT_DIR}/gpu-hardware-validation.sh" 2>&1 | tee -a "$COMBINED"
        echo "" >> "$COMBINED"

        echo "--- [4/6] CUDA Toolchain Validation ---" | tee -a "$COMBINED"
        "${SCRIPT_DIR}/cuda-toolchain-validation.sh" 2>&1 | tee -a "$COMBINED"
        echo "" >> "$COMBINED"

        echo "--- [5/6] ML Benchmarks ---" | tee -a "$COMBINED"
        "${SCRIPT_DIR}/ml-benchmark-suite.sh" 2>&1 | tee -a "$COMBINED"
        echo "" >> "$COMBINED"

        echo "--- [6/6] CPU Benchmarks ---" | tee -a "$COMBINED"
        "${SCRIPT_DIR}/cpu-benchmark-suite.sh" 2>&1 | tee -a "$COMBINED"

        echo "" >> "$COMBINED"
        echo "Full system validation complete: $(date)" >> "$COMBINED"
        echo "Combined report: ${COMBINED}"
      }

      while true; do
        show_menu
        read -rp "Select option [0-7]: " choice
        case "$choice" in
          1) quick_gpu_health ;;
          2) "${SCRIPT_DIR}/cuda-samples-full-validation.sh" ;;
          3) "${SCRIPT_DIR}/gpu-hardware-validation.sh" ;;
          4) "${SCRIPT_DIR}/cuda-toolchain-validation.sh" ;;
          5) "${SCRIPT_DIR}/ml-benchmark-suite.sh" ;;
          6) "${SCRIPT_DIR}/cpu-benchmark-suite.sh" ;;
          7) run_all ;;
          0) echo "Bye."; exit 0 ;;
          *) echo "Invalid option" ;;
        esac
        echo ""
        read -rp "Press Enter to continue..."
      done
      MASTER_LAUNCH
    - chmod 0755 /target/opt/ml-workstation-setup/master-test-launcher.sh

    # =========================================================================
    # 37. DESKTOP SHORTCUTS (.desktop files for all test suites)
    # =========================================================================
    - mkdir -p /target/home/abraham/Desktop
    - mkdir -p /target/home/abraham/Pictures

    - |
      cat > /target/home/abraham/Desktop/ML-Workstation-Test-Suite.desktop << 'MASTER_DESKTOP'
      [Desktop Entry]
      Version=1.0
      Type=Application
      Name=ML Workstation Test Suite
      Comment=Master test launcher — GPU, CUDA, ML, CPU validation
      Exec=bash -c 'if [ "$XDG_SESSION_TYPE" = "wayland" ]; then foot -e sudo /opt/ml-workstation-setup/master-test-launcher.sh; else xfce4-terminal -e "sudo /opt/ml-workstation-setup/master-test-launcher.sh"; fi'
      Icon=utilities-system-monitor
      Terminal=false
      Categories=System;
      MASTER_DESKTOP

    - |
      cat > /target/home/abraham/Desktop/CUDA-Samples-Full-Validation.desktop << 'CUDA_SAMPLES_DESKTOP'
      [Desktop Entry]
      Version=1.0
      Type=Application
      Name=CUDA Samples Full Validation
      Comment=Build and run all 180+ NVIDIA CUDA samples (~30-45 minutes)
      Exec=bash -c 'if [ "$XDG_SESSION_TYPE" = "wayland" ]; then foot -e sudo /opt/ml-workstation-setup/cuda-samples-full-validation.sh; else xfce4-terminal -e "sudo /opt/ml-workstation-setup/cuda-samples-full-validation.sh"; fi'
      Icon=nvidia-settings
      Terminal=false
      Categories=System;
      CUDA_SAMPLES_DESKTOP

    - |
      cat > /target/home/abraham/Desktop/GPU-Hardware-Validation.desktop << 'GPU_HW_DESKTOP'
      [Desktop Entry]
      Version=1.0
      Type=Application
      Name=GPU Hardware Validation
      Comment=gpu_burn stress test + DCGM diagnostics (~10-30 minutes)
      Exec=bash -c 'if [ "$XDG_SESSION_TYPE" = "wayland" ]; then foot -e sudo /opt/ml-workstation-setup/gpu-hardware-validation.sh; else xfce4-terminal -e "sudo /opt/ml-workstation-setup/gpu-hardware-validation.sh"; fi'
      Icon=nvidia-settings
      Terminal=false
      Categories=System;
      GPU_HW_DESKTOP

    - |
      cat > /target/home/abraham/Desktop/CUDA-Toolchain-Validation.desktop << 'CUDA_TC_DESKTOP'
      [Desktop Entry]
      Version=1.0
      Type=Application
      Name=CUDA Toolchain Validation
      Comment=nvcc compile test + cuBLAS + cuDNN + cuFFT + NCCL (~5 minutes)
      Exec=bash -c 'if [ "$XDG_SESSION_TYPE" = "wayland" ]; then foot -e sudo /opt/ml-workstation-setup/cuda-toolchain-validation.sh; else xfce4-terminal -e "sudo /opt/ml-workstation-setup/cuda-toolchain-validation.sh"; fi'
      Icon=utilities-system-monitor
      Terminal=false
      Categories=System;
      CUDA_TC_DESKTOP

    - |
      cat > /target/home/abraham/Desktop/ML-Benchmark-Suite.desktop << 'ML_BENCH_DESKTOP'
      [Desktop Entry]
      Version=1.0
      Type=Application
      Name=ML Benchmark Suite
      Comment=PyTorch GEMM, ResNet-50, BERT benchmarks (~15-30 minutes)
      Exec=bash -c 'if [ "$XDG_SESSION_TYPE" = "wayland" ]; then foot -e sudo /opt/ml-workstation-setup/ml-benchmark-suite.sh; else xfce4-terminal -e "sudo /opt/ml-workstation-setup/ml-benchmark-suite.sh"; fi'
      Icon=utilities-system-monitor
      Terminal=false
      Categories=System;
      ML_BENCH_DESKTOP

    - |
      cat > /target/home/abraham/Desktop/CPU-Benchmark-Suite.desktop << 'CPU_BENCH_DESKTOP'
      [Desktop Entry]
      Version=1.0
      Type=Application
      Name=CPU Benchmark Suite
      Comment=sysbench + stress-ng + STREAM memory bandwidth (~15 minutes)
      Exec=bash -c 'if [ "$XDG_SESSION_TYPE" = "wayland" ]; then foot -e sudo /opt/ml-workstation-setup/cpu-benchmark-suite.sh; else xfce4-terminal -e "sudo /opt/ml-workstation-setup/cpu-benchmark-suite.sh"; fi'
      Icon=utilities-system-monitor
      Terminal=false
      Categories=System;
      CPU_BENCH_DESKTOP

    # Make desktop shortcuts executable and set ownership
    - chmod +x /target/home/abraham/Desktop/*.desktop
    - curtin in-target -- chown -R 1000:1000 /home/abraham/Desktop
    - curtin in-target -- chown -R 1000:1000 /home/abraham/Pictures

    # =========================================================================
    # 38. SYSTEMD SERVICE — CUDA samples validation (disabled by default)
    # =========================================================================
    - |
      cat > /target/etc/systemd/system/cuda-samples-validation.service << 'CUDA_SAMPLES_SVC'
      [Unit]
      Description=NVIDIA CUDA Samples Full Validation (manual start only)
      After=multi-user.target nvidia-persistenced.service
      Wants=nvidia-persistenced.service

      [Service]
      Type=oneshot
      ExecStart=/opt/ml-workstation-setup/cuda-samples-full-validation.sh
      RemainAfterExit=yes
      StandardOutput=journal+console
      TimeoutStartSec=3600

      [Install]
      WantedBy=multi-user.target
      CUDA_SAMPLES_SVC
    # Explicitly NOT enabled — manual start only: systemctl start cuda-samples-validation

    # =========================================================================
    # 39. REBUILD INITRAMFS — includes new firmware blobs. MUST BE LAST.
    # =========================================================================
    - curtin in-target -- update-initramfs -u -k all

    # Verify DMCUB blob landed in initramfs (logged to target fs for post-boot review)
    - curtin in-target -- bash -c 'KVER=$(ls /boot/vmlinuz-* 2>/dev/null | sort -V | tail -1 | sed "s|/boot/vmlinuz-||"); lsinitramfs /boot/initrd.img-${KVER} 2>/dev/null | grep -q dcn_3_1_5_dmcub && echo "INITRAMFS_CHECK=DMCUB_PRESENT" || echo "INITRAMFS_CHECK=DMCUB_MISSING firmware_delivery_failed"'

  user-data:
    runcmd:
      - systemctl disable cloud-init.service || true
      - systemctl disable cloud-config.service || true
      - systemctl disable cloud-final.service || true
      # nwg-look has no Ubuntu 24.04 apt package; install via snap on first boot
      - snap wait system seed.loaded && snap install nwg-look || true
    preserve_hostname: true
    manage_etc_hosts: true

  reporting:
    hook:
      type: print

  shutdown: poweroff

    # =========================================================================
    # 15. Xorg — AMD primary (AccelMethod "none") + NVIDIA headless
    #
    # AccelMethod "none" = zero GFX ring for 2D rendering.
    # XFCE compositor (XRender) is CPU-side, also zero GFX ring.
    # NVIDIA is headless compute only.
    # =========================================================================
    - mkdir -p /target/etc/X11/xorg.conf.d

    - |

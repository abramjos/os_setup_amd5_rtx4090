#cloud-config
autoinstall:
  version: 1

  # =========================================================================
  # VARIANT F: MODERN XFCE (X11, XRender Compositing ON, glamor, Arc Theme)
  #
  # PURPOSE: Best-looking X11 desktop with minimal risk. Post-firmware-fix,
  #   glamor is safe. xfwm4 XRender compositing provides shadows, transparency,
  #   and vsync WITHOUT touching GFX ring (XRender is CPU-side).
  #   Combined with Arc-Dark theme + Papirus icons + Plank dock = modern look.
  #
  # WHAT THIS TESTS:
  #   - With firmware fix, can XFCE run with compositing ON (XRender mode)?
  #   - Does vblank_mode=xpresent avoid GL context creation?
  #   - Is a themed XFCE visually competitive with GNOME?
  #
  # RISK: LOW — xfwm4 XRender compositor uses CPU for shadows/transparency.
  #   The vblank_mode=xpresent uses DRM page-flip events for vsync, NOT
  #   GLX (which would create an OpenGL context and hit the GFX ring).
  #   With firmware fix + XRender, this should be completely stable.
  #
  # FIRMWARE: Auto-downloaded during install (USB or network).
  #
  # DESKTOP: XFCE + Arc-Dark theme + Papirus icons + Plank dock + Inter font
  #   Familiar desktop with modern visual refresh.
  # =========================================================================

  interactive-sections: []

  locale: en_US.UTF-8
  keyboard:
    layout: us
    variant: ""
  timezone: America/New_York

  refresh-installer:
    update: true
    channel: stable

  source:
    id: ubuntu-desktop-minimal
    search_drivers: false

  kernel:
    package: linux-generic-hwe-24.04

  network:
    version: 2
    ethernets:
      eno1:
        dhcp4: true
        dhcp6: false
        optional: true

  proxy: ""

  apt:
    preserve_sources_list: false
    primary:
      - arches: [amd64]
        uri: http://archive.ubuntu.com/ubuntu
    security:
      - arches: [amd64]
        uri: http://security.ubuntu.com/ubuntu

  storage:
    version: 2
    config:
      - id: nvme-disk
        type: disk
        ptable: gpt
        serial: Samsung_SSD_990_PRO_2TB_S73WNJ0W206133V_1
        preserve: true
        wipe: none
        grub_device: false

      - id: efi-windows-part
        type: partition
        device: nvme-disk
        number: 1
        size: 100M
        preserve: true

      - id: msr-part
        type: partition
        device: nvme-disk
        number: 2
        size: 16M
        preserve: true

      - id: windows-part
        type: partition
        device: nvme-disk
        number: 3
        size: 975345549312
        preserve: true

      - id: winre-part
        type: partition
        device: nvme-disk
        number: 4
        size: 888M
        offset: 1999467708416
        preserve: true

      - id: efi-part
        type: partition
        device: nvme-disk
        size: 1G
        offset: 975468232704
        flag: esp
        grub_device: true

      - id: efi-format
        type: format
        volume: efi-part
        fstype: fat32
        label: EFI-UBUNTU

      - id: efi-mount
        type: mount
        device: efi-format
        path: /boot/efi

      - id: boot-part
        type: partition
        device: nvme-disk
        size: 2G
        offset: 976541974528

      - id: boot-format
        type: format
        volume: boot-part
        fstype: ext4
        label: BOOT

      - id: boot-mount
        type: mount
        device: boot-format
        path: /boot

      - id: swap-part
        type: partition
        device: nvme-disk
        size: 64G
        offset: 978689458176

      - id: swap-format
        type: format
        volume: swap-part
        fstype: swap
        label: SWAP

      - id: swap-mount
        type: mount
        device: swap-format
        path: none

      - id: root-part
        type: partition
        device: nvme-disk
        size: 200G
        offset: 1047408934912

      - id: root-format
        type: format
        volume: root-part
        fstype: ext4
        label: ROOT

      - id: root-mount
        type: mount
        device: root-format
        path: /

      - id: home-part
        type: partition
        device: nvme-disk
        size: -1
        offset: 1262157299712

      - id: home-format
        type: format
        volume: home-part
        fstype: ext4
        label: HOME

      - id: home-mount
        type: mount
        device: home-format
        path: /home

  identity:
    hostname: vortex
    realname: Abraham
    username: abraham
    password: "$6$tgmHIWX35Qendhwj$hSQ0dDsaUy2zJwnh8uRoMBEHybDjWXsmnjgi2fcECzmAZGrMfpuSDnOnTVG/uJ/G23Yf403i//i984JlbFvhy1"

  ssh:
    install-server: true
    allow-pw: true
    authorized-keys: []

  drivers:
    install: false

  codecs:
    install: true

  updates: security

  packages:
    # --- System essentials ---
    - ubuntu-minimal
    - ubuntu-standard
    - apt-transport-https
    - ca-certificates
    - curl
    - wget
    - gnupg
    - software-properties-common
    - lsb-release
    - unzip
    - zstd
    - pciutils
    - usbutils
    - dmidecode
    - lm-sensors
    - cpufrequtils
    - acpi
    - smartmontools
    - ethtool
    - net-tools
    - build-essential
    - dkms
    - gcc
    - g++
    - make
    - linux-headers-generic
    - linux-headers-generic-hwe-24.04

    # --- GPU/display stack ---
    - mesa-utils
    - mesa-vulkan-drivers
    - libgl1-mesa-dri
    - libgl1
    - libglx-mesa0
    - libdrm-dev
    - libdrm-amdgpu1
    - xserver-xorg
    - xserver-xorg-core
    - xserver-xorg-video-amdgpu
    - x11-utils
    - x11-xserver-utils
    - vainfo
    - vulkan-tools
    - clinfo

    # --- XFCE desktop (same as Variant B) ---
    - xfce4
    - xfce4-goodies
    - xfce4-terminal
    - xfce4-power-manager
    - xfce4-screenshooter
    - xfce4-taskmanager
    - thunar-archive-plugin
    - lightdm
    - lightdm-gtk-greeter
    - lightdm-gtk-greeter-settings

    # --- Modern theme packages (NEW in Variant F) ---
    - arc-theme
    - papirus-icon-theme
    - bibata-cursor-theme
    - fonts-inter
    - fonts-firacode
    - fonts-jetbrains-mono
    - plank
    - mousepad
    - ristretto

    # --- Firmware & kernel tools ---
    - linux-firmware
    - fwupd
    - initramfs-tools
    - mokutil
    - efibootmgr
    - amd64-microcode

    # --- Networking ---
    - openssh-server
    - openssh-client
    - network-manager
    - firewalld
    - rsync
    - tmux
    - screen

    # --- Storage & monitoring ---
    - nvme-cli
    - hdparm
    - parted
    - gdisk
    - e2fsprogs
    - dosfstools
    - htop
    - iotop
    - sysstat
    - strace
    - inxi
    - linux-tools-generic-hwe-24.04
    - git
    - vim
    - nano
    - jq
    - tree
    - xxd
    - bc

  snaps: []

  early-commands:
    - 'echo "=== Variant F: Modern XFCE — $(date -u +%Y-%m-%dT%H:%M:%SZ) ===" > /tmp/autoinstall-hw.log'
    - lspci -nn >> /tmp/autoinstall-hw.log 2>&1 || true
    - dmidecode -t system >> /tmp/autoinstall-hw.log 2>&1 || true
    - cat /proc/cpuinfo | head -30 >> /tmp/autoinstall-hw.log 2>&1 || true

  late-commands:

    # =========================================================================
    # 1. GRUB — Same as Variant B
    # =========================================================================
    - >-
      curtin in-target -- bash -c '
      GRUB_PARAMS="quiet splash amdgpu.sg_display=0 amdgpu.dcdebugmask=0x18 amdgpu.ppfeaturemask=0xfffd7fff amdgpu.gpu_recovery=1 amdgpu.seamless=1 amdgpu.lockup_timeout=30000 pcie_aspm=off iommu=pt processor.max_cstate=1 amd_pstate=active nogpumanager initcall_blacklist=simpledrm_platform_driver_init";
      grep -q "^GRUB_CMDLINE_LINUX_DEFAULT=" /etc/default/grub
      && sed -i "s|^GRUB_CMDLINE_LINUX_DEFAULT=.*|GRUB_CMDLINE_LINUX_DEFAULT=\"${GRUB_PARAMS}\"|" /etc/default/grub
      || echo "GRUB_CMDLINE_LINUX_DEFAULT=\"${GRUB_PARAMS}\"" >> /etc/default/grub'

    - curtin in-target -- bash -c 'grep -q "^GRUB_TIMEOUT=" /etc/default/grub && sed -i "s|^GRUB_TIMEOUT=.*|GRUB_TIMEOUT=5|" /etc/default/grub || echo "GRUB_TIMEOUT=5" >> /etc/default/grub'
    - curtin in-target -- bash -c 'grep -q "^GRUB_TIMEOUT_STYLE=" /etc/default/grub && sed -i "s|^GRUB_TIMEOUT_STYLE=.*|GRUB_TIMEOUT_STYLE=menu|" /etc/default/grub || echo "GRUB_TIMEOUT_STYLE=menu" >> /etc/default/grub'
    - curtin in-target -- update-grub

    # =========================================================================
    # 2. MODPROBE — amdgpu only
    # =========================================================================
    - |
      cat > /target/etc/modprobe.d/amdgpu.conf << 'MODPROBE_AMDGPU'
      # Variant F: AMD + firmware fix (Modern XFCE, XRender compositing)
      options amdgpu sg_display=0
      options amdgpu ppfeaturemask=0xfffd7fff
      options amdgpu dcdebugmask=0x18
      options amdgpu gpu_recovery=1
      options amdgpu lockup_timeout=30000
      options amdgpu seamless=1
      options amdgpu dc=1
      options amdgpu audio=1
      MODPROBE_AMDGPU

    - |
      cat > /target/etc/modprobe.d/blacklist-nouveau.conf << 'BLACKLIST_NOUVEAU'
      blacklist nouveau
      blacklist nova_core
      blacklist lbm-nouveau
      alias nouveau off
      alias lbm-nouveau off
      BLACKLIST_NOUVEAU

    # =========================================================================
    # 3. INITRAMFS — AMD only
    # =========================================================================
    - |
      cat > /target/etc/initramfs-tools/modules << 'INITRAMFS_MODULES'
      # Variant F: AMD-only (no NVIDIA in initramfs)
      amdgpu
      INITRAMFS_MODULES

    - |
      cat > /target/etc/modules-load.d/gpu.conf << 'MODULES_LOAD'
      amdgpu
      MODULES_LOAD

    # =========================================================================
    # 4. FIRMWARE UPDATE — USB first, network fallback (same as Variant B)
    # =========================================================================
    - |
      echo "=== Variant F: Firmware update ===" >> /tmp/autoinstall-hw.log
      FIRMWARE_FOUND=false
      FWDEST="/target/lib/firmware/amdgpu"
      FW_TAG="20250509"
      FW_BASE_URL="https://git.kernel.org/pub/scm/linux/kernel/git/firmware/linux-firmware.git/plain"
      BLOBS="dcn_3_1_5_dmcub psp_13_0_5_toc psp_13_0_5_ta psp_13_0_5_asd gc_10_3_6_ce gc_10_3_6_me gc_10_3_6_mec gc_10_3_6_mec2 gc_10_3_6_pfp gc_10_3_6_rlc sdma_5_2_6 vcn_3_1_2"

      for usbpath in /cdrom /media/cdrom /mnt/usb; do
        FWDIR="${usbpath}/UbuntuAutoInstall/firmware/amdgpu"
        if [ -d "$FWDIR" ] && ls "$FWDIR"/*.bin >/dev/null 2>&1; then
          echo "Source: USB ($FWDIR)" >> /tmp/autoinstall-hw.log
          FIRMWARE_FOUND=true
          break
        fi
      done

      if [ "$FIRMWARE_FOUND" = "false" ]; then
        echo "USB firmware not found — downloading from kernel.org (tag $FW_TAG)..." >> /tmp/autoinstall-hw.log
        FWDIR="/tmp/firmware-download"
        mkdir -p "$FWDIR"
        DL_OK=0
        for blob in $BLOBS; do
          if curl -sfL -o "$FWDIR/${blob}.bin" "${FW_BASE_URL}/amdgpu/${blob}.bin?h=${FW_TAG}" 2>>/tmp/autoinstall-hw.log; then
            DL_OK=$((DL_OK + 1))
          fi
        done
        [ "$DL_OK" -gt 0 ] && FIRMWARE_FOUND=true && echo "Source: network ($DL_OK blobs)" >> /tmp/autoinstall-hw.log
      fi

      if [ "$FIRMWARE_FOUND" = "true" ]; then
        BACKUP="/target/var/log/ml-workstation-setup/firmware-backup"
        mkdir -p "$BACKUP"
        cp -a "$FWDEST"/dcn_3_1_5_dmcub.bin* "$BACKUP/" 2>/dev/null || true
        cp -a "$FWDEST"/psp_13_0_5_*.bin* "$BACKUP/" 2>/dev/null || true
        cp -a "$FWDEST"/gc_10_3_6_*.bin* "$BACKUP/" 2>/dev/null || true
        for blob in "$FWDIR"/*.bin; do
          [ -f "$blob" ] || continue
          bname=$(basename "$blob")
          cp "$blob" "$FWDEST/$bname"
          if zstd -f "$FWDEST/$bname" -o "$FWDEST/${bname}.zst" 2>>/tmp/autoinstall-hw.log; then
            rm -f "$FWDEST/$bname"
            echo "  Installed: $bname -> ${bname}.zst" >> /tmp/autoinstall-hw.log
          fi
        done
        ls -la "$FWDEST"/dcn_3_1_5_dmcub.bin* >> /tmp/autoinstall-hw.log 2>&1
      else
        echo "WARNING: No firmware available — XRender compositing still safe" >> /tmp/autoinstall-hw.log
      fi

    # =========================================================================
    # 5. LightDM + XFCE with modernized greeter
    # =========================================================================
    - curtin in-target -- bash -c 'echo "/usr/sbin/lightdm" > /etc/X11/default-display-manager'
    - curtin in-target -- dpkg-reconfigure -f noninteractive lightdm || true

    - mkdir -p /target/etc/lightdm/lightdm.conf.d
    - |
      cat > /target/etc/lightdm/lightdm.conf.d/50-xfce-session.conf << 'LIGHTDM_XFCE'
      [Seat:*]
      user-session=xfce
      greeter-session=lightdm-gtk-greeter
      LIGHTDM_XFCE

    # Modernized LightDM greeter with Arc-Dark theme
    - |
      cat > /target/etc/lightdm/lightdm-gtk-greeter.conf << 'GREETER_CONF'
      [greeter]
      theme-name = Arc-Dark
      icon-theme-name = Papirus-Dark
      cursor-theme-name = Bibata-Modern-Classic
      cursor-theme-size = 24
      font-name = Inter 11
      background = #2f343f
      user-background = false
      position = 50%,center 50%,center
      xft-antialias = true
      xft-hintstyle = hintslight
      xft-rgba = rgb
      panel-position = top
      clock-format = %a %d %b, %H:%M
      GREETER_CONF

    - curtin in-target -- bash -c 'rm -f /usr/share/xsessions/ubuntu.desktop 2>/dev/null || true'
    - curtin in-target -- bash -c 'rm -f /usr/share/xsessions/ubuntu-xorg.desktop 2>/dev/null || true'
    - curtin in-target -- bash -c 'dpkg-divert --rename --divert /usr/share/xsessions/gnome.desktop.disabled /usr/share/xsessions/gnome.desktop 2>/dev/null || true'
    - curtin in-target -- bash -c 'dpkg-divert --rename --divert /usr/share/xsessions/gnome-xorg.desktop.disabled /usr/share/xsessions/gnome-xorg.desktop 2>/dev/null || true'

    # =========================================================================
    # 6. Disable unwanted services
    # =========================================================================
    - curtin in-target -- systemctl disable gpu-manager.service || true
    - curtin in-target -- systemctl mask gpu-manager.service || true
    - curtin in-target -- systemctl disable gdm3.service || true
    - curtin in-target -- systemctl mask gdm3.service || true
    - curtin in-target -- systemctl disable switcheroo-control.service || true
    - curtin in-target -- systemctl mask switcheroo-control.service || true
    - curtin in-target -- systemctl disable gnome-initial-setup-first-login.service || true
    - curtin in-target -- systemctl mask gnome-initial-setup-first-login.service || true
    - curtin in-target -- bash -c 'systemctl --global disable org.gnome.Shell@x11.service 2>/dev/null || true'
    - curtin in-target -- bash -c 'systemctl --global disable org.gnome.Shell@wayland.service 2>/dev/null || true'

    # =========================================================================
    # 7. XORG — AMD primary with glamor (same as Variant B)
    # =========================================================================
    - mkdir -p /target/etc/X11/xorg.conf.d

    - |
      cat > /target/etc/X11/xorg.conf.d/10-amdgpu-primary.conf << 'XORG_AMD'
      # Variant F: AMD Raphael iGPU — glamor enabled with firmware fix
      Section "Device"
          Identifier "AMD-iGPU"
          Driver "amdgpu"
          BusID "PCI:108:0:0"
          Option "TearFree" "true"
          Option "DRI" "3"
          Option "AccelMethod" "glamor"
          Option "VariableRefresh" "true"
          Option "PrimaryGPU" "yes"
      EndSection

      Section "Screen"
          Identifier "AMD-Screen"
          Device "AMD-iGPU"
          DefaultDepth 24
      EndSection

      Section "ServerLayout"
          Identifier "Layout"
          Screen "AMD-Screen"
      EndSection
      XORG_AMD

    # =========================================================================
    # 8. XFCE COMPOSITOR — ON with XRender (KEY CHANGE from Variant B)
    #
    # CRITICAL: vblank_mode=xpresent NOT glx!
    #   - glx creates an OpenGL context for vsync (GFX ring)
    #   - xpresent uses DRM page-flip events (no GL, no GFX ring)
    #
    # XRender compositing = CPU-side shadows/transparency.
    # Combined with glamor 2D accel, this gives the best visual quality
    # without the GFX ring pressure that caused GNOME to crash.
    # =========================================================================
    - mkdir -p /target/etc/xdg/xfce4/xfconf/xfce-perchannel-xml

    - |
      cat > /target/etc/xdg/xfce4/xfconf/xfce-perchannel-xml/xfwm4.xml << 'XFWM4_CONF'
      <?xml version="1.0" encoding="UTF-8"?>
      <channel name="xfwm4" version="1.0">
        <property name="general" type="empty">
          <property name="use_compositing" type="bool" value="true"/>
          <property name="vblank_mode" type="string" value="xpresent"/>
          <property name="sync_to_vblank" type="bool" value="true"/>
          <property name="shadow_delta_x" type="int" value="0"/>
          <property name="shadow_delta_y" type="int" value="-3"/>
          <property name="shadow_opacity" type="int" value="50"/>
          <property name="show_frame_shadow" type="bool" value="true"/>
          <property name="show_dock_shadow" type="bool" value="false"/>
          <property name="show_popup_shadow" type="bool" value="true"/>
          <property name="frame_opacity" type="int" value="100"/>
          <property name="inactive_opacity" type="int" value="90"/>
          <property name="move_opacity" type="int" value="80"/>
          <property name="resize_opacity" type="int" value="90"/>
          <property name="unredirect_overlays" type="bool" value="true"/>
          <property name="theme" type="string" value="Arc-Dark"/>
          <property name="title_font" type="string" value="Inter Bold 10"/>
          <property name="title_alignment" type="string" value="center"/>
          <property name="borderless_maximize" type="bool" value="true"/>
          <property name="placement_mode" type="string" value="center"/>
          <property name="snap_to_border" type="bool" value="true"/>
          <property name="snap_to_windows" type="bool" value="true"/>
          <property name="tile_on_move" type="bool" value="true"/>
          <property name="workspace_count" type="int" value="4"/>
        </property>
      </channel>
      XFWM4_CONF

    # =========================================================================
    # 9. XFCE Theme Configuration (NEW in Variant F)
    #
    # Arc-Dark GTK theme + Papirus-Dark icons + Inter font + font rendering
    # =========================================================================
    - |
      cat > /target/etc/xdg/xfce4/xfconf/xfce-perchannel-xml/xsettings.xml << 'XSETTINGS_CONF'
      <?xml version="1.0" encoding="UTF-8"?>
      <channel name="xsettings" version="1.0">
        <property name="Net" type="empty">
          <property name="ThemeName" type="string" value="Arc-Dark"/>
          <property name="IconThemeName" type="string" value="Papirus-Dark"/>
          <property name="CursorThemeName" type="string" value="Bibata-Modern-Classic"/>
          <property name="CursorSize" type="int" value="24"/>
          <property name="SoundThemeName" type="string" value="freedesktop"/>
          <property name="EnableEventSounds" type="bool" value="false"/>
          <property name="EnableInputFeedbackSounds" type="bool" value="false"/>
        </property>
        <property name="Gtk" type="empty">
          <property name="FontName" type="string" value="Inter 10"/>
          <property name="MonospaceFontName" type="string" value="JetBrains Mono 10"/>
          <property name="CursorThemeName" type="string" value="Bibata-Modern-Classic"/>
          <property name="CursorThemeSize" type="int" value="24"/>
          <property name="DecorationLayout" type="string" value="menu:minimize,maximize,close"/>
          <property name="DialogsUseHeader" type="bool" value="true"/>
        </property>
        <property name="Xft" type="empty">
          <property name="Antialias" type="int" value="1"/>
          <property name="HintStyle" type="string" value="hintslight"/>
          <property name="RGBA" type="string" value="rgb"/>
          <property name="Hinting" type="int" value="1"/>
          <property name="DPI" type="int" value="-1"/>
          <property name="Lcdfilter" type="string" value="lcddefault"/>
        </property>
      </channel>
      XSETTINGS_CONF

    # =========================================================================
    # 10. Plank dock autostart (macOS-style dock)
    # =========================================================================
    - mkdir -p /target/etc/xdg/autostart
    - |
      cat > /target/etc/xdg/autostart/plank.desktop << 'PLANK_AUTOSTART'
      [Desktop Entry]
      Type=Application
      Name=Plank
      Comment=Dock
      Exec=plank
      Icon=plank
      Categories=Utility;
      X-GNOME-Autostart-enabled=true
      X-XFCE-Autostart-Override=true
      PLANK_AUTOSTART

    # =========================================================================
    # 11. XFCE Panel Configuration (clean, modern layout)
    # =========================================================================
    - |
      cat > /target/etc/xdg/xfce4/xfconf/xfce-perchannel-xml/xfce4-panel.xml << 'PANEL_CONF'
      <?xml version="1.0" encoding="UTF-8"?>
      <channel name="xfce4-panel" version="1.0">
        <property name="configver" type="int" value="2"/>
        <property name="panels" type="array">
          <value type="int" value="1"/>
          <property name="panel-1" type="empty">
            <property name="position" type="string" value="p=6;x=0;y=0"/>
            <property name="length" type="uint" value="100"/>
            <property name="position-locked" type="bool" value="true"/>
            <property name="icon-size" type="uint" value="22"/>
            <property name="size" type="uint" value="28"/>
            <property name="background-style" type="uint" value="0"/>
          </property>
        </property>
      </channel>
      PANEL_CONF

    # =========================================================================
    # 12. Environment
    # =========================================================================
    - mkdir -p /target/etc/environment.d
    - |
      cat > /target/etc/environment.d/50-gpu-display.conf << 'GPU_DISPLAY'
      DRI_PRIME=0
      GPU_DISPLAY

    - |
      cat > /target/etc/environment.d/90-mutter-kms.conf << 'MUTTER_KMS'
      MUTTER_DEBUG_KMS_THREAD_TYPE=user
      MUTTER_KMS

    # =========================================================================
    # 13. Diagnostics and verification
    # =========================================================================
    - mkdir -p /target/var/log/ml-workstation-setup

    - |
      for usbpath in /cdrom /media/cdrom /mnt/usb; do
        if [ -f "${usbpath}/UbuntuAutoInstall/script/diag-v2/diagnostic-enhanced.sh" ]; then
          cp "${usbpath}/UbuntuAutoInstall/script/diag-v2/diagnostic-enhanced.sh" /target/usr/local/bin/diagnostic-enhanced.sh
          chmod 0755 /target/usr/local/bin/diagnostic-enhanced.sh
          break
        fi
      done

    - |
      for usbpath in /cdrom /media/cdrom /mnt/usb; do
        if [ -f "${usbpath}/UbuntuAutoInstall/script/diag-v2/verify-boot.sh" ]; then
          cp "${usbpath}/UbuntuAutoInstall/script/diag-v2/verify-boot.sh" /target/usr/local/bin/verify-boot.sh
          chmod 0755 /target/usr/local/bin/verify-boot.sh
          break
        fi
      done

    - |
      cat > /target/etc/systemd/system/ml-boot-verify.service << 'BOOT_VERIFY'
      [Unit]
      Description=ML Workstation Boot Verification (Variant F: Modern XFCE)
      After=multi-user.target display-manager.service
      Wants=display-manager.service

      [Service]
      Type=oneshot
      ExecStartPre=/bin/sleep 30
      ExecStart=/usr/local/bin/verify-boot.sh --variant F --auto
      RemainAfterExit=yes
      StandardOutput=journal+console

      [Install]
      WantedBy=multi-user.target
      BOOT_VERIFY
    - curtin in-target -- systemctl enable ml-boot-verify.service

    - |
      cat > /target/etc/systemd/system/ml-diagnostic-capture.service << 'DIAG_CAPTURE'
      [Unit]
      Description=ML Workstation Diagnostic Capture
      After=multi-user.target display-manager.service

      [Service]
      Type=oneshot
      ExecStartPre=/bin/sleep 60
      ExecStart=/bin/bash -c 'if [ -x /usr/local/bin/diagnostic-enhanced.sh ]; then /usr/local/bin/diagnostic-enhanced.sh --auto; fi'
      RemainAfterExit=yes

      [Install]
      WantedBy=multi-user.target
      DIAG_CAPTURE
    - curtin in-target -- systemctl enable ml-diagnostic-capture.service

    # =========================================================================
    # 14. Services
    # =========================================================================
    - curtin in-target -- systemctl enable ssh.service
    - curtin in-target -- systemctl enable fstrim.timer
    - curtin in-target -- systemctl enable NetworkManager.service
    - curtin in-target -- systemctl disable cups.service || true
    - curtin in-target -- systemctl disable avahi-daemon.service || true
    - curtin in-target -- systemctl disable ModemManager.service || true
    - curtin in-target -- systemctl disable bluetooth.service || true
    - curtin in-target -- systemctl disable wpa_supplicant.service || true

    - curtin in-target -- usermod -aG video,render,sudo abraham

    # =========================================================================
    # 15. Hardware log from early-commands
    # =========================================================================
    - cp /tmp/autoinstall-hw.log /target/var/log/ml-workstation-setup/autoinstall-hw.log 2>/dev/null || true

    # =========================================================================
    # 16. REBUILD INITRAMFS — MUST BE LAST
    # =========================================================================
    - curtin in-target -- update-initramfs -u -k all

  user-data:
    runcmd:
      - systemctl disable cloud-init.service || true
      - systemctl disable cloud-config.service || true
      - systemctl disable cloud-final.service || true
    preserve_hostname: true
    manage_etc_hosts: true

  reporting:
    hook:
      type: print

  shutdown: reboot

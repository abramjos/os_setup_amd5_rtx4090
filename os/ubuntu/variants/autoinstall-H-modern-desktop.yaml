#cloud-config
autoinstall:
  version: 1

  # =========================================================================
  # VARIANT H: MODERN DESKTOP (Dual-Session, Zero GFX Ring, Full ML Stack)
  #
  # PURPOSE: The "best of all worlds" variant. Combines:
  #   - Modern XFCE (X11) from Variant F — Plank dock, Arc-Dark, compositing
  #   - labwc pixman (Wayland) from Variant D — zero GFX ring, modern Wayland
  #   - NVIDIA headless + ML stack from Variant G — Docker, CUDA, sysctl
  #   - NEW: dual-session at LightDM, unified theme, waybar dock, wofi launcher
  #
  # ARCHITECTURE: Two desktop sessions sharing one visual identity.
  #   Users pick at LightDM login:
  #
  #   SESSION 1: "XFCE" (X11) — Safe Mode
  #     xfwm4 + XRender compositing (vblank=xpresent) = ZERO GFX ring
  #     AccelMethod "none" = ZERO GFX ring for 2D
  #     Plank dock (bottom) + XFCE panel (top)
  #     Full X11 system tray (nm-applet, blueman, etc.)
  #
  #   SESSION 2: "labwc (pixman)" (Wayland) — Modern Mode
  #     labwc + WLR_RENDERER=pixman = ZERO GFX ring
  #     waybar top bar (macOS-style) + waybar bottom dock (wlr/taskbar)
  #     wofi launcher (Spotlight-like) + mako notifications
  #     grim+slurp screenshots, cliphist clipboard history
  #
  # RISK: LOWEST for display — BOTH sessions have zero GFX ring pressure.
  #   The two-condition crash model (DCN stall + GFX pressure) is broken
  #   by eliminating GFX pressure entirely in both sessions.
  #   NVIDIA is headless compute only — no display processes.
  #
  # KNOWN LIMITATIONS:
  #   1. Screen sharing broken in labwc session (pixman can't provide DMABUF
  #      for xdg-desktop-portal-wlr screencast). Use XFCE session for that.
  #   2. nm-applet tray limited on Wayland — waybar network module + nmcli.
  #   3. Plank dock X11-only — labwc uses waybar bottom dock instead.
  #   4. Thunar on labwc via XWayland — drag-and-drop may have issues.
  #   5. swaylock-effects (blur) not in repos — solid color lock screen only.
  #
  # PREREQUISITES:
  #   1. Firmware auto-downloaded during install (USB or network)
  #   2. Optional pre-download: script/diag-v2/prepare-firmware-usb.sh
  #
  # THEME: Arc-Dark + Papirus-Dark + Bibata-Modern-Classic + Inter font
  #   Applied identically across both sessions for a unified experience.
  # =========================================================================

  interactive-sections: []

  locale: en_US.UTF-8
  keyboard:
    layout: us
    variant: ""
  timezone: America/New_York

  refresh-installer:
    update: true
    channel: stable

  source:
    id: ubuntu-desktop-minimal
    search_drivers: true

  kernel:
    package: linux-generic-hwe-24.04

  network:
    version: 2
    ethernets:
      eno1:
        dhcp4: true
        dhcp6: false
        optional: true

  proxy: ""

  apt:
    preserve_sources_list: false
    primary:
      - arches: [amd64]
        uri: http://archive.ubuntu.com/ubuntu
    security:
      - arches: [amd64]
        uri: http://security.ubuntu.com/ubuntu

  storage:
    version: 2
    config:
      - id: nvme-disk
        type: disk
        ptable: gpt
        serial: Samsung_SSD_990_PRO_2TB_S73WNJ0W206133V_1
        preserve: true
        wipe: none
        grub_device: false

      - id: efi-windows-part
        type: partition
        device: nvme-disk
        number: 1
        size: 100M
        preserve: true

      - id: msr-part
        type: partition
        device: nvme-disk
        number: 2
        size: 16M
        preserve: true

      - id: windows-part
        type: partition
        device: nvme-disk
        number: 3
        size: 975345549312
        preserve: true

      - id: winre-part
        type: partition
        device: nvme-disk
        number: 4
        size: 888M
        offset: 1999467708416
        preserve: true

      - id: efi-part
        type: partition
        device: nvme-disk
        size: 1G
        offset: 975468232704
        flag: esp
        grub_device: true

      - id: efi-format
        type: format
        volume: efi-part
        fstype: fat32
        label: EFI-UBUNTU

      - id: efi-mount
        type: mount
        device: efi-format
        path: /boot/efi

      - id: boot-part
        type: partition
        device: nvme-disk
        size: 2G
        offset: 976541974528

      - id: boot-format
        type: format
        volume: boot-part
        fstype: ext4
        label: BOOT

      - id: boot-mount
        type: mount
        device: boot-format
        path: /boot

      - id: swap-part
        type: partition
        device: nvme-disk
        size: 64G
        offset: 978689458176

      - id: swap-format
        type: format
        volume: swap-part
        fstype: swap
        label: SWAP

      - id: swap-mount
        type: mount
        device: swap-format
        path: none

      - id: root-part
        type: partition
        device: nvme-disk
        size: 200G
        offset: 1047408934912

      - id: root-format
        type: format
        volume: root-part
        fstype: ext4
        label: ROOT

      - id: root-mount
        type: mount
        device: root-format
        path: /

      - id: home-part
        type: partition
        device: nvme-disk
        size: -1
        offset: 1262157299712

      - id: home-format
        type: format
        volume: home-part
        fstype: ext4
        label: HOME

      - id: home-mount
        type: mount
        device: home-format
        path: /home

  identity:
    hostname: vortex
    realname: Abraham
    username: abraham
    password: "$6$tgmHIWX35Qendhwj$hSQ0dDsaUy2zJwnh8uRoMBEHybDjWXsmnjgi2fcECzmAZGrMfpuSDnOnTVG/uJ/G23Yf403i//i984JlbFvhy1"

  ssh:
    install-server: true
    allow-pw: true
    authorized-keys: []

  # Auto-install NVIDIA driver from Ubuntu repos
  drivers:
    install: true

  codecs:
    install: true

  updates: security

  packages:
    # --- System essentials ---
    - ubuntu-minimal
    - ubuntu-standard
    - apt-transport-https
    - ca-certificates
    - curl
    - wget
    - gnupg
    - software-properties-common
    - lsb-release
    - unzip
    - zstd
    - pciutils
    - usbutils
    - dmidecode
    - lm-sensors
    - cpufrequtils
    - acpi
    - smartmontools
    - ethtool
    - net-tools

    # --- Build tools ---
    - build-essential
    - dkms
    - gcc
    - g++
    - make
    - cmake
    - linux-headers-generic
    - linux-headers-generic-hwe-24.04

    # --- GPU/display stack ---
    - mesa-utils
    - mesa-vulkan-drivers
    - libgl1-mesa-dri
    - libgl1
    - libglx-mesa0
    - libdrm-dev
    - libdrm-amdgpu1
    - xserver-xorg
    - xserver-xorg-core
    - xserver-xorg-video-amdgpu
    - x11-utils
    - x11-xserver-utils
    - vainfo
    - vulkan-tools
    - clinfo

    # --- XFCE desktop (X11 session — "Safe Mode") ---
    - xfce4
    - xfce4-goodies
    - xfce4-terminal
    - xfce4-power-manager
    - xfce4-screenshooter
    - xfce4-taskmanager
    - xfce4-clipman-plugin
    - thunar-archive-plugin
    - mousepad
    - ristretto

    # --- labwc Wayland desktop (Wayland session — "Modern Mode") ---
    - labwc
    - waybar
    - foot
    - wofi
    - wl-clipboard
    - cliphist
    - xdg-desktop-portal-wlr
    - xdg-desktop-portal-gtk
    - swaybg
    - swayidle
    - swaylock
    - mako-notifier
    - grim
    - slurp
    - wf-recorder
    - thunar
    - xwayland
    - nwg-look

    # --- Modern theme packages ---
    - arc-theme
    - papirus-icon-theme
    - bibata-cursor-theme
    - fonts-inter
    - fonts-firacode
    - fonts-jetbrains-mono
    - plank

    # --- LightDM (dual-session display manager) ---
    - lightdm
    - lightdm-gtk-greeter
    - lightdm-gtk-greeter-settings

    # --- System infrastructure ---
    - policykit-1-gnome
    - gnome-keyring
    - seahorse
    - network-manager-gnome
    - blueman
    - pavucontrol
    - xarchiver

    # --- Firmware & kernel tools ---
    - linux-firmware
    - fwupd
    - initramfs-tools
    - mokutil
    - efibootmgr
    - amd64-microcode

    # --- Networking ---
    - openssh-server
    - openssh-client

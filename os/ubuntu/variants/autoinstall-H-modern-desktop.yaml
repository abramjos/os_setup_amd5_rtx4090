  snaps: []

  early-commands:
    - 'echo "=== Variant H: Modern Desktop — $(date -u +%Y-%m-%dT%H:%M:%SZ) ===" > /tmp/autoinstall-hw.log'
    - lspci -nn >> /tmp/autoinstall-hw.log 2>&1 || true
    - dmidecode -t system >> /tmp/autoinstall-hw.log 2>&1 || true
    - cat /proc/cpuinfo | head -30 >> /tmp/autoinstall-hw.log 2>&1 || true

  late-commands:

    # =========================================================================
    # 1. GRUB — Full dual-GPU + NVIDIA modesetting (from Variant G)
    # =========================================================================
    - >-
      curtin in-target -- bash -c '
      GRUB_PARAMS="quiet splash amdgpu.sg_display=0 amdgpu.dcdebugmask=0x18 amdgpu.ppfeaturemask=0xfffd7fff amdgpu.gpu_recovery=1 amdgpu.seamless=1 amdgpu.lockup_timeout=30000 nvidia-drm.modeset=1 nvidia-drm.fbdev=1 pcie_aspm=off iommu=pt processor.max_cstate=1 amd_pstate=active modprobe.blacklist=nouveau,nova_core nogpumanager initcall_blacklist=simpledrm_platform_driver_init";
      grep -q "^GRUB_CMDLINE_LINUX_DEFAULT=" /etc/default/grub
      && sed -i "s|^GRUB_CMDLINE_LINUX_DEFAULT=.*|GRUB_CMDLINE_LINUX_DEFAULT=\"${GRUB_PARAMS}\"|" /etc/default/grub
      || echo "GRUB_CMDLINE_LINUX_DEFAULT=\"${GRUB_PARAMS}\"" >> /etc/default/grub'

    - curtin in-target -- bash -c 'grep -q "^GRUB_TIMEOUT=" /etc/default/grub && sed -i "s|^GRUB_TIMEOUT=.*|GRUB_TIMEOUT=5|" /etc/default/grub || echo "GRUB_TIMEOUT=5" >> /etc/default/grub'
    - curtin in-target -- bash -c 'grep -q "^GRUB_TIMEOUT_STYLE=" /etc/default/grub && sed -i "s|^GRUB_TIMEOUT_STYLE=.*|GRUB_TIMEOUT_STYLE=menu|" /etc/default/grub || echo "GRUB_TIMEOUT_STYLE=menu" >> /etc/default/grub'
    - curtin in-target -- update-grub

    # =========================================================================
    # 2. MODPROBE — amdgpu + nvidia with softdep ordering (from Variant G)
    # =========================================================================
    - |
      cat > /target/etc/modprobe.d/amdgpu.conf << 'MODPROBE_AMDGPU'
      # Variant H: Modern Desktop — AMD iGPU for display
      options amdgpu sg_display=0
      options amdgpu ppfeaturemask=0xfffd7fff
      options amdgpu dcdebugmask=0x18
      options amdgpu gpu_recovery=1
      options amdgpu lockup_timeout=30000
      options amdgpu seamless=1
      options amdgpu dc=1
      options amdgpu audio=1
      MODPROBE_AMDGPU

    - |
      cat > /target/etc/modprobe.d/nvidia.conf << 'MODPROBE_NVIDIA'
      # Variant H: NVIDIA RTX 4090 — headless compute
      softdep nvidia pre: amdgpu
      softdep nvidia_drm pre: amdgpu
      blacklist nouveau
      options nouveau modeset=0
      options nvidia NVreg_UsePageAttributeTable=1
      options nvidia NVreg_InitializeSystemMemoryAllocations=0
      options nvidia NVreg_DynamicPowerManagement=0x02
      options nvidia NVreg_EnableGpuFirmware=1
      options nvidia NVreg_PreserveVideoMemoryAllocations=1
      options nvidia NVreg_TemporaryFilePath=/var/tmp
      options nvidia NVreg_RegistryDwords="RmGpuComputeExecTimeout=0"
      options nvidia_drm modeset=1
      options nvidia_drm fbdev=1
      MODPROBE_NVIDIA

    - |
      cat > /target/etc/modprobe.d/blacklist-nouveau.conf << 'BLACKLIST_NOUVEAU'
      blacklist nouveau
      blacklist nova_core
      blacklist lbm-nouveau
      alias nouveau off
      alias lbm-nouveau off
      BLACKLIST_NOUVEAU

    # =========================================================================
    # 3. INITRAMFS — amdgpu FIRST, then nvidia (from Variant G)
    # =========================================================================
    - |
      cat > /target/etc/initramfs-tools/modules << 'INITRAMFS_MODULES'
      # GPU module load order — amdgpu FIRST for card0 (display)
      amdgpu
      nvidia
      nvidia_uvm
      nvidia_modeset
      nvidia_drm
      INITRAMFS_MODULES

    - |
      cat > /target/etc/modules-load.d/gpu.conf << 'MODULES_LOAD'
      amdgpu
      nvidia
      nvidia_uvm
      nvidia_modeset
      nvidia_drm
      MODULES_LOAD

    # =========================================================================
    # 4. FIRMWARE UPDATE — kernel.org first, GitHub second, USB fallback
    # =========================================================================
    - |
      echo "=== Variant H: Firmware update ===" >> /tmp/autoinstall-hw.log
      FIRMWARE_FOUND=false
      FWDEST="/target/lib/firmware/amdgpu"
      FW_TAG="20250509"
      FW_BASE_URL="https://git.kernel.org/pub/scm/linux/kernel/git/firmware/linux-firmware.git/plain"
      BLOBS="dcn_3_1_5_dmcub psp_13_0_5_toc psp_13_0_5_ta psp_13_0_5_asd gc_10_3_6_ce gc_10_3_6_me gc_10_3_6_mec gc_10_3_6_mec2 gc_10_3_6_pfp gc_10_3_6_rlc sdma_5_2_6 vcn_3_1_2"

      # --- Try kernel.org first (primary) ---
      FWDIR="/tmp/firmware-download"
      mkdir -p "$FWDIR"
      echo "Downloading from kernel.org (tag $FW_TAG)..." >> /tmp/autoinstall-hw.log
      DL_OK=0
      for blob in $BLOBS; do
        if curl -sfL -o "$FWDIR/${blob}.bin" "${FW_BASE_URL}/amdgpu/${blob}.bin?h=${FW_TAG}" 2>>/tmp/autoinstall-hw.log; then
          DL_OK=$((DL_OK + 1))
        fi
      done
      [ "$DL_OK" -gt 0 ] && FIRMWARE_FOUND=true && echo "Source: kernel.org ($DL_OK blobs)" >> /tmp/autoinstall-hw.log

      # --- GitHub repo fallback ---
      if [ "$FIRMWARE_FOUND" = "false" ]; then
        echo "kernel.org failed — trying GitHub repo..." >> /tmp/autoinstall-hw.log
        GH_BASE_URL="https://raw.githubusercontent.com/abramjos/os_setup_amd5_rtx4090/master/firmware/amdgpu"
        DL_OK=0
        for blob in $BLOBS; do
          if curl -sfL -o "$FWDIR/${blob}.bin" "${GH_BASE_URL}/${blob}.bin" 2>>/tmp/autoinstall-hw.log; then
            DL_OK=$((DL_OK + 1))
          fi
        done
        [ "$DL_OK" -gt 0 ] && FIRMWARE_FOUND=true && echo "Source: GitHub ($DL_OK blobs)" >> /tmp/autoinstall-hw.log
      fi

      # --- USB fallback ---
      if [ "$FIRMWARE_FOUND" = "false" ]; then
        echo "Network failed — checking USB..." >> /tmp/autoinstall-hw.log
        for usbpath in /cdrom /media/cdrom /mnt/usb; do
          FWDIR="${usbpath}/UbuntuAutoInstall/firmware/amdgpu"
          if [ -d "$FWDIR" ] && ls "$FWDIR"/*.bin >/dev/null 2>&1; then
            echo "Source: USB ($FWDIR)" >> /tmp/autoinstall-hw.log
            FIRMWARE_FOUND=true
            break
          fi
        done
      fi

      if [ "$FIRMWARE_FOUND" = "true" ]; then
        BACKUP="/target/var/log/ml-workstation-setup/firmware-backup"
        mkdir -p "$BACKUP"
        cp -a "$FWDEST"/dcn_3_1_5_dmcub.bin* "$BACKUP/" 2>/dev/null || true
        cp -a "$FWDEST"/psp_13_0_5_*.bin* "$BACKUP/" 2>/dev/null || true
        cp -a "$FWDEST"/gc_10_3_6_*.bin* "$BACKUP/" 2>/dev/null || true
        for blob in "$FWDIR"/*.bin; do
          [ -f "$blob" ] || continue
          bname=$(basename "$blob")
          cp "$blob" "$FWDEST/$bname"
          if zstd -f "$FWDEST/$bname" -o "$FWDEST/${bname}.zst" 2>>/tmp/autoinstall-hw.log; then
            rm -f "$FWDEST/$bname"
            echo "  Installed: $bname -> ${bname}.zst" >> /tmp/autoinstall-hw.log
          fi
        done
        ls -la "$FWDEST"/dcn_3_1_5_dmcub.bin* >> /tmp/autoinstall-hw.log 2>&1
      else
        echo "WARNING: No firmware available — zero-GFX-ring desktops still safe" >> /tmp/autoinstall-hw.log
      fi

    # =========================================================================
    # 5. LightDM — Dual-session (XFCE X11 + labwc Wayland)
    #
    # LightDM GTK greeter runs briefly on X11 (negligible GPU impact).
    # Presents BOTH /usr/share/xsessions/ AND /usr/share/wayland-sessions/.
    # Default session: XFCE (safe mode).
    # =========================================================================
    - curtin in-target -- bash -c 'echo "/usr/sbin/lightdm" > /etc/X11/default-display-manager'
    - curtin in-target -- dpkg-reconfigure -f noninteractive lightdm || true

    - mkdir -p /target/etc/lightdm/lightdm.conf.d
    - |
      cat > /target/etc/lightdm/lightdm.conf.d/50-dual-session.conf << 'LIGHTDM_DUAL'
      [Seat:*]
      user-session=xfce
      greeter-session=lightdm-gtk-greeter
      LIGHTDM_DUAL

    # Themed LightDM greeter (Arc-Dark)
    - |
      cat > /target/etc/lightdm/lightdm-gtk-greeter.conf << 'GREETER_CONF'
      [greeter]
      theme-name = Arc-Dark
      icon-theme-name = Papirus-Dark
      cursor-theme-name = Bibata-Modern-Classic
      cursor-theme-size = 24
      font-name = Inter 11
      background = #2f343f
      user-background = false
      position = 50%,center 50%,center
      xft-antialias = true
      xft-hintstyle = hintslight
      xft-rgba = rgb
      panel-position = top
      clock-format = %a %d %b, %H:%M
      GREETER_CONF

    # Remove GNOME session files (they would crash)
    - curtin in-target -- bash -c 'rm -f /usr/share/xsessions/ubuntu.desktop 2>/dev/null || true'
    - curtin in-target -- bash -c 'rm -f /usr/share/xsessions/ubuntu-xorg.desktop 2>/dev/null || true'
    - curtin in-target -- bash -c 'dpkg-divert --rename --divert /usr/share/xsessions/gnome.desktop.disabled /usr/share/xsessions/gnome.desktop 2>/dev/null || true'
    - curtin in-target -- bash -c 'dpkg-divert --rename --divert /usr/share/xsessions/gnome-xorg.desktop.disabled /usr/share/xsessions/gnome-xorg.desktop 2>/dev/null || true'

    # =========================================================================
    # 6. labwc Wayland session .desktop file
    # =========================================================================
    - mkdir -p /target/usr/share/wayland-sessions
    - |
      cat > /target/usr/share/wayland-sessions/labwc-pixman.desktop << 'LABWC_SESSION'
      [Desktop Entry]
      Name=labwc (Modern Desktop)
      Comment=labwc stacking Wayland compositor with CPU-only rendering — zero GFX ring
      Exec=env WLR_RENDERER=pixman labwc
      Type=Application
      DesktopNames=wlroots
      LABWC_SESSION

    # =========================================================================
    # 7. labwc configuration (rc.xml, environment, autostart)
    # =========================================================================
    - mkdir -p /target/etc/xdg/labwc

    - |
      cat > /target/etc/xdg/labwc/rc.xml << 'LABWC_RC'
      <?xml version="1.0"?>
      <labwc_config>
        <core>
          <gap>4</gap>
          <reuseOutputMode>yes</reuseOutputMode>
        </core>
        <theme>
          <name>Arc-Dark</name>
          <cornerRadius>8</cornerRadius>
          <font place="ActiveWindow">
            <name>Inter</name>
            <size>10</size>
            <weight>Bold</weight>
          </font>
          <font place="InactiveWindow">
            <name>Inter</name>
            <size>10</size>
          </font>
          <font place="MenuItem">
            <name>Inter</name>
            <size>10</size>
          </font>
        </theme>
        <focus>
          <followMouse>no</followMouse>
          <raiseOnFocus>no</raiseOnFocus>
        </focus>
        <placement>
          <policy>center</policy>
        </placement>
        <keyboard>
          <!-- Window management -->
          <keybind key="A-F4">
            <action name="Close"/>
          </keybind>
          <keybind key="A-Tab">
            <action name="NextWindow"/>
          </keybind>
          <!-- Terminal -->
          <keybind key="W-Return">
            <action name="Execute"><command>foot</command></action>
          </keybind>
          <keybind key="A-Return">
            <action name="Execute"><command>foot</command></action>
          </keybind>
          <!-- App launcher (Spotlight-like) -->
          <keybind key="W-d">
            <action name="Execute"><command>wofi --show drun</command></action>
          </keybind>
          <keybind key="W-space">
            <action name="Execute"><command>wofi --show drun</command></action>
          </keybind>
          <!-- File manager -->
          <keybind key="W-e">
            <action name="Execute"><command>thunar</command></action>
          </keybind>
          <!-- Workspace switching -->
          <keybind key="W-1">
            <action name="GoToDesktop"><to>1</to></action>
          </keybind>
          <keybind key="W-2">
            <action name="GoToDesktop"><to>2</to></action>
          </keybind>
          <keybind key="W-3">
            <action name="GoToDesktop"><to>3</to></action>
          </keybind>
          <keybind key="W-4">
            <action name="GoToDesktop"><to>4</to></action>
          </keybind>
          <!-- Snap to edges -->
          <keybind key="W-Left">
            <action name="SnapToEdge"><direction>left</direction></action>
          </keybind>
          <keybind key="W-Right">
            <action name="SnapToEdge"><direction>right</direction></action>
          </keybind>
          <keybind key="W-Up">
            <action name="ToggleMaximize"/>
          </keybind>
          <!-- Lock screen -->
          <keybind key="W-l">
            <action name="Execute"><command>swaylock -f -c 1a1a2e</command></action>
          </keybind>
          <!-- Screenshots -->
          <keybind key="Print">
            <action name="Execute"><command>grim ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png</command></action>
          </keybind>
          <keybind key="W-Print">
            <action name="Execute"><command>sh -c 'grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png'</command></action>
          </keybind>
          <!-- Clipboard history -->
          <keybind key="W-v">
            <action name="Execute"><command>sh -c 'cliphist list | wofi --dmenu | cliphist decode | wl-copy'</command></action>
          </keybind>
        </keyboard>
        <mouse>
          <default/>
        </mouse>
        <desktops number="4"/>
        <resistance>
          <screenEdgeStrength>20</screenEdgeStrength>
        </resistance>
      </labwc_config>
      LABWC_RC

    - |
      cat > /target/etc/xdg/labwc/environment << 'LABWC_ENV'
      WLR_RENDERER=pixman
      XDG_CURRENT_DESKTOP=wlroots
      DRI_PRIME=0
      MOZ_ENABLE_WAYLAND=1
      QT_QPA_PLATFORM=wayland
      QT_QPA_PLATFORMTHEME=gtk3
      _JAVA_AWT_WM_NONREPARENTING=1
      GTK_THEME=Arc-Dark
      XCURSOR_THEME=Bibata-Modern-Classic
      XCURSOR_SIZE=24
      LABWC_ENV

    - |
      cat > /target/etc/xdg/labwc/autostart << 'LABWC_AUTOSTART'
      # ==============================
      # Variant H: labwc autostart
      # ==============================

      # Top bar (macOS-style: workspaces left, clock center, tray right)
      waybar -c /etc/xdg/labwc/waybar-top.jsonc -s /etc/xdg/labwc/waybar-top.css &

      # Bottom dock (icon-only taskbar via wlr/taskbar)
      waybar -c /etc/xdg/labwc/waybar-dock.jsonc -s /etc/xdg/labwc/waybar-dock.css &

      # Notification daemon
      mako --config /etc/xdg/labwc/mako.conf &

      # Clipboard history
      wl-paste --watch cliphist store &

      # Wallpaper
      swaybg -m fill -i /usr/share/backgrounds/warty-final-ubuntu.png &

      # Idle management (lock after 5 min, suspend after 15)
      swayidle -w \
        timeout 300 'swaylock -f -c 1a1a2e' \
        timeout 900 'systemctl suspend' \
        before-sleep 'swaylock -f -c 1a1a2e' &

      # Polkit authentication agent
      /usr/lib/policykit-1-gnome/polkit-gnome-authentication-agent-1 &

      # GNOME Keyring (for password storage)
      gnome-keyring-daemon --start --components=secrets,pkcs11 &

      # GTK theme for Wayland apps (gsettings is the correct method)
      gsettings set org.gnome.desktop.interface gtk-theme 'Arc-Dark' 2>/dev/null
      gsettings set org.gnome.desktop.interface icon-theme 'Papirus-Dark' 2>/dev/null
      gsettings set org.gnome.desktop.interface cursor-theme 'Bibata-Modern-Classic' 2>/dev/null
      gsettings set org.gnome.desktop.interface cursor-size 24 2>/dev/null
      gsettings set org.gnome.desktop.interface font-name 'Inter 10' 2>/dev/null
      gsettings set org.gnome.desktop.interface monospace-font-name 'JetBrains Mono 10' 2>/dev/null

      # D-Bus environment export (labwc does this on DRM backend, but belt-and-suspenders)
      dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=wlroots
      LABWC_AUTOSTART
    - chmod 0755 /target/etc/xdg/labwc/autostart


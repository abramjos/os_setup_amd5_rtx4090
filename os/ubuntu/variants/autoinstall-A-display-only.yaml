#cloud-config
autoinstall:
  version: 1

  # =========================================================================
  # VARIANT A: DISPLAY-ONLY (No NVIDIA)
  #
  # STATUS: TESTED — PASS (2026-03-29, runLog-01)
  #   Zero ring timeouts, zero GPU resets, zero device wedges.
  #   Single DMUB init (clean). Crash loop is BROKEN.
  #   See: os/ubuntu/DIAGNOSIS-PROGNOSIS.md for full results.
  #
  # PURPOSE: Isolate AMD iGPU display stability without ANY NVIDIA interference.
  #   - NO NVIDIA driver, NO nvidia modules, NO nvidia in initramfs
  #   - XFCE with compositing OFF, AccelMethod "none" (software rendering)
  #   - Explicit BusID for AMD iGPU in Xorg config
  #   - Stock DMCUB firmware 0.0.15.0 (from linux-firmware package — NOT updated)
  #
  # WHAT THIS TESTS:
  #   - Is the optc31_disable_crtc timeout caused by NVIDIA module coexistence?
  #   - Is the ring timeout caused by Xorg glamor GFX ring submissions?
  #   - Does card ordering matter when NVIDIA is absent?
  #
  # TEST RESULTS (runLog-01, 2026-03-29):
  #   - optc31_disable_crtc REG_WAIT timeout: 1 (at T+5.095s, deterministic)
  #   - Ring gfx_0.0.0 timeout: 0 (PASS)
  #   - MODE2 GPU reset: 0 (PASS — none needed)
  #   - DMUB hardware init: 1 (clean, single init — no re-init loop)
  #   - DRM card0 = amdgpu (PASS — initcall_blacklist working)
  #   - Display: 3840x2160 on HDMI-A-1 (4K, DRM auto-detect)
  #   - DMCUB loaded: 0x05000F00 = version 0.0.15.0 (critically outdated)
  #   - reset_method=1 (MODE0) NOT SUPPORTED on Raphael APU
  #   - seamless=-1 (auto) = enabled on Raphael, but optc31 still fires
  #     (DMCUB 0.0.15.0 too old for proper seamless handoff)
  #
  # CONCLUSION: The crash loop requires BOTH conditions simultaneously:
  #   1. DCN pipeline stall (optc31 timeout from outdated DMCUB)
  #   2. GFX ring pressure (compositor GL commands)
  #   AccelMethod "none" eliminates condition 2. System is stable.
  #   NEXT: Variant B (firmware update) to eliminate condition 1.
  #
  # DIFFERENCES FROM PRODUCTION autoinstall.yaml:
  #   - drivers.install: false (no NVIDIA auto-detection)
  #   - No nvidia packages, no nvidia modprobe, no nvidia in initramfs
  #   - AccelMethod "none" in Xorg (pure software rendering)
  #   - Removed video= mode forcing (was rejected anyway)
  #   - Added amdgpu.dcdebugmask=0x18 (disable PSR + DCN clock gating)
  #   - Removed amdgpu.seamless=1 (not working with old firmware)
  #   - Stock firmware only (no USB firmware update in this variant)
  #   - Enhanced diagnostic capture on first boot
  # =========================================================================

  interactive-sections: []

  locale: en_US.UTF-8
  keyboard:
    layout: us
    variant: ""
  timezone: America/New_York

  refresh-installer:
    update: true
    channel: stable

  source:
    id: ubuntu-desktop-minimal
    search_drivers: false

  kernel:
    package: linux-generic-hwe-24.04

  network:
    version: 2
    ethernets:
      eno1:
        dhcp4: true
        dhcp6: false
        optional: true

  proxy: ""

  apt:
    preserve_sources_list: false
    primary:
      - arches: [amd64]
        uri: http://archive.ubuntu.com/ubuntu
    security:
      - arches: [amd64]
        uri: http://security.ubuntu.com/ubuntu

  # ---------------------------------------------------------------------------
  # STORAGE — Same as production (dual-boot preserving Windows)
  # ---------------------------------------------------------------------------
  storage:
    version: 2
    config:
      - id: nvme-disk
        type: disk
        ptable: gpt
        serial: Samsung_SSD_990_PRO_2TB_S73WNJ0W206133V_1
        preserve: true
        wipe: none
        grub_device: false

      - id: efi-windows-part
        type: partition
        device: nvme-disk
        number: 1
        size: 100M
        preserve: true

      - id: msr-part
        type: partition
        device: nvme-disk
        number: 2
        size: 16M
        preserve: true

      - id: windows-part
        type: partition
        device: nvme-disk
        number: 3
        size: 975345549312
        preserve: true

      - id: winre-part
        type: partition
        device: nvme-disk
        number: 4
        size: 888M
        offset: 1999467708416
        preserve: true

      - id: efi-part
        type: partition
        device: nvme-disk
        size: 1G
        offset: 975468232704
        flag: esp
        grub_device: true

      - id: efi-format
        type: format
        volume: efi-part
        fstype: fat32
        label: EFI-UBUNTU

      - id: efi-mount
        type: mount
        device: efi-format
        path: /boot/efi

      - id: boot-part
        type: partition
        device: nvme-disk
        size: 2G
        offset: 976541974528

      - id: boot-format
        type: format
        volume: boot-part
        fstype: ext4
        label: BOOT

      - id: boot-mount
        type: mount
        device: boot-format
        path: /boot

      - id: swap-part
        type: partition
        device: nvme-disk
        size: 64G
        offset: 978689458176

      - id: swap-format
        type: format
        volume: swap-part
        fstype: swap
        label: SWAP

      - id: swap-mount
        type: mount
        device: swap-format
        path: none

      - id: root-part
        type: partition
        device: nvme-disk
        size: 200G
        offset: 1047408934912

      - id: root-format
        type: format
        volume: root-part
        fstype: ext4
        label: ROOT

      - id: root-mount
        type: mount
        device: root-format
        path: /

      - id: home-part
        type: partition
        device: nvme-disk
        size: -1
        offset: 1262157299712

      - id: home-format
        type: format
        volume: home-part
        fstype: ext4
        label: HOME

      - id: home-mount
        type: mount
        device: home-format
        path: /home

  identity:
    hostname: vortex
    realname: Abraham
    username: abraham
    password: "$6$tgmHIWX35Qendhwj$hSQ0dDsaUy2zJwnh8uRoMBEHybDjWXsmnjgi2fcECzmAZGrMfpuSDnOnTVG/uJ/G23Yf403i//i984JlbFvhy1"

  ssh:
    install-server: true
    allow-pw: true
    authorized-keys: []

  # NO NVIDIA driver auto-detection
  drivers:
    install: false

  codecs:
    install: true

  updates: security

  packages:
    # --- System essentials ---
    - ubuntu-minimal
    - ubuntu-standard
    - apt-transport-https
    - ca-certificates
    - curl
    - wget
    - gnupg
    - software-properties-common
    - lsb-release
    - unzip
    - zstd
    - pciutils
    - usbutils
    - dmidecode
    - lm-sensors
    - cpufrequtils
    - acpi
    - smartmontools
    - ethtool
    - net-tools

    # --- Build tools ---
    - build-essential
    - dkms
    - gcc
    - g++
    - make
    - linux-headers-generic
    - linux-headers-generic-hwe-24.04

    # --- GPU/display stack (AMD ONLY — no NVIDIA) ---
    - mesa-utils
    - mesa-vulkan-drivers
    - libgl1-mesa-dri
    - libgl1
    - libglx-mesa0
    - libdrm-dev
    - libdrm-amdgpu1
    - xserver-xorg
    - xserver-xorg-core
    - xserver-xorg-video-amdgpu
    - x11-utils
    - x11-xserver-utils
    - vainfo
    - vulkan-tools
    - clinfo

    # --- XFCE desktop (lightweight, no GL compositing) ---
    - xfce4
    - xfce4-goodies
    - xfce4-terminal
    - xfce4-power-manager
    - xfce4-screenshooter
    - xfce4-taskmanager
    - thunar-archive-plugin
    - lightdm
    - lightdm-gtk-greeter
    - lightdm-gtk-greeter-settings

    # --- Firmware & kernel tools ---
    - linux-firmware
    - fwupd
    - initramfs-tools
    - mokutil
    - efibootmgr
    - amd64-microcode

    # --- Networking & remote access ---
    - openssh-server
    - openssh-client
    - network-manager
    - firewalld
    - rsync
    - tmux
    - screen

    # --- Storage ---
    - nvme-cli
    - hdparm
    - parted
    - gdisk
    - e2fsprogs
    - dosfstools

    # --- Monitoring & diagnostics ---
    - htop
    - iotop
    - sysstat
    - strace
    - inxi
    - linux-tools-generic-hwe-24.04

    # --- Dev tools ---
    - git
    - vim
    - nano
    - jq
    - tree
    - xxd
    - bc

  snaps: []

  early-commands:
    - 'echo "=== Variant A: Display-Only (No NVIDIA) — $(date -u +%Y-%m-%dT%H:%M:%SZ) ===" > /tmp/autoinstall-hw.log'
    - lspci -nn >> /tmp/autoinstall-hw.log 2>&1 || true
    - dmidecode -t system >> /tmp/autoinstall-hw.log 2>&1 || true
    - cat /proc/cpuinfo | head -30 >> /tmp/autoinstall-hw.log 2>&1 || true

  late-commands:

    # =========================================================================
    # 1. GRUB — AMD-only parameters, no NVIDIA, no seamless (not working)
    #
    # KEY CHANGES from production:
    #   - REMOVED: amdgpu.seamless=1 (not effective with current DMCUB)
    #   - REMOVED: video=HDMI-A-1:1920x1080@60 (was rejected by DRM)
    #   - REMOVED: nvidia-drm.* (no NVIDIA)
    #   - REMOVED: modprobe.blacklist=nouveau,nova_core (no NVIDIA)
    #   - CHANGED: amdgpu.dcdebugmask=0x18 (0x10+0x08 = disable PSR + clock gating)
    # =========================================================================
    - >-
      curtin in-target -- bash -c '
      GRUB_PARAMS="quiet splash amdgpu.sg_display=0 amdgpu.dcdebugmask=0x18 amdgpu.ppfeaturemask=0xfffd7fff amdgpu.gpu_recovery=1 amdgpu.lockup_timeout=30000 pcie_aspm=off iommu=pt processor.max_cstate=1 amd_pstate=active nogpumanager initcall_blacklist=simpledrm_platform_driver_init";
      grep -q "^GRUB_CMDLINE_LINUX_DEFAULT=" /etc/default/grub
      && sed -i "s|^GRUB_CMDLINE_LINUX_DEFAULT=.*|GRUB_CMDLINE_LINUX_DEFAULT=\"${GRUB_PARAMS}\"|" /etc/default/grub
      || echo "GRUB_CMDLINE_LINUX_DEFAULT=\"${GRUB_PARAMS}\"" >> /etc/default/grub'

    - curtin in-target -- bash -c 'grep -q "^GRUB_TIMEOUT=" /etc/default/grub && sed -i "s|^GRUB_TIMEOUT=.*|GRUB_TIMEOUT=5|" /etc/default/grub || echo "GRUB_TIMEOUT=5" >> /etc/default/grub'
    - curtin in-target -- bash -c 'grep -q "^GRUB_TIMEOUT_STYLE=" /etc/default/grub && sed -i "s|^GRUB_TIMEOUT_STYLE=.*|GRUB_TIMEOUT_STYLE=menu|" /etc/default/grub || echo "GRUB_TIMEOUT_STYLE=menu" >> /etc/default/grub'
    - curtin in-target -- update-grub

    # =========================================================================
    # 2. MODPROBE — amdgpu only, blacklist nouveau
    # =========================================================================
    - |
      cat > /target/etc/modprobe.d/amdgpu.conf << 'MODPROBE_AMDGPU'
      # Variant A: AMD-only display (no NVIDIA)
      options amdgpu sg_display=0
      options amdgpu ppfeaturemask=0xfffd7fff
      options amdgpu dcdebugmask=0x18
      options amdgpu gpu_recovery=1
      options amdgpu lockup_timeout=30000
      options amdgpu dc=1
      options amdgpu audio=1
      MODPROBE_AMDGPU

    # Blacklist nouveau even without NVIDIA driver (prevents module probe)
    - |
      cat > /target/etc/modprobe.d/blacklist-nouveau.conf << 'BLACKLIST_NOUVEAU'
      blacklist nouveau
      blacklist nova_core
      blacklist lbm-nouveau
      alias nouveau off
      alias lbm-nouveau off
      BLACKLIST_NOUVEAU

    # =========================================================================
    # 3. INITRAMFS — AMD ONLY (no nvidia modules)
    # =========================================================================
    - |
      cat > /target/etc/initramfs-tools/modules << 'INITRAMFS_MODULES'
      # Variant A: AMD-only (no NVIDIA in initramfs)
      amdgpu
      INITRAMFS_MODULES

    # =========================================================================
    # 3b. MODULES-LOAD.D — Ensure amdgpu loads at boot
    # =========================================================================
    - |
      cat > /target/etc/modules-load.d/gpu.conf << 'MODULES_LOAD'
      amdgpu
      MODULES_LOAD

    # =========================================================================
    # 4. LightDM + XFCE as default session
    # =========================================================================
    - curtin in-target -- bash -c 'echo "/usr/sbin/lightdm" > /etc/X11/default-display-manager'
    - curtin in-target -- dpkg-reconfigure -f noninteractive lightdm || true

    - mkdir -p /target/etc/lightdm/lightdm.conf.d
    - |
      cat > /target/etc/lightdm/lightdm.conf.d/50-xfce-session.conf << 'LIGHTDM_XFCE'
      [Seat:*]
      user-session=xfce
      greeter-session=lightdm-gtk-greeter
      LIGHTDM_XFCE

    # Remove GNOME session files
    - curtin in-target -- bash -c 'rm -f /usr/share/xsessions/ubuntu.desktop 2>/dev/null || true'
    - curtin in-target -- bash -c 'rm -f /usr/share/xsessions/ubuntu-xorg.desktop 2>/dev/null || true'
    - curtin in-target -- bash -c 'dpkg-divert --rename --divert /usr/share/xsessions/gnome.desktop.disabled /usr/share/xsessions/gnome.desktop 2>/dev/null || true'
    - curtin in-target -- bash -c 'dpkg-divert --rename --divert /usr/share/xsessions/gnome-xorg.desktop.disabled /usr/share/xsessions/gnome-xorg.desktop 2>/dev/null || true'

    # =========================================================================
    # 5. Disable gpu-manager, GDM, GNOME services
    # =========================================================================
    - curtin in-target -- systemctl disable gpu-manager.service || true
    - curtin in-target -- systemctl mask gpu-manager.service || true
    - curtin in-target -- systemctl disable gdm3.service || true
    - curtin in-target -- systemctl mask gdm3.service || true
    - curtin in-target -- systemctl disable switcheroo-control.service || true
    - curtin in-target -- systemctl mask switcheroo-control.service || true
    - curtin in-target -- systemctl disable gnome-initial-setup-first-login.service || true
    - curtin in-target -- systemctl mask gnome-initial-setup-first-login.service || true
    - curtin in-target -- bash -c 'systemctl --global disable org.gnome.Shell@x11.service 2>/dev/null || true'
    - curtin in-target -- bash -c 'systemctl --global disable org.gnome.Shell@wayland.service 2>/dev/null || true'

    # =========================================================================
    # 6. XORG — AMD primary, explicit BusID, AccelMethod NONE
    #
    # KEY CHANGE: AccelMethod "none" disables glamor entirely.
    # This means ZERO GFX ring submissions from Xorg.
    # Display uses software rendering only (CPU-based).
    # This is the safest possible configuration for isolating the DCN bug.
    # =========================================================================
    - mkdir -p /target/etc/X11/xorg.conf.d

    - |
      cat > /target/etc/X11/xorg.conf.d/10-amdgpu-primary.conf << 'XORG_AMD'
      # Variant A: AMD Raphael iGPU — SOLE GPU, software acceleration
      # BusID 108:0:0 = PCI 6c:00.0 (0x6c = 108 decimal)
      Section "Device"
          Identifier "AMD-iGPU"
          Driver "amdgpu"
          BusID "PCI:108:0:0"
          Option "AccelMethod" "none"
          Option "PrimaryGPU" "yes"
      EndSection

      Section "Screen"
          Identifier "AMD-Screen"
          Device "AMD-iGPU"
          DefaultDepth 24
      EndSection

      Section "ServerLayout"
          Identifier "Layout"
          Screen "AMD-Screen"
      EndSection
      XORG_AMD

    # =========================================================================
    # 7. XFCE compositor — disabled
    # =========================================================================
    - mkdir -p /target/etc/xdg/xfce4/xfconf/xfce-perchannel-xml
    - |
      cat > /target/etc/xdg/xfce4/xfconf/xfce-perchannel-xml/xfwm4.xml << 'XFWM4_CONF'
      <?xml version="1.0" encoding="UTF-8"?>
      <channel name="xfwm4" version="1.0">
        <property name="general" type="empty">
          <property name="use_compositing" type="bool" value="false"/>
          <property name="cycle_draw_frame" type="bool" value="false"/>
          <property name="show_frame_shadow" type="bool" value="false"/>
          <property name="show_popup_shadow" type="bool" value="false"/>
        </property>
      </channel>
      XFWM4_CONF

    # =========================================================================
    # 8. Environment variables
    # =========================================================================
    - mkdir -p /target/etc/environment.d
    - |
      cat > /target/etc/environment.d/50-gpu-display.conf << 'GPU_DISPLAY'
      DRI_PRIME=0
      GPU_DISPLAY

    # Mutter KMS thread workaround — safety net even for XFCE
    - |
      cat > /target/etc/environment.d/90-mutter-kms.conf << 'MUTTER_KMS'
      MUTTER_DEBUG_KMS_THREAD_TYPE=user
      MUTTER_KMS

    # =========================================================================
    # 9. Diagnostic and verification scripts (bundled from USB)
    # =========================================================================
    - mkdir -p /target/var/log/ml-workstation-setup
    - mkdir -p /target/opt/ml-workstation-setup/scripts

    # Copy diagnostic script from USB if available
    - |
      for usbpath in /cdrom /media/cdrom /mnt/usb; do
        if [ -f "${usbpath}/UbuntuAutoInstall/script/diag-v2/diagnostic-enhanced.sh" ]; then
          cp "${usbpath}/UbuntuAutoInstall/script/diag-v2/diagnostic-enhanced.sh" /target/usr/local/bin/diagnostic-enhanced.sh
          chmod 0755 /target/usr/local/bin/diagnostic-enhanced.sh
          break
        fi
      done

    # Copy verification script from USB
    - |
      for usbpath in /cdrom /media/cdrom /mnt/usb; do
        if [ -f "${usbpath}/UbuntuAutoInstall/script/diag-v2/verify-boot.sh" ]; then
          cp "${usbpath}/UbuntuAutoInstall/script/diag-v2/verify-boot.sh" /target/usr/local/bin/verify-boot.sh
          chmod 0755 /target/usr/local/bin/verify-boot.sh
          break
        fi
      done

    # =========================================================================
    # 10. FIRST-BOOT VERIFICATION SERVICE
    #
    # Automatically runs diagnostics and verification on first boot.
    # Captures full GPU state within 60s of boot.
    # Saves to /var/log/ml-workstation-setup/variant-A-boot-report.txt
    # AND to USB if mounted.
    # =========================================================================
    - |
      cat > /target/etc/systemd/system/ml-boot-verify.service << 'BOOT_VERIFY'
      [Unit]
      Description=ML Workstation Boot Verification (Variant A: Display-Only)
      After=multi-user.target display-manager.service
      Wants=display-manager.service

      [Service]
      Type=oneshot
      ExecStartPre=/bin/sleep 30
      ExecStart=/usr/local/bin/verify-boot.sh --variant A --auto
      RemainAfterExit=yes
      StandardOutput=journal+console

      [Install]
      WantedBy=multi-user.target
      BOOT_VERIFY
    - curtin in-target -- systemctl enable ml-boot-verify.service

    # =========================================================================
    # 11. Periodic diagnostic capture (every boot, not just first)
    # =========================================================================
    - |
      cat > /target/etc/systemd/system/ml-diagnostic-capture.service << 'DIAG_CAPTURE'
      [Unit]
      Description=ML Workstation Diagnostic Capture
      After=multi-user.target display-manager.service
      Wants=display-manager.service

      [Service]
      Type=oneshot
      ExecStartPre=/bin/sleep 60
      ExecStart=/bin/bash -c 'if [ -x /usr/local/bin/diagnostic-enhanced.sh ]; then /usr/local/bin/diagnostic-enhanced.sh --auto; fi'
      RemainAfterExit=yes
      StandardOutput=journal+console

      [Install]
      WantedBy=multi-user.target
      DIAG_CAPTURE
    - curtin in-target -- systemctl enable ml-diagnostic-capture.service

    # =========================================================================
    # 12. Services
    # =========================================================================
    - curtin in-target -- systemctl enable ssh.service
    - curtin in-target -- systemctl enable fstrim.timer
    - curtin in-target -- systemctl enable NetworkManager.service
    - curtin in-target -- systemctl disable cups.service || true
    - curtin in-target -- systemctl disable cups-browsed.service || true
    - curtin in-target -- systemctl disable avahi-daemon.service || true
    - curtin in-target -- systemctl disable ModemManager.service || true
    - curtin in-target -- systemctl disable bluetooth.service || true
    - curtin in-target -- systemctl disable wpa_supplicant.service || true

    # =========================================================================
    # 13. User groups
    # =========================================================================
    - curtin in-target -- usermod -aG video,render,sudo abraham

    # =========================================================================
    # 14. Hardware log from early-commands
    # =========================================================================
    - cp /tmp/autoinstall-hw.log /target/var/log/ml-workstation-setup/autoinstall-hw.log 2>/dev/null || true

    # =========================================================================
    # 15. REBUILD INITRAMFS — MUST be LAST
    # =========================================================================
    - curtin in-target -- update-initramfs -u -k all

  user-data:
    runcmd:
      - systemctl disable cloud-init.service || true
      - systemctl disable cloud-config.service || true
      - systemctl disable cloud-final.service || true
    preserve_hostname: true
    manage_etc_hosts: true

  reporting:
    hook:
      type: print

  shutdown: reboot

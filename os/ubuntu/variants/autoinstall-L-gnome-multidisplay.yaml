  snaps: []

  early-commands:
    - 'echo "=== Variant J: GNOME Multi-Display — $(date -u +%Y-%m-%dT%H:%M:%SZ) ===" > /tmp/autoinstall-hw.log'
    - lspci -nn >> /tmp/autoinstall-hw.log 2>&1 || true
    - dmidecode -t system >> /tmp/autoinstall-hw.log 2>&1 || true
    - cat /proc/cpuinfo | head -30 >> /tmp/autoinstall-hw.log 2>&1 || true
    - |
      echo "=== Autoinstall Repo Version ===" >> /tmp/autoinstall-hw.log
      GIT_COMMIT="unknown"; GIT_BRANCH="unknown"; GIT_REMOTE="unknown"; GIT_MSG="unknown"; REPODIR="not_found"
      for usbbase in /cdrom /media/cdrom /mnt/usb /isodevice /run/live/medium /run/mnt/ubuntu-seed /run/media/*; do
        CANDIDATE="${usbbase}/UbuntuAutoInstall"
        if [ -d "${CANDIDATE}/.git" ]; then
          REPODIR="$CANDIDATE"
          echo "repo: $REPODIR" >> /tmp/autoinstall-hw.log
          if command -v git >/dev/null 2>&1; then
            GIT_COMMIT=$(git -C "$REPODIR" rev-parse HEAD 2>/dev/null || echo "unknown")
            GIT_BRANCH=$(git -C "$REPODIR" rev-parse --abbrev-ref HEAD 2>/dev/null || echo "unknown")
            GIT_REMOTE=$(git -C "$REPODIR" remote get-url origin 2>/dev/null || echo "unknown")
            GIT_MSG=$(git -C "$REPODIR" log --format='%s' -1 2>/dev/null || echo "unknown")
            echo "commit: $GIT_COMMIT" >> /tmp/autoinstall-hw.log
            echo "branch: $GIT_BRANCH" >> /tmp/autoinstall-hw.log
            echo "remote: $GIT_REMOTE" >> /tmp/autoinstall-hw.log
            echo "message: $GIT_MSG" >> /tmp/autoinstall-hw.log
          else
            echo "git not in PATH; listing variants dir" >> /tmp/autoinstall-hw.log
            ls -la "$REPODIR/os/ubuntu/variants/" >> /tmp/autoinstall-hw.log 2>&1 || true
          fi
          break
        fi
      done
      printf 'variant: J\ndate: %s\ncommit: %s\nbranch: %s\nremote: %s\nmessage: %s\nusb_repo: %s\n' \
        "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "$GIT_COMMIT" "$GIT_BRANCH" "$GIT_REMOTE" "$GIT_MSG" "$REPODIR" \
        > /tmp/autoinstall-version.txt
      [ "$REPODIR" = "not_found" ] && echo "WARNING: USB repo not found at any known mount point" >> /tmp/autoinstall-hw.log || true

  late-commands:

    # =========================================================================
    # 1. GRUB — Full dual-GPU, multi-display, amdgpu.noretry=0
    #
    # KEY DIFFERENCES FROM VARIANT I:
    #   + amdgpu.noretry=0: re-enables APU fault retry. Default amdgpu behavior
    #     for APUs disables retry faults, causing certain APU ring stalls to
    #     immediately escalate to MODE2 reset. With noretry=0 (retry enabled),
    #     transient faults during multi-display framebuffer setup are retried
    #     before triggering a reset. This reduces spurious resets on Raphael
    #     when 2-3 displays are initialized simultaneously.
    #   = nvidia-drm.modeset=0: NVIDIA NOT as KMS device. With modeset=0,
    #     nvidia-drm does not create any KMS resources — pure headless compute.
    #     This prevents nvidia-drm from interfering with amdgpu's DRM lease for
    #     the display outputs. Critical when NVIDIA is completely display-less.
    #   + initcall_blacklist=simpledrm_platform_driver_init: CRITICAL for DRM
    #     card ordering. Without this, simpledrm grabs card0 at early boot.
    #     nvidia then evicts simpledrm and takes card0 (confirmed runlog-J_v2).
    #     With blacklist, amdgpu (loaded first via softdep) gets card0.
    #   + video=efifb:off: Prevents EFI framebuffer from interfering with DRM
    #     card slot allocation. Required alongside initcall_blacklist.
    # =========================================================================
    - >-
      curtin in-target -- bash -c '
      GRUB_PARAMS="quiet splash amdgpu.sg_display=0 amdgpu.noretry=0 amdgpu.dcdebugmask=0x10 amdgpu.ppfeaturemask=0xfffd7fff amdgpu.gpu_recovery=1 amdgpu.seamless=1 amdgpu.lockup_timeout=30000 amdgpu.dc=1 amdgpu.dpm=1 nvidia-drm.modeset=0 pcie_aspm=off iommu=pt processor.max_cstate=1 amd_pstate=active modprobe.blacklist=nouveau,nova_core nogpumanager initcall_blacklist=simpledrm_platform_driver_init video=efifb:off";
      grep -q "^GRUB_CMDLINE_LINUX_DEFAULT=" /etc/default/grub
      && sed -i "s|^GRUB_CMDLINE_LINUX_DEFAULT=.*|GRUB_CMDLINE_LINUX_DEFAULT=\"${GRUB_PARAMS}\"|" /etc/default/grub
      || echo "GRUB_CMDLINE_LINUX_DEFAULT=\"${GRUB_PARAMS}\"" >> /etc/default/grub'

    - curtin in-target -- bash -c 'grep -q "^GRUB_TIMEOUT=" /etc/default/grub && sed -i "s|^GRUB_TIMEOUT=.*|GRUB_TIMEOUT=5|" /etc/default/grub || echo "GRUB_TIMEOUT=5" >> /etc/default/grub'
    - curtin in-target -- bash -c 'grep -q "^GRUB_TIMEOUT_STYLE=" /etc/default/grub && sed -i "s|^GRUB_TIMEOUT_STYLE=.*|GRUB_TIMEOUT_STYLE=menu|" /etc/default/grub || echo "GRUB_TIMEOUT_STYLE=menu" >> /etc/default/grub'
    - curtin in-target -- update-grub

    # =========================================================================
    # 2. MODPROBE — amdgpu + nvidia with softdep ordering
    #
    # nvidia-drm.modeset=0 in GRUB means nvidia-drm does not register KMS.
    # The modprobe options below align: nvidia_drm fbdev=0 (no framebuffer),
    # modeset=0 (belt-and-suspenders alongside GRUB param).
    # =========================================================================
    - |
      cat > /target/etc/modprobe.d/amdgpu.conf << 'MODPROBE_AMDGPU'
      # Variant J: GNOME Multi-Display — AMD Raphael iGPU drives 2-3 monitors
      options amdgpu sg_display=0
      options amdgpu noretry=0
      options amdgpu ppfeaturemask=0xfffd7fff
      options amdgpu dcdebugmask=0x10
      options amdgpu gpu_recovery=1
      options amdgpu lockup_timeout=30000
      options amdgpu seamless=1
      options amdgpu dc=1
      options amdgpu audio=1
      MODPROBE_AMDGPU

    - |
      cat > /target/etc/modprobe.d/nvidia.conf << 'MODPROBE_NVIDIA'
      # Variant J: NVIDIA RTX 4090 — headless compute, no display/KMS
      softdep nvidia pre: amdgpu
      softdep nvidia_drm pre: amdgpu
      blacklist nouveau
      options nouveau modeset=0
      options nvidia NVreg_UsePageAttributeTable=1
      options nvidia NVreg_InitializeSystemMemoryAllocations=0
      options nvidia NVreg_DynamicPowerManagement=0x02
      options nvidia NVreg_EnableGpuFirmware=1
      options nvidia NVreg_PreserveVideoMemoryAllocations=1
      options nvidia NVreg_TemporaryFilePath=/var/tmp
      options nvidia NVreg_RegistryDwords="RmGpuComputeExecTimeout=0"
      options nvidia_drm modeset=0
      options nvidia_drm fbdev=0
      MODPROBE_NVIDIA

    - |
      cat > /target/etc/modprobe.d/blacklist-nouveau.conf << 'BLACKLIST_NOUVEAU'
      blacklist nouveau
      blacklist nova_core
      blacklist lbm-nouveau
      alias nouveau off
      alias lbm-nouveau off
      BLACKLIST_NOUVEAU

    # Remove package-installed nvidia KMS config that conflicts with modeset=0
    - curtin in-target -- rm -f /etc/modprobe.d/nvidia-graphics-drivers-kms.conf

    # =========================================================================
    # 3. INITRAMFS — amdgpu FIRST, then nvidia (card ordering)
    # =========================================================================
    - |
      cat > /target/etc/initramfs-tools/modules << 'INITRAMFS_MODULES'
      # GPU module load order — amdgpu FIRST for card0 (display)
      amdgpu
      nvidia
      nvidia_uvm
      nvidia_modeset
      nvidia_drm
      INITRAMFS_MODULES

    - |
      cat > /target/etc/modules-load.d/gpu.conf << 'MODULES_LOAD'
      amdgpu
      nvidia
      nvidia_uvm
      nvidia_modeset
      nvidia_drm
      MODULES_LOAD

    # =========================================================================
    # 4. FIRMWARE UPDATE — kernel.org first, GitHub second, USB fallback
    #
    # Target tag: 20250509 (DMCUB >= 0.0.255.0 for Raphael DCN 3.1.5)
    # Ubuntu 24.04 ships 20240318 with DMCUB 0.0.191.0 — CRITICALLY outdated.
    # The July 2024 fix (0.0.224.0) resolved Debian #1057656 DMCUB state machine
    # breakage. Without this update, the optc31_disable_crtc REG_WAIT timeout
    # will fire at T+5-6s and trigger the GFX ring crash loop.
    #
    # ZSTD note: Ubuntu 24.04 kernel has CONFIG_FW_LOADER_COMPRESS_ZSTD=y.
    # The kernel prefers .bin.zst over .bin when both exist. All downloaded
    # .bin files are compressed to .bin.zst and the bare .bin is removed to
    # ensure the correct (new) firmware is loaded — not the old package .bin.zst.
    # =========================================================================
    - |
      export PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      echo "=== Variant J: Firmware update ===" >> /tmp/autoinstall-hw.log
      FIRMWARE_FOUND=false
      FWDEST="/target/lib/firmware/amdgpu"
      FW_TAG="20250509"
      FW_BASE_URL="https://git.kernel.org/pub/scm/linux/kernel/git/firmware/linux-firmware.git/plain"
      BLOBS="dcn_3_1_5_dmcub psp_13_0_5_toc psp_13_0_5_ta psp_13_0_5_asd gc_10_3_6_ce gc_10_3_6_me gc_10_3_6_mec gc_10_3_6_mec2 gc_10_3_6_pfp gc_10_3_6_rlc sdma_5_2_6 vcn_3_1_2"

      # --- Try kernel.org first (primary) ---
      FWDIR="/tmp/firmware-download"
      mkdir -p "$FWDIR"
      echo "Downloading from kernel.org (tag $FW_TAG)..." >> /tmp/autoinstall-hw.log
      DL_OK=0
      for blob in $BLOBS; do
        if curl -sfL -o "$FWDIR/${blob}.bin" "${FW_BASE_URL}/amdgpu/${blob}.bin?h=${FW_TAG}" 2>>/tmp/autoinstall-hw.log \
           || wget -qO "$FWDIR/${blob}.bin" "${FW_BASE_URL}/amdgpu/${blob}.bin?h=${FW_TAG}" 2>>/tmp/autoinstall-hw.log; then
          DL_OK=$((DL_OK + 1))
        fi
      done
      [ "$DL_OK" -gt 0 ] && FIRMWARE_FOUND=true && echo "Source: kernel.org ($DL_OK blobs)" >> /tmp/autoinstall-hw.log

      # --- GitHub repo fallback ---
      if [ "$FIRMWARE_FOUND" = "false" ]; then
        echo "kernel.org failed — trying GitHub repo..." >> /tmp/autoinstall-hw.log
        GH_BASE_URL="https://raw.githubusercontent.com/abramjos/os_setup_amd5_rtx4090/master/firmware/amdgpu"
        DL_OK=0
        for blob in $BLOBS; do
          if curl -sfL -o "$FWDIR/${blob}.bin" "${GH_BASE_URL}/${blob}.bin" 2>>/tmp/autoinstall-hw.log \
             || wget -qO "$FWDIR/${blob}.bin" "${GH_BASE_URL}/${blob}.bin" 2>>/tmp/autoinstall-hw.log; then
            DL_OK=$((DL_OK + 1))
          fi
        done
        [ "$DL_OK" -gt 0 ] && FIRMWARE_FOUND=true && echo "Source: GitHub ($DL_OK blobs)" >> /tmp/autoinstall-hw.log
      fi

      # --- USB fallback (all known installer mount points) ---
      if [ "$FIRMWARE_FOUND" = "false" ]; then
        echo "Network failed — checking USB mount points..." >> /tmp/autoinstall-hw.log
        for usbpath in /cdrom /media/cdrom /mnt/usb /isodevice /run/live/medium /run/mnt/ubuntu-seed; do
          FWDIR="${usbpath}/UbuntuAutoInstall/firmware/amdgpu"
          echo "  USB check: $FWDIR" >> /tmp/autoinstall-hw.log
          if [ -d "$FWDIR" ] && ls "$FWDIR"/*.bin >/dev/null 2>&1; then
            echo "Source: USB ($FWDIR)" >> /tmp/autoinstall-hw.log
            FIRMWARE_FOUND=true
            break
          fi
        done
        [ "$FIRMWARE_FOUND" = "false" ] && echo "  USB: no firmware found at any path" >> /tmp/autoinstall-hw.log
      fi

      if [ "$FIRMWARE_FOUND" = "true" ]; then
        BACKUP="/target/var/log/ml-workstation-setup/firmware-backup"
        mkdir -p "$BACKUP"
        cp -a "$FWDEST"/dcn_3_1_5_dmcub.bin* "$BACKUP/" 2>/dev/null || true
        cp -a "$FWDEST"/psp_13_0_5_*.bin* "$BACKUP/" 2>/dev/null || true
        cp -a "$FWDEST"/gc_10_3_6_*.bin* "$BACKUP/" 2>/dev/null || true
        for blob in "$FWDIR"/*.bin; do
          [ -f "$blob" ] || continue
          bname=$(basename "$blob")
          cp "$blob" "$FWDEST/$bname"
          if zstd -f "$FWDEST/$bname" -o "$FWDEST/${bname}.zst" 2>>/tmp/autoinstall-hw.log; then
            rm -f "$FWDEST/$bname"
            echo "  Installed: $bname -> ${bname}.zst" >> /tmp/autoinstall-hw.log
          fi
        done
        ls -la "$FWDEST"/dcn_3_1_5_dmcub.bin* >> /tmp/autoinstall-hw.log 2>&1
      else
        echo "CRITICAL: No firmware available — GNOME WILL crash without firmware update!" >> /tmp/autoinstall-hw.log
        echo "  Manual fix post-install: sudo apt install --only-upgrade linux-firmware" >> /tmp/autoinstall-hw.log
      fi

    # =========================================================================
    # 5. PURGE GDM3 — Install and configure SDDM as display manager
    #
    # ubuntu-gnome-desktop metapackage pulls in gdm3. We purge it here and
    # install sddm as the canonical display manager for this variant.
    #
    # Why SDDM is safer for AMD DCN boot stability:
    #   GDM3 launches gnome-shell as the greeter compositor immediately after
    #   the display-manager.service target is reached — typically T+5-8s on
    #   this system, precisely when amdgpu DCN is performing the EFI->driver
    #   handoff (optc31_disable_crtc). Mutter's KMS thread + GL context
    #   creation during DCN EFI handoff is the trigger for ring timeout.
    #
    #   SDDM Qt greeter creates a single QWindow with no 3D compositor. The
    #   KMS modesetting is done by the Qt EGL/DRM backend which makes at most
    #   one framebuffer flip per frame (60fps = 16ms intervals). This is orders
    #   of magnitude less GFX ring traffic than Mutter compositing. GNOME Shell
    #   does not start until after successful authentication.
    #
    # SDDM Wayland greeter note:
    #   sddm-wayland-greeter exists but requires kwin_wayland or sway as a
    #   compositor for the greeter itself — negating the benefit. We use the
    #   default X11-lite greeter (QPA=xcb via sddm's own tiny X server) which
    #   has negligible KMS impact. The USER SESSION (GNOME) starts on Wayland.
    # =========================================================================
    - curtin in-target -- bash -c 'DEBIAN_FRONTEND=noninteractive apt-get purge -y gdm3 2>/dev/null || true'
    - curtin in-target -- bash -c 'apt-get autoremove -y 2>/dev/null || true'
    - curtin in-target -- bash -c 'echo "/usr/bin/sddm" > /etc/X11/default-display-manager'
    - curtin in-target -- bash -c 'echo "sddm" > /etc/alternatives/x-session-manager 2>/dev/null || true'

    # Set sddm as default via debconf (canonical Ubuntu method)
    - curtin in-target -- bash -c 'echo "sddm shared/default-x-display-manager select sddm" | debconf-set-selections'
    - curtin in-target -- bash -c 'DEBIAN_FRONTEND=noninteractive dpkg-reconfigure sddm 2>/dev/null || true'
    - curtin in-target -- systemctl enable sddm.service

    # SDDM main configuration
    - mkdir -p /target/etc/sddm.conf.d

    - |
      cat > /target/etc/sddm.conf.d/10-display.conf << 'SDDM_DISPLAY'
      # Variant J: SDDM display manager configuration
      #
      # AUTOLOGIN ENABLED: Skips the greeter entirely. This is the safest option
      # for AMD DCN boot-window stability — no compositor, no X server, no VT
      # handoff at login time. GNOME Wayland starts directly after boot.
      #
      # WHY AUTOLOGIN: runlog-J_v2 showed SDDM X11 greeter → GNOME X11 session
      # handoff crashes with SIGABRT (exit 134). Root cause: SDDM spawns a new
      # X server process for the user session, but the VT is still held by the
      # greeter's X server → "Failed to open VT master: Permission denied" →
      # xauth creation fails → gnome-session aborts. Autologin bypasses this
      # entirely and launches GNOME Wayland directly on a fresh VT.
      #
      # To disable autologin (use greeter): comment out User= and Session= below.
      # If using greeter, select a Wayland session (not gnome-xorg.desktop) to
      # avoid the VT handoff crash.
      [General]
      DisplayServer=x11
      HaltCommand=/usr/sbin/shutdown -h -P now
      RebootCommand=/usr/sbin/shutdown -r now
      Numlock=on

      [Autologin]
      User=abraham
      Session=gnome-wayland

      [Theme]
      Current=breeze

      [Wayland]
      CompositorCommand=
      SessionDir=/usr/share/wayland-sessions

      [X11]
      SessionDir=/usr/share/xsessions
      DisplayCommand=/usr/share/sddm/scripts/Xsetup
      DisplayStopCommand=/usr/share/sddm/scripts/Xstop
      SDDM_DISPLAY

    # NOTE: SDDM [Environment] section is not a valid INI section — SDDM ignores it.
    # Environment variables for GNOME Wayland are delivered via /etc/environment.d/
    # (section 7 below). No separate SDDM env config needed.

    # =========================================================================
    # 6. XORG — Dual-GPU: AMD primary (glamor, multi-monitor), NVIDIA headless
    #
    # BusID PCI:108:0:0 is the AMD Raphael iGPU on this board.
    # AccelMethod "glamor": hardware-accelerated 2D for multi-display.
    #   Do NOT use "none" here (that's for zero-GFX-ring variants like D/E/F).
    #   Glamor uses the 3D pipeline for 2D acceleration — acceptable here
    #   because we have updated DMCUB firmware and SDDM avoids the boot window.
    # TearFree "true": prevents screen tearing on multi-monitor setups.
    # VariableRefresh "true": enables FreeSync/VRR on supported displays.
    # =========================================================================
    - mkdir -p /target/etc/X11/xorg.conf.d

    - |
      cat > /target/etc/X11/xorg.conf.d/10-amdgpu-primary.conf << 'XORG_AMD'
      # Variant J: AMD Raphael iGPU — primary display, multi-monitor, glamor
      Section "Device"
          Identifier "AMD-iGPU"
          Driver "amdgpu"
          BusID "PCI:108:0:0"
          Option "TearFree" "true"
          Option "DRI" "3"
          Option "AccelMethod" "glamor"
          Option "VariableRefresh" "true"
          Option "PrimaryGPU" "yes"
      EndSection

      Section "Screen"
          Identifier "AMD-Screen"
          Device "AMD-iGPU"
          DefaultDepth 24
          # Multi-monitor: allow up to 3 outputs at full resolution
          SubSection "Display"
              Depth 24
              Virtual 8192 4320
          EndSubSection
      EndSection

      Section "ServerLayout"
          Identifier "Layout"
          Screen "AMD-Screen"
      EndSection
      XORG_AMD

    - |
      cat > /target/etc/X11/xorg.conf.d/20-nvidia-headless.conf << 'XORG_NVIDIA'
      # Variant J: NVIDIA RTX 4090 — headless compute ONLY (no display, no KMS)
      Section "OutputClass"
          Identifier "nvidia-headless"
          MatchDriver "nvidia-drm"
          Driver "nvidia"
          Option "PrimaryGPU" "no"
          Option "AllowEmptyInitialConfiguration"
      EndSection
      XORG_NVIDIA

    # =========================================================================
    # 7. ENVIRONMENT — Mutter workarounds (critical for GNOME on AMD DCN 3.1.5)
    #
    # These env vars apply to ALL user sessions via /etc/environment.d/:
    #
    # MUTTER_DEBUG_KMS_THREAD_TYPE=user:
    #   Mutter 46.x creates a real-time priority KMS page-flip thread.
    #   When amdgpu DCN has latency (common on Raphael), the RT thread exceeds
    #   its scheduling deadline and receives SIGKILL from the kernel. This
    #   crashes gnome-shell independently of any ring timeout. Setting to "user"
    #   uses a normal-priority thread — no SIGKILL risk.
    #
    # MUTTER_DEBUG_DISABLE_HW_CURSORS=1:
    #   Hardware cursors generate GFX ring submissions on every mouse move event.
    #   On a multi-monitor setup this means 2-3x the cursor update traffic.
    #   Software cursors eliminate this source of GFX ring load.
    #
    # DRI_PRIME=0:
    #   Forces all rendering to GPU 0 (amdgpu, as set by module load order).
    #   Prevents any accidental DRI_PRIME offload to NVIDIA for display workloads.
    # =========================================================================
    - mkdir -p /target/etc/environment.d

    - |
      cat > /target/etc/environment.d/50-gpu-display.conf << 'GPU_DISPLAY'
      DRI_PRIME=0
      MUTTER_DEBUG_KMS_THREAD_TYPE=user
      MUTTER_DEBUG_DISABLE_HW_CURSORS=1
      GPU_DISPLAY

    # NOTE: 90-mutter-kms.conf removed — MUTTER_DEBUG_KMS_THREAD_TYPE=user is
    # already set in 50-gpu-display.conf above. Duplicate was harmless but confusing.

    # =========================================================================
    # 8. DCONF — GNOME hardening + multi-display settings
    #
    # Section A — Base hardening (from Variant I):
    #   enable-animations=false: eliminates continuous GL transition draws
    #   cursor-blink=false: removes one periodic redraw trigger
    #   check-alive-timeout=30000: 30s before GNOME kills unresponsive windows
    #     (prevents premature kill during GPU stalls on Raphael)
    #   night-light-enabled=false: disables color transform shader per-frame
    #   idle-delay=0: no screen dimming (workstation with permanent displays)
    #   show-banners=false: no notification popups driving GL redraws
    #
    # Section B — Multi-display additions (new in Variant J):
    #   scale-monitor-framebuffer: required for fractional scaling across
    #     multiple monitors with different DPI. Without this, GNOME uses integer
    #     scaling only. Requires experimental-features in mutter.
    #   kms-modifiers: enables KMS modifiers for display planes — improves
    #     multi-monitor scanout efficiency on AMD DCN (reduces copies).
    #   sleep-inactive-ac-timeout=0 / sleep-inactive-ac-type=nothing:
    #     Disables all automatic sleep/suspend. On a multi-display workstation,
    #     suspend triggers DCN display pipeline teardown and re-initialization,
    #     which is exactly the code path that causes optc31 timeouts. Never
    #     sleep on AC when using this hardware configuration.
    # =========================================================================
    - mkdir -p /target/etc/dconf/db/local.d

    - |
      cat > /target/etc/dconf/db/local.d/00-gnome-hardening << 'DCONF_HARDENING'
      [org/gnome/desktop/interface]
      enable-animations=false
      cursor-blink=false

      [org/gnome/mutter]
      check-alive-timeout=uint32 30000

      [org/gnome/settings-daemon/plugins/color]
      night-light-enabled=false

      [org/gnome/desktop/session]
      idle-delay=uint32 0

      [org/gnome/desktop/notifications]
      show-banners=false
      DCONF_HARDENING

    - |
      cat > /target/etc/dconf/db/local.d/10-multidisplay << 'DCONF_MULTIDISPLAY'
      [org/gnome/mutter]
      experimental-features=['scale-monitor-framebuffer', 'kms-modifiers']

      [org/gnome/settings-daemon/plugins/power]
      sleep-inactive-ac-timeout=0
      sleep-inactive-ac-type='nothing'
      sleep-inactive-battery-type='nothing'

      [org/gnome/desktop/wm/preferences]
      num-workspaces=4
      DCONF_MULTIDISPLAY

    - curtin in-target -- dconf update || true

    # =========================================================================
    # 9. MONITORS.XML — 2-monitor template
    #
    # Provides a starting display layout installed to three locations:
    #   a) /var/lib/sddm/.config/monitors.xml  — SDDM greeter display config
    #   b) /root/.config/monitors.xml           — root user fallback
    #   c) /home/abraham/.config/monitors.xml   — primary user (pre-populated)
    #
    # Layout: HDMI-1 (primary, left) at 2560x1440@60 + DP-1 (secondary, right)
    # Connector names are defaults for AMD DCN; actual names may differ.
    # To verify post-install: DISPLAY=:0 xrandr --listmonitors
    # Or in GNOME: Settings > Displays shows actual connector names.
    #
    # To add a 3rd monitor: duplicate the logicalmonitor block with connector
    # DP-2, set x=5120, and add primary=no.
    #
    # IMPORTANT: This template uses 2560x1440@60. If your monitors are different
    # resolution or refresh rate, edit this file post-install. The template will
    # NOT cause errors if connectors don't match — GNOME ignores unknown connectors.
    # =========================================================================
    - mkdir -p /target/var/lib/sddm/.config
    - mkdir -p /target/root/.config
    - mkdir -p /target/home/abraham/.config

    - |
      MONITORS_XML='<monitors version="2">
        <configuration>
          <logicalmonitor>
            <x>0</x>
            <y>0</y>
            <scale>1</scale>
            <primary>yes</primary>
            <monitor>
              <monitorspec>
                <connector>HDMI-1</connector>
                <vendor>unknown</vendor>
                <product>unknown</product>
                <serial>unknown</serial>
              </monitorspec>
              <mode>
                <width>2560</width>
                <height>1440</height>
                <rate>60</rate>
              </mode>
            </monitor>
          </logicalmonitor>
          <logicalmonitor>
            <x>2560</x>
            <y>0</y>
            <scale>1</scale>
            <monitor>
              <monitorspec>
                <connector>DP-1</connector>
                <vendor>unknown</vendor>
                <product>unknown</product>
                <serial>unknown</serial>
              </monitorspec>
              <mode>
                <width>2560</width>
                <height>1440</height>
                <rate>60</rate>
              </mode>
            </monitor>
          </logicalmonitor>
        </configuration>
      </monitors>'
      echo "$MONITORS_XML" > /target/var/lib/sddm/.config/monitors.xml
      echo "$MONITORS_XML" > /target/root/.config/monitors.xml
      echo "$MONITORS_XML" > /target/home/abraham/.config/monitors.xml

    - curtin in-target -- chown -R sddm:sddm /var/lib/sddm/.config 2>/dev/null || true
    - curtin in-target -- chown -R 1000:1000 /home/abraham/.config

    # =========================================================================
    # 10. GNOME services — disable unneeded services
    # =========================================================================
    - curtin in-target -- systemctl disable gpu-manager.service || true
    - curtin in-target -- systemctl mask gpu-manager.service || true
    - curtin in-target -- systemctl disable switcheroo-control.service || true
    - curtin in-target -- systemctl mask switcheroo-control.service || true
    - curtin in-target -- systemctl disable gnome-initial-setup-first-login.service || true
    - curtin in-target -- systemctl mask gnome-initial-setup-first-login.service || true
    - curtin in-target -- systemctl mask sleep.target || true
    - curtin in-target -- systemctl mask suspend.target || true
    - curtin in-target -- systemctl mask hibernate.target || true
    - curtin in-target -- systemctl mask suspend-then-hibernate.target || true
    - curtin in-target -- systemctl enable nvidia-persistenced.service || true

    # =========================================================================
    # 11. NVIDIA services and CUDA env
    # =========================================================================
    - |
      cat > /target/etc/systemd/system/nvidia-power-limit.service << 'NVIDIA_PL'
      [Unit]
      Description=NVIDIA GPU Power Limit (400W for RTX 4090)
      After=nvidia-persistenced.service
      Wants=nvidia-persistenced.service
      ConditionPathExists=/usr/bin/nvidia-smi

      [Service]
      Type=oneshot
      ExecStart=/usr/bin/nvidia-smi -pl 400
      RemainAfterExit=yes

      [Install]
      WantedBy=multi-user.target
      NVIDIA_PL
    - curtin in-target -- systemctl enable nvidia-power-limit.service || true

    - |
      cat > /target/etc/profile.d/cuda.sh << 'CUDA_ENV'
      if [ -d /usr/local/cuda ]; then
        export PATH=/usr/local/cuda/bin${PATH:+:${PATH}}
        export LD_LIBRARY_PATH=/usr/local/cuda/lib64${LD_LIBRARY_PATH:+:${LD_LIBRARY_PATH}}
      fi
      export CUDA_VISIBLE_DEVICES=0
      CUDA_ENV
    - chmod 0644 /target/etc/profile.d/cuda.sh

    # =========================================================================
    # 12. NVIDIA GPG keys for post-install driver upgrade
    # =========================================================================
    - |
      curtin in-target -- bash -c '
        wget -q https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb -O /tmp/cuda-keyring.deb
        dpkg -i /tmp/cuda-keyring.deb
        rm -f /tmp/cuda-keyring.deb

        curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | \
          gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
        curl -s -L https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list | \
          sed "s#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g" | \
          tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
      ' || true

    # =========================================================================
    # 13. udev rules
    # =========================================================================
    - |
      cat > /target/etc/udev/rules.d/99-gpu.rules << 'UDEV_GPU'
      KERNEL=="nvidia[0-9]*", MODE="0666"
      KERNEL=="nvidiactl", MODE="0666"
      KERNEL=="nvidia-uvm", MODE="0666"
      KERNEL=="nvidia-uvm-tools", MODE="0666"
      KERNEL=="nvidia-modeset", MODE="0666"
      SUBSYSTEM=="drm", KERNEL=="renderD*", MODE="0666"
      UDEV_GPU

    # =========================================================================
    # 14. Docker config
    # =========================================================================
    - mkdir -p /target/etc/docker
    - |
      cat > /target/etc/docker/daemon.json << 'DOCKER_CONF'
      {
        "default-runtime": "runc",
        "runtimes": {
          "nvidia": {
            "path": "nvidia-container-runtime",
            "runtimeArgs": []
          }
        },
        "data-root": "/data/docker",
        "storage-driver": "overlay2",
        "log-driver": "json-file",
        "log-opts": { "max-size": "50m", "max-file": "3" }
      }
      DOCKER_CONF

    # =========================================================================
    # 15. Diagnostics and verification
    # =========================================================================
    - mkdir -p /target/var/log/ml-workstation-setup
    - mkdir -p /target/opt/ml-workstation-setup

    - |
      for usbpath in /cdrom /media/cdrom /mnt/usb /isodevice /run/live/medium /run/mnt/ubuntu-seed; do
        if [ -f "${usbpath}/UbuntuAutoInstall/script/diag-v2/diagnostic-enhanced.sh" ]; then
          cp "${usbpath}/UbuntuAutoInstall/script/diag-v2/diagnostic-enhanced.sh" /target/usr/local/bin/diagnostic-enhanced.sh
          chmod 0755 /target/usr/local/bin/diagnostic-enhanced.sh
          break
        fi
      done

    - |
      for usbpath in /cdrom /media/cdrom /mnt/usb /isodevice /run/live/medium /run/mnt/ubuntu-seed; do
        if [ -f "${usbpath}/UbuntuAutoInstall/script/diag-v2/verify-boot.sh" ]; then
          cp "${usbpath}/UbuntuAutoInstall/script/diag-v2/verify-boot.sh" /target/usr/local/bin/verify-boot.sh
          chmod 0755 /target/usr/local/bin/verify-boot.sh
          break
        fi
      done

    - |
      cat > /target/etc/systemd/system/ml-boot-verify.service << 'BOOT_VERIFY'
      [Unit]
      Description=ML Workstation Boot Verification (Variant J: GNOME Multi-Display)
      After=multi-user.target display-manager.service
      Wants=display-manager.service

      [Service]
      Type=oneshot
      ExecStartPre=/bin/sleep 30
      ExecStart=/usr/local/bin/verify-boot.sh --variant J --auto
      RemainAfterExit=yes
      StandardOutput=journal+console

      [Install]
      WantedBy=multi-user.target
      BOOT_VERIFY
    - curtin in-target -- systemctl enable ml-boot-verify.service

    - |
      cat > /target/etc/systemd/system/ml-diagnostic-capture.service << 'DIAG_CAPTURE'
      [Unit]
      Description=ML Workstation Diagnostic Capture
      After=multi-user.target display-manager.service

      [Service]
      Type=oneshot
      ExecStartPre=/bin/sleep 60
      ExecStart=/bin/bash -c 'if [ -x /usr/local/bin/diagnostic-enhanced.sh ]; then /usr/local/bin/diagnostic-enhanced.sh --auto; fi'
      RemainAfterExit=yes

      [Install]
      WantedBy=multi-user.target
      DIAG_CAPTURE
    - curtin in-target -- systemctl enable ml-diagnostic-capture.service

    # =========================================================================
    # 16. Services, users, sysctl, limits
    # =========================================================================
    - curtin in-target -- systemctl enable ssh.service
    - curtin in-target -- systemctl enable docker.service
    - curtin in-target -- systemctl enable fstrim.timer
    - curtin in-target -- systemctl enable NetworkManager.service
    - curtin in-target -- systemctl disable cups.service || true
    - curtin in-target -- systemctl disable cups-browsed.service || true
    - curtin in-target -- systemctl disable avahi-daemon.service || true
    - curtin in-target -- systemctl disable ModemManager.service || true
    - curtin in-target -- systemctl disable bluetooth.service || true
    - curtin in-target -- systemctl disable wpa_supplicant.service || true

    - curtin in-target -- usermod -aG docker,video,render,sudo abraham
    - curtin in-target -- mkdir -p /data/datasets /data/models /data/checkpoints /data/logs /data/cache
    - curtin in-target -- chown -R 1000:1000 /data
    - curtin in-target -- chmod 755 /data

    - |
      cat > /target/etc/security/limits.d/99-ml-workstation.conf << 'LIMITS_ML'
      *    soft    memlock    unlimited
      *    hard    memlock    unlimited
      *    soft    nofile     1048576
      *    hard    nofile     1048576
      *    soft    nproc      65535
      *    hard    nproc      65535
      LIMITS_ML

    - |
      cat > /target/etc/sysctl.d/99-ml-workstation.conf << 'SYSCTL_ML'
      vm.dirty_ratio = 40
      vm.dirty_background_ratio = 10
      vm.swappiness = 10
      fs.file-max = 2097152
      fs.inotify.max_user_watches = 524288
      net.core.rmem_max = 16777216
      net.core.wmem_max = 16777216
      net.ipv4.tcp_rmem = 4096 87380 16777216
      net.ipv4.tcp_wmem = 4096 65536 16777216
      SYSCTL_ML

    # =========================================================================
    # 17. ML Performance Tuning
    # =========================================================================
    - |
      cat > /target/etc/systemd/system/ml-performance-tuning.service << 'ML_PERF'
      [Unit]
      Description=ML Workstation Performance Tuning
      After=multi-user.target

      [Service]
      Type=oneshot
      RemainAfterExit=yes
      ExecStart=/bin/bash -c 'echo "performance" | tee /sys/devices/system/cpu/cpu*/cpufreq/energy_performance_preference 2>/dev/null || true'
      ExecStart=/bin/bash -c 'sysctl -w vm.dirty_ratio=40'
      ExecStart=/bin/bash -c 'sysctl -w vm.dirty_background_ratio=10'
      ExecStart=/bin/bash -c 'sysctl -w fs.file-max=2097152'
      ExecStart=/bin/bash -c 'sysctl -w fs.inotify.max_user_watches=524288'

      [Install]
      WantedBy=multi-user.target
      ML_PERF
    - curtin in-target -- systemctl enable ml-performance-tuning.service

    # =========================================================================
    # 18. Hardware log from early-commands
    # =========================================================================
    - cp /tmp/autoinstall-hw.log /target/var/log/ml-workstation-setup/autoinstall-hw.log 2>/dev/null || true
    - cp /tmp/autoinstall-version.txt /target/var/log/ml-workstation-setup/autoinstall-version.txt 2>/dev/null || true

    # =========================================================================
    # 19. INITRAMFS FIRMWARE HOOK — force-copy Raphael blobs into initramfs
    #
    # update-initramfs skips amdgpu firmware in chroot because the driver
    # isn't bound to hardware. This hook force-copies all 12 Raphael blobs.
    # Without it, initramfs ships WITHOUT firmware — root cause of Variant B
    # v2 failure.
    # =========================================================================
    - |
      cat > /target/etc/initramfs-tools/hooks/amdgpu-firmware << 'FWHOOK'
      #!/bin/sh
      PREREQ=""
      prereqs() { echo "$PREREQ"; }
      case "$1" in prereqs) prereqs; exit 0 ;; esac
      . /usr/share/initramfs-tools/hook-functions
      [ -z "${DESTDIR:-}" ] && exit 1
      HOSTDIR=""
      for candidate in /usr/lib/firmware/amdgpu /lib/firmware/amdgpu; do
          [ -d "$candidate" ] && HOSTDIR="$candidate" && break
      done
      [ -z "$HOSTDIR" ] && exit 0
      if [ -L "${DESTDIR}/lib/firmware" ]; then
          DESTDIRS="$(readlink -f "${DESTDIR}/lib/firmware")/amdgpu"
      else
          DESTDIRS="${DESTDIR}/lib/firmware/amdgpu ${DESTDIR}/usr/lib/firmware/amdgpu"
      fi
      COPIED=0
      for blob in dcn_3_1_5_dmcub psp_13_0_5_toc psp_13_0_5_ta psp_13_0_5_asd \
                  gc_10_3_6_ce gc_10_3_6_me gc_10_3_6_mec gc_10_3_6_mec2 \
                  gc_10_3_6_pfp gc_10_3_6_rlc sdma_5_2_6 vcn_3_1_2; do
          for ext in .bin.zst .bin; do
              [ -f "${HOSTDIR}/${blob}${ext}" ] || continue
              for dest in $DESTDIRS; do
                  mkdir -p "$dest"
                  cp "${HOSTDIR}/${blob}${ext}" "${dest}/${blob}${ext}"
              done
              COPIED=$((COPIED + 1))
              break
          done
      done
      echo "amdgpu-firmware hook: copied $COPIED Raphael blobs into initramfs"
      FWHOOK
      chmod +x /target/etc/initramfs-tools/hooks/amdgpu-firmware

    # =========================================================================
    # 20. REBUILD INITRAMFS — MUST BE LAST
    #
    # Rebuilds initramfs to embed:
    #   - Updated firmware blobs (dcn_3_1_5_dmcub.bin.zst etc.)
    #   - Module load order (amdgpu before nvidia)
    #   - All modprobe.d options
    # The -k all flag rebuilds for every installed kernel version.
    # =========================================================================
    - curtin in-target -- update-initramfs -u -k all

    # Verify DMCUB blob landed in initramfs
    - curtin in-target -- bash -c 'KVER=$(ls /boot/vmlinuz-* 2>/dev/null | sort -V | tail -1 | sed "s|/boot/vmlinuz-||"); lsinitramfs /boot/initrd.img-${KVER} 2>/dev/null | grep -q dcn_3_1_5_dmcub && echo "INITRAMFS_CHECK=DMCUB_PRESENT" || echo "INITRAMFS_CHECK=DMCUB_MISSING firmware_delivery_failed"'

  user-data:
    runcmd:
      - systemctl disable cloud-init.service || true
      - systemctl disable cloud-config.service || true
      - systemctl disable cloud-final.service || true
    preserve_hostname: true
    manage_etc_hosts: true

  reporting:
    hook:
      type: print

  shutdown: reboot

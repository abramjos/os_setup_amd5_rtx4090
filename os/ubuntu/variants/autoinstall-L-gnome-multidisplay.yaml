#cloud-config
autoinstall:
  version: 1

  # =========================================================================
  # VARIANT J: GNOME MULTI-DISPLAY (SDDM + Wayland, 2-3 Monitor iGPU)
  #
  # PURPOSE: Multi-display workstation build. Extends Variant I (GNOME Shell +
  #   GDM3 + Wayland) with explicit multi-display support for 2-3 monitors
  #   driven by the AMD Raphael iGPU, plus SDDM display manager to eliminate
  #   the GDM3 gnome-shell greeter as a DCN boot-window crash source.
  #
  # ARCHITECTURE:
  #   - SDDM (Qt-based, no compositor at login) replaces GDM3 as display manager
  #   - GNOME Shell + Mutter on Wayland (user session only, after DCN stabilizes)
  #   - AMD Raphael iGPU (DCN 3.1.5) drives 2-3 monitors via HDMI-1 + DP-1 [+ DP-2]
  #   - NVIDIA RTX 4090 is 100% headless CUDA/ML compute — zero display
  #
  # WHAT VARIANT J ADDS vs VARIANT I:
  #   1. SDDM replaces GDM3
  #      GDM3 starts a full gnome-shell Wayland compositor for the login greeter,
  #      exercising AMD DCN at the most vulnerable boot window (T+5-6s, when
  #      optc31_disable_crtc REG_WAIT fires). SDDM uses a lightweight Qt greeter
  #      — no compositor. gnome-shell starts ONLY after login, after DCN has
  #      stabilized. gdm3 is purged to avoid conflicts.
  #
  #   2. amdgpu.noretry=0 kernel param
  #      Re-enables APU fault retry (disabled by default). Without retry, certain
  #      APU ring stalls escalate to a full GPU reset. Combined with sg_display=0
  #      and the DMCUB firmware update, this reduces unnecessary MODE2 resets
  #      during multi-display framebuffer setup.
  #
  #   3. Multi-monitor GNOME Mutter settings (dconf)
  #      scale-monitor-framebuffer + kms-modifiers: required for correct fractional
  #      scaling and color management across multiple monitors.
  #      sleep-inactive-*: disables all sleep/suspend to prevent display pipeline
  #      interrupts on a workstation with permanently attached monitors.
  #
  #   4. gnome-monitors.xml template
  #      Provides a starting 2-monitor layout (HDMI-1 @ 2560x1440 + DP-1 @ 2560x1440)
  #      installed to both the SDDM greeter user location and the primary user
  #      home. Connector names and resolutions should be adjusted post-install to
  #      match actual connected hardware (use GNOME Settings > Displays).
  #
  #   5. autorandr + arandr
  #      autorandr saves and restores display profiles across sessions (handles
  #      monitor hotplug and HDMI re-connect). arandr provides a GUI for initial
  #      display layout configuration.
  #
  # KERNEL PARAMETERS (vs Variant I):
  #   Added:   amdgpu.noretry=0
  #   Changed: nvidia-drm.modeset=0 (NVIDIA NOT as KMS — headless only)
  #   Added:   amdgpu.dc=1, amdgpu.dpm=1
  #   Added:   initcall_blacklist=simpledrm_platform_driver_init video=efifb:off
  #            (CRITICAL for card ordering — without these, simpledrm grabs card0
  #            before amdgpu loads, then nvidia evicts it and takes card0.
  #            Confirmed in runlog-J_v2: card0=nvidia. Fixed in H_v1: card0=amdgpu.
  #            Also missing in Variant I — runlog-I_v1: card0=simple-framebuffer.)
  #   Kept:    amdgpu.sg_display=0, amdgpu.dcdebugmask=0x10,
  #            amdgpu.ppfeaturemask=0xfffd7fff, amdgpu.seamless=1,
  #            amdgpu.lockup_timeout=30000, amdgpu.gpu_recovery=1,
  #            pcie_aspm=off, iommu=pt, processor.max_cstate=1,
  #            amd_pstate=active, modprobe.blacklist=nouveau,nova_core,
  #            nogpumanager
  #   - GFXOFF disabled via BIOS + ppfeaturemask (gfx_off is NOT a valid
  #     module param on kernel 6.17+ — confirmed in runlog-I_v1 ANALYSIS)
  #
  # DISPLAY MANAGER DECISION RATIONALE:
  #   - SDDM + AUTOLOGIN (this variant): Skips greeter entirely. GNOME Wayland
  #     starts directly after boot — zero compositor activity during DCN boot
  #     window. runlog-J_v2 showed SDDM X11 greeter → gnome-xorg.desktop handoff
  #     crashes with SIGABRT (exit 134) due to VT permission race: SDDM spawns
  #     new X server but VT still held by greeter X → "Failed to open VT master:
  #     Permission denied" → xauth fails → gnome-session aborts in 1-2s.
  #     Autologin bypasses this failure mode completely.
  #   - GDM3 (Variant G/I): gnome-shell Wayland greeter runs full compositor at
  #     T+5-6s. With DMCUB 0.0.191.0 (Ubuntu stock), this triggers optc31 timeout.
  #     With updated firmware (>= 0.0.224.0), GDM3 may be safe — use Variant G.
  #   - LightDM (Variant H): GTK greeter, minimal KMS, good multi-session support.
  #     Requires extra setup for GNOME Wayland. See Variant H for LightDM details.
  #
  # FIRMWARE REQUIREMENT (CRITICAL — same as all GNOME variants):
  #   DMCUB firmware must be >= 0.0.224.0 to avoid optc31_disable_crtc timeout.
  #   This file auto-downloads from kernel.org tag 20250509 (DMCUB 0.0.255.0+).
  #   Without the update, the DCN stall + GFX ring pressure crash loop persists.
  #   See CLAUDE.md for full firmware history and root cause analysis.
  #
  # RISK: MEDIUM — SDDM eliminates the greeter crash window. GNOME Mutter on
  #   Wayland still exercises DCN/GFX after login, but the firmware fix and
  #   Mutter workarounds reduce crash probability significantly.
  #
  # MULTI-DISPLAY NOTES:
  #   - BIOS: IGFX Multi-Monitor must be ENABLED (Advanced > NB Configuration)
  #   - BIOS: UMA Frame Buffer Size = 2G minimum (4G recommended for 3 monitors)
  #   - BIOS: Primary Video Device = IGFX (not PCIE)
  #   - Connector order: HDMI-1 is primary (left), DP-1 is secondary (right)
  #   - Adjust gnome-monitors.xml post-install for your actual resolution/refresh
  #   - amdgpu.sg_display=0 is CRITICAL for multi-monitor flicker prevention
  #   - 3rd monitor: add DP-2 block to monitors.xml and set user_session position
  #
  # KNOWN LIMITATIONS:
  #   1. Autologin enabled — no session chooser at boot. To switch sessions,
  #      log out and use the SDDM greeter (select Wayland sessions only —
  #      X11 sessions crash due to VT handoff bug, see runlog-J_v2).
  #   2. SDDM theming with sddm-theme-breeze requires Qt5 Wayland support.
  #   3. autorandr is primarily an X11 tool; on pure Wayland use gnome-randr or
  #      GNOME Settings for display management. Kept for XWayland apps.
  #   4. Screen sharing (xdg-desktop-portal-gnome) requires PipeWire — included.
  #   5. Fractional scaling (scale-monitor-framebuffer) may cause blurry X11 apps
  #      in XWayland. Set scale=1 in monitors.xml if not needed.
  #
  # HARDWARE:
  #   CPU:  AMD Ryzen 9 7950X (Raphael, GC 10.3.6, DCN 3.1.5)
  #   iGPU: AMD Radeon Graphics — 2 CUs, drives ALL displays
  #   dGPU: NVIDIA RTX 4090 — headless CUDA/ML only
  #   MB:   ASUS ROG Crosshair X670E Hero
  #   NVMe: Samsung SSD 990 PRO 2TB
  #
  # PREREQUISITES:
  #   1. BIOS: IGFX Multi-Monitor=Enabled, Primary=IGFX, UMA=2G+
  #   2. Firmware auto-downloaded during install (USB or network)
  #   3. Optional pre-download: script/diag-v2/prepare-firmware-usb.sh
  # =========================================================================

  interactive-sections: []


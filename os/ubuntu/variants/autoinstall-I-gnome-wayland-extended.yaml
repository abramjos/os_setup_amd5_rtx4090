#cloud-config
autoinstall:
  version: 1

  # =========================================================================
  # VARIANT I: GNOME Wayland Extended — Production Grade
  #
  # PURPOSE: Production GNOME desktop targeting ML workstation deployment.
  #   Extends Variant G with nvidia-drm.modeset=0 so Mutter sees ONLY the
  #   AMD iGPU as a KMS device. RTX 4090 is compute-only (no KMS).
  #
  # KEY DIFFERENCES FROM VARIANT G:
  #   - nvidia-drm.modeset=0 (G used 1) — NVIDIA not registered as KMS device,
  #     prevents Mutter from managing dual-KMS, eliminates RT thread deadlock
  #   - nvidia-drm.fbdev=1 removed (fbdev requires KMS, irrelevant at modeset=0)
  #   - options nvidia_drm modeset=0 (G used 1) — modprobe matches cmdline
  #   - options nvidia_drm fbdev=1 removed — no fbdev without KMS
  #   - Fractional scaling enabled via dconf experimental-features
  #   - 10-gpu.conf (standardized name) vs 10-amdgpu-primary.conf in G
  #
  # WHY nvidia-drm.modeset=0 WORKS:
  #   Mutter 46.x creates a SCHED_FIFO real-time KMS page-flip thread for EACH
  #   KMS device found. With two KMS devices (AMD + NVIDIA), two RT threads
  #   compete for the GFX ring scheduler. Under AMD DCN latency, the NVIDIA
  #   RT thread misses its deadline and gets SIGKILL'd, taking gnome-shell with
  #   it. With modeset=0 on NVIDIA, only one KMS device (AMD) exists, one RT
  #   thread, and MUTTER_DEBUG_KMS_THREAD_TYPE=user demotes it to SCHED_OTHER
  #   as belt-and-suspenders. NVIDIA remains fully functional for CUDA/compute
  #   via /dev/nvidia*, nvidia-smi, and Docker GPU passthrough.
  #
  # WHAT THIS TESTS:
  #   - Is GNOME Wayland production-stable on AMD-only KMS + headless NVIDIA?
  #   - Does nvidia-drm.modeset=0 break any CUDA/ML compute paths?
  #   - Does fractional scaling work on the AMD primary display?
  #
  # RISK: HIGH (reduced from G's HIGHEST due to single-KMS topology)
  #
  # PREREQUISITES:
  #   1. Variant B MUST pass first (DMUB firmware >= 0x05002000 confirmed)
  #   2. Variant G should be tested first to compare dual-KMS vs single-KMS
  #   3. BIOS: PCIe slot for RTX 4090 set to Gen4 (not Auto) — prevents
  #      LnkSta 2.5GT/s downgrade (8x ML bandwidth loss at Gen1)
  #
  # MITIGATIONS APPLIED:
  #   - nvidia-drm.modeset=0 (single KMS device — AMD only)
  #   - MUTTER_DEBUG_KMS_THREAD_TYPE=user (belt-and-suspenders: demotes RT→SCHED_OTHER)
  #   - MUTTER_DEBUG_DISABLE_HW_CURSORS=1 (reduces per-mouse-move GFX ring submissions)
  #   - check-alive-timeout=30000 via dconf (prevents premature SIGKILL during GPU stalls)
  #   - enable-animations=false via dconf (eliminates transition GL draws)
  #   - fractional scaling enabled (production HiDPI display support)
  #   - initcall_blacklist=simpledrm_platform_driver_init (amdgpu gets card0)
  #   - softdep nvidia pre: amdgpu (correct card0=AMD, card1=NVIDIA ordering)
  #
  # FALLBACK: If I fails, use H (XFCE X11 + labwc Wayland, proven stable).
  # =========================================================================

  interactive-sections: []

  locale: en_US.UTF-8
  keyboard:
    layout: us
    variant: ""
  timezone: America/New_York

  refresh-installer:
    update: true
    channel: stable

  source:
    id: ubuntu-desktop-minimal
    search_drivers: true

  kernel:
    package: linux-generic-hwe-24.04

  network:
    version: 2
    ethernets:
      eno1:
        dhcp4: true
        dhcp6: false
        optional: true

  proxy: ""

  apt:
    preserve_sources_list: false
    primary:
      - arches: [amd64]
        uri: http://archive.ubuntu.com/ubuntu
    security:
      - arches: [amd64]
        uri: http://security.ubuntu.com/ubuntu

  storage:
    version: 2
    config:
      - id: nvme-disk
        type: disk
        ptable: gpt
        serial: Samsung_SSD_990_PRO_2TB_S73WNJ0W206133V_1
        preserve: true
        wipe: none
        grub_device: false

      - id: efi-windows-part
        type: partition
        device: nvme-disk
        number: 1
        size: 100M
        preserve: true

      - id: msr-part
        type: partition
        device: nvme-disk
        number: 2
        size: 16M
        preserve: true

      - id: windows-part
        type: partition
        device: nvme-disk
        number: 3
        size: 975345549312
        preserve: true

      - id: winre-part
        type: partition
        device: nvme-disk
        number: 4
        size: 888M
        offset: 1999467708416
        preserve: true

      - id: efi-part
        type: partition
        device: nvme-disk
        size: 1G
        offset: 975468232704
        flag: esp
        grub_device: true

      - id: efi-format
        type: format
        volume: efi-part
        fstype: fat32
        label: EFI-UBUNTU

      - id: efi-mount
        type: mount
        device: efi-format
        path: /boot/efi

      - id: boot-part
        type: partition
        device: nvme-disk
        size: 2G
        offset: 976541974528

      - id: boot-format
        type: format
        volume: boot-part
        fstype: ext4
        label: BOOT

      - id: boot-mount
        type: mount
        device: boot-format
        path: /boot

      - id: swap-part
        type: partition
        device: nvme-disk
        size: 64G
        offset: 978689458176

      - id: swap-format
        type: format
        volume: swap-part
        fstype: swap
        label: SWAP

      - id: swap-mount
        type: mount
        device: swap-format
        path: none

      - id: root-part
        type: partition
        device: nvme-disk
        size: 200G
        offset: 1047408934912

      - id: root-format
        type: format
        volume: root-part
        fstype: ext4
        label: ROOT

      - id: root-mount
        type: mount
        device: root-format
        path: /

      - id: home-part
        type: partition
        device: nvme-disk
        size: -1
        offset: 1262157299712

      - id: home-format
        type: format
        volume: home-part
        fstype: ext4
        label: HOME

      - id: home-mount
        type: mount
        device: home-format
        path: /home

  identity:
    hostname: vortex
    realname: Abraham
    username: abraham
    password: "$6$tgmHIWX35Qendhwj$hSQ0dDsaUy2zJwnh8uRoMBEHybDjWXsmnjgi2fcECzmAZGrMfpuSDnOnTVG/uJ/G23Yf403i//i984JlbFvhy1"

  ssh:
    install-server: true
    allow-pw: true
    authorized-keys: []

  # Auto-install NVIDIA driver from Ubuntu repos
  drivers:
    install: true

  codecs:
    install: true

  updates: security

  packages:
    # --- System essentials ---
    - ubuntu-minimal
    - ubuntu-standard
    - apt-transport-https
    - ca-certificates
    - curl
    - wget
    - gnupg
    - software-properties-common
    - lsb-release
    - unzip
    - zstd
    - pciutils
    - usbutils
    - dmidecode
    - lm-sensors
    - cpufrequtils
    - acpi
    - smartmontools
    - ethtool
    - net-tools

    # --- Build tools ---
    - build-essential
    - dkms
    - gcc
    - g++
    - make
    - cmake
    - linux-headers-generic
    - linux-headers-generic-hwe-24.04

    # --- GPU/display stack ---
    - mesa-utils
    - mesa-vulkan-drivers
    - libgl1-mesa-dri
    - libgl1
    - libglx-mesa0
    - libdrm-dev
    - libdrm-amdgpu1
    - xserver-xorg
    - xserver-xorg-core
    - xserver-xorg-video-amdgpu
    - x11-utils
    - x11-xserver-utils
    - vainfo
    - vulkan-tools
    - clinfo

    # --- GNOME desktop ---
    - gnome-shell
    - gdm3
    - gnome-terminal
    - nautilus
    - gnome-tweaks
    - gnome-system-monitor
    - gnome-text-editor
    - gnome-screenshot
    - gnome-session
    - xdg-desktop-portal-gnome
    - ubuntu-gnome-wallpapers
    - adwaita-icon-theme
    - gnome-shell-extension-manager
    - gnome-control-center

    # --- Firmware & kernel tools ---
    - linux-firmware
    - fwupd
    - initramfs-tools
    - mokutil
    - efibootmgr
    - amd64-microcode

    # --- Networking ---
    - openssh-server
    - openssh-client
    - network-manager
    - firewalld
    - iptables
    - rsync
    - tmux
    - screen

    # --- Storage ---
    - nvme-cli
    - hdparm
    - parted
    - gdisk
    - lvm2
    - e2fsprogs
    - xfsprogs
    - dosfstools

    # --- Monitoring ---
    - htop
    - nvtop
    - iotop
    - sysstat
    - dstat
    - strace
    - ltrace
    - perf-tools-unstable
    - inxi
    - linux-tools-generic-hwe-24.04

    # --- ML prerequisites ---
    - python3
    - python3-pip
    - python3-venv
    - python3-dev
    - python3-setuptools
    - python3-wheel
    - python3-numpy

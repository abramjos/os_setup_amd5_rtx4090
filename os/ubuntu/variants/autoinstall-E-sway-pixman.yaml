#cloud-config
autoinstall:
  version: 1

  # =========================================================================
  # VARIANT E: Sway + pixman (Wayland, Tiling, Zero GFX Ring)
  #
  # PURPOSE: i3-compatible tiling Wayland compositor with CPU-only rendering.
  #   Zero GFX ring. Scene-graph damage tracking = zero CPU when idle.
  #   Ideal for ML workstation where desktop sits idle during long training.
  #
  # WHAT THIS TESTS:
  #   - Can Sway with pixman rendering fully avoid the GFX ring crash?
  #   - Is a tiling workflow suitable for ML workstation use?
  #
  # RISK: LOWEST (tied with D) — pixman renderer means zero GPU compositing.
  #   Sway's scene-graph renderer tracks damage regions and only redraws
  #   pixels that actually changed. When idle (ML training running in bg),
  #   CPU usage from compositing is effectively zero.
  #
  # FIRMWARE: Auto-downloaded during install (USB or network).
  #
  # DESKTOP: Sway + waybar + foot terminal + thunar file manager
  #   i3-compatible keybinds. Efficient keyboard-driven workflow.
  # =========================================================================

  interactive-sections: []

  locale: en_US.UTF-8
  keyboard:
    layout: us
    variant: ""
  timezone: America/New_York

  refresh-installer:
    update: true
    channel: stable

  source:
    id: ubuntu-desktop-minimal
    search_drivers: false

  kernel:
    package: linux-generic-hwe-24.04

  network:
    version: 2
    ethernets:
      eno1:
        dhcp4: true
        dhcp6: false
        optional: true

  proxy: ""

  apt:
    preserve_sources_list: false
    primary:
      - arches: [amd64]
        uri: http://archive.ubuntu.com/ubuntu
    security:
      - arches: [amd64]
        uri: http://security.ubuntu.com/ubuntu

  storage:
    version: 2
    config:
      - id: nvme-disk
        type: disk
        ptable: gpt
        serial: Samsung_SSD_990_PRO_2TB_S73WNJ0W206133V_1
        preserve: true
        wipe: none
        grub_device: false

      - id: efi-windows-part
        type: partition
        device: nvme-disk
        number: 1
        size: 100M
        preserve: true

      - id: msr-part
        type: partition
        device: nvme-disk
        number: 2
        size: 16M
        preserve: true

      - id: windows-part
        type: partition
        device: nvme-disk
        number: 3
        size: 975345549312
        preserve: true

      - id: winre-part
        type: partition
        device: nvme-disk
        number: 4
        size: 888M
        offset: 1999467708416
        preserve: true

      - id: efi-part
        type: partition
        device: nvme-disk
        size: 1G
        offset: 975468232704
        flag: esp
        grub_device: true

      - id: efi-format
        type: format
        volume: efi-part
        fstype: fat32
        label: EFI-UBUNTU

      - id: efi-mount
        type: mount
        device: efi-format
        path: /boot/efi

      - id: boot-part
        type: partition
        device: nvme-disk
        size: 2G
        offset: 976541974528

      - id: boot-format
        type: format
        volume: boot-part
        fstype: ext4
        label: BOOT

      - id: boot-mount
        type: mount
        device: boot-format
        path: /boot

      - id: swap-part
        type: partition
        device: nvme-disk
        size: 64G
        offset: 978689458176

      - id: swap-format
        type: format
        volume: swap-part
        fstype: swap
        label: SWAP

      - id: swap-mount
        type: mount
        device: swap-format
        path: none

      - id: root-part
        type: partition
        device: nvme-disk
        size: 200G
        offset: 1047408934912

      - id: root-format
        type: format
        volume: root-part
        fstype: ext4
        label: ROOT

      - id: root-mount
        type: mount
        device: root-format
        path: /

      - id: home-part
        type: partition
        device: nvme-disk
        size: -1
        offset: 1262157299712

      - id: home-format
        type: format
        volume: home-part
        fstype: ext4
        label: HOME

      - id: home-mount
        type: mount
        device: home-format
        path: /home

  identity:
    hostname: vortex
    realname: Abraham
    username: abraham
    password: "$6$tgmHIWX35Qendhwj$hSQ0dDsaUy2zJwnh8uRoMBEHybDjWXsmnjgi2fcECzmAZGrMfpuSDnOnTVG/uJ/G23Yf403i//i984JlbFvhy1"

  ssh:
    install-server: true
    allow-pw: true
    authorized-keys: []

  drivers:
    install: false

  codecs:
    install: true

  updates: security

  packages:
    # --- System essentials ---
    - ubuntu-minimal
    - ubuntu-standard
    - apt-transport-https
    - ca-certificates
    - curl
    - wget
    - gnupg
    - software-properties-common
    - lsb-release
    - unzip
    - zstd
    - pciutils
    - usbutils
    - dmidecode
    - lm-sensors
    - cpufrequtils
    - acpi
    - smartmontools
    - ethtool
    - net-tools
    - build-essential
    - dkms
    - gcc
    - g++
    - make
    - linux-headers-generic
    - linux-headers-generic-hwe-24.04

    # --- GPU/display stack (Xwayland support) ---
    - mesa-utils
    - mesa-vulkan-drivers
    - libgl1-mesa-dri
    - libgl1
    - libglx-mesa0
    - libdrm-dev
    - libdrm-amdgpu1
    - xserver-xorg
    - xserver-xorg-core
    - xserver-xorg-video-amdgpu
    - x11-utils
    - x11-xserver-utils
    - vainfo
    - vulkan-tools
    - clinfo

    # --- Sway Wayland desktop (replaces XFCE) ---
    - sway
    - swaybg
    - swayidle
    - swaylock
    - waybar
    - foot
    - wl-clipboard
    - xdg-desktop-portal-wlr
    - mako-notifier
    - grim
    - slurp
    - thunar
    - xwayland
    - wofi

    # --- LightDM (launches Wayland session) ---
    - lightdm
    - lightdm-gtk-greeter
    - lightdm-gtk-greeter-settings

    # --- Firmware & kernel tools ---
    - linux-firmware
    - fwupd
    - initramfs-tools
    - mokutil
    - efibootmgr
    - amd64-microcode

    # --- Networking ---
    - openssh-server
    - openssh-client
    - network-manager
    - firewalld
    - rsync
    - tmux
    - screen

    # --- Storage & monitoring ---
    - nvme-cli
    - hdparm
    - parted
    - gdisk
    - e2fsprogs
    - dosfstools
    - htop
    - iotop
    - sysstat
    - strace
    - inxi
    - linux-tools-generic-hwe-24.04
    - git
    - vim
    - nano
    - jq
    - tree
    - xxd
    - bc

  snaps: []

  early-commands:
    - 'echo "=== Variant E: Sway+pixman — $(date -u +%Y-%m-%dT%H:%M:%SZ) ===" > /tmp/autoinstall-hw.log'
    - lspci -nn >> /tmp/autoinstall-hw.log 2>&1 || true
    - dmidecode -t system >> /tmp/autoinstall-hw.log 2>&1 || true
    - cat /proc/cpuinfo | head -30 >> /tmp/autoinstall-hw.log 2>&1 || true

  late-commands:

    # =========================================================================
    # 1. GRUB — Same as Variant B (AMD-only)
    # =========================================================================
    - >-
      curtin in-target -- bash -c '
      GRUB_PARAMS="quiet splash amdgpu.sg_display=0 amdgpu.dcdebugmask=0x18 amdgpu.ppfeaturemask=0xfffd7fff amdgpu.gpu_recovery=1 amdgpu.seamless=1 amdgpu.lockup_timeout=30000 pcie_aspm=off iommu=pt processor.max_cstate=1 amd_pstate=active nogpumanager initcall_blacklist=simpledrm_platform_driver_init";
      grep -q "^GRUB_CMDLINE_LINUX_DEFAULT=" /etc/default/grub
      && sed -i "s|^GRUB_CMDLINE_LINUX_DEFAULT=.*|GRUB_CMDLINE_LINUX_DEFAULT=\"${GRUB_PARAMS}\"|" /etc/default/grub
      || echo "GRUB_CMDLINE_LINUX_DEFAULT=\"${GRUB_PARAMS}\"" >> /etc/default/grub'

    - curtin in-target -- bash -c 'grep -q "^GRUB_TIMEOUT=" /etc/default/grub && sed -i "s|^GRUB_TIMEOUT=.*|GRUB_TIMEOUT=5|" /etc/default/grub || echo "GRUB_TIMEOUT=5" >> /etc/default/grub'
    - curtin in-target -- bash -c 'grep -q "^GRUB_TIMEOUT_STYLE=" /etc/default/grub && sed -i "s|^GRUB_TIMEOUT_STYLE=.*|GRUB_TIMEOUT_STYLE=menu|" /etc/default/grub || echo "GRUB_TIMEOUT_STYLE=menu" >> /etc/default/grub'
    - curtin in-target -- update-grub

    # =========================================================================
    # 2. MODPROBE — amdgpu only
    # =========================================================================
    - |
      cat > /target/etc/modprobe.d/amdgpu.conf << 'MODPROBE_AMDGPU'
      # Variant E: AMD + firmware fix (Sway/pixman)
      options amdgpu sg_display=0
      options amdgpu ppfeaturemask=0xfffd7fff
      options amdgpu dcdebugmask=0x18
      options amdgpu gpu_recovery=1
      options amdgpu lockup_timeout=30000
      options amdgpu seamless=1
      options amdgpu dc=1
      options amdgpu audio=1
      MODPROBE_AMDGPU

    - |
      cat > /target/etc/modprobe.d/blacklist-nouveau.conf << 'BLACKLIST_NOUVEAU'
      blacklist nouveau
      blacklist nova_core
      blacklist lbm-nouveau
      alias nouveau off
      alias lbm-nouveau off
      BLACKLIST_NOUVEAU

    # =========================================================================
    # 3. INITRAMFS — AMD only
    # =========================================================================
    - |
      cat > /target/etc/initramfs-tools/modules << 'INITRAMFS_MODULES'
      # Variant E: AMD-only (no NVIDIA in initramfs)
      amdgpu
      INITRAMFS_MODULES

    - |
      cat > /target/etc/modules-load.d/gpu.conf << 'MODULES_LOAD'
      amdgpu
      MODULES_LOAD

    # =========================================================================
    # 4. FIRMWARE UPDATE — kernel.org first, GitHub second, USB fallback
    # =========================================================================
    - |
      export PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      echo "=== Variant E: Firmware update ===" >> /tmp/autoinstall-hw.log
      FIRMWARE_FOUND=false
      FWDEST="/target/lib/firmware/amdgpu"
      FW_TAG="20250509"
      FW_BASE_URL="https://git.kernel.org/pub/scm/linux/kernel/git/firmware/linux-firmware.git/plain"
      BLOBS="dcn_3_1_5_dmcub psp_13_0_5_toc psp_13_0_5_ta psp_13_0_5_asd gc_10_3_6_ce gc_10_3_6_me gc_10_3_6_mec gc_10_3_6_mec2 gc_10_3_6_pfp gc_10_3_6_rlc sdma_5_2_6 vcn_3_1_2"

      # --- Try kernel.org first (primary) ---
      FWDIR="/tmp/firmware-download"
      mkdir -p "$FWDIR"
      echo "Downloading from kernel.org (tag $FW_TAG)..." >> /tmp/autoinstall-hw.log
      DL_OK=0
      for blob in $BLOBS; do
        if curl -sfL -o "$FWDIR/${blob}.bin" "${FW_BASE_URL}/amdgpu/${blob}.bin?h=${FW_TAG}" 2>>/tmp/autoinstall-hw.log \
           || wget -qO "$FWDIR/${blob}.bin" "${FW_BASE_URL}/amdgpu/${blob}.bin?h=${FW_TAG}" 2>>/tmp/autoinstall-hw.log; then
          DL_OK=$((DL_OK + 1))
        fi
      done
      [ "$DL_OK" -gt 0 ] && FIRMWARE_FOUND=true && echo "Source: kernel.org ($DL_OK blobs)" >> /tmp/autoinstall-hw.log

      # --- GitHub repo fallback ---
      if [ "$FIRMWARE_FOUND" = "false" ]; then
        echo "kernel.org failed — trying GitHub repo..." >> /tmp/autoinstall-hw.log
        GH_BASE_URL="https://raw.githubusercontent.com/abramjos/os_setup_amd5_rtx4090/master/firmware/amdgpu"
        DL_OK=0
        for blob in $BLOBS; do
          if curl -sfL -o "$FWDIR/${blob}.bin" "${GH_BASE_URL}/${blob}.bin" 2>>/tmp/autoinstall-hw.log \
             || wget -qO "$FWDIR/${blob}.bin" "${GH_BASE_URL}/${blob}.bin" 2>>/tmp/autoinstall-hw.log; then
            DL_OK=$((DL_OK + 1))
          fi
        done
        [ "$DL_OK" -gt 0 ] && FIRMWARE_FOUND=true && echo "Source: GitHub ($DL_OK blobs)" >> /tmp/autoinstall-hw.log
      fi

      # --- USB fallback (all known installer mount points) ---
      if [ "$FIRMWARE_FOUND" = "false" ]; then
        echo "Network failed — checking USB mount points..." >> /tmp/autoinstall-hw.log
        for usbpath in /cdrom /media/cdrom /mnt/usb /isodevice /run/live/medium /run/mnt/ubuntu-seed; do
          FWDIR="${usbpath}/UbuntuAutoInstall/firmware/amdgpu"
          echo "  USB check: $FWDIR" >> /tmp/autoinstall-hw.log
          if [ -d "$FWDIR" ] && ls "$FWDIR"/*.bin >/dev/null 2>&1; then
            echo "Source: USB ($FWDIR)" >> /tmp/autoinstall-hw.log
            FIRMWARE_FOUND=true
            break
          fi
        done
        [ "$FIRMWARE_FOUND" = "false" ] && echo "  USB: no firmware found at any path" >> /tmp/autoinstall-hw.log
      fi

      if [ "$FIRMWARE_FOUND" = "true" ]; then
        BACKUP="/target/var/log/ml-workstation-setup/firmware-backup"
        mkdir -p "$BACKUP"
        cp -a "$FWDEST"/dcn_3_1_5_dmcub.bin* "$BACKUP/" 2>/dev/null || true
        cp -a "$FWDEST"/psp_13_0_5_*.bin* "$BACKUP/" 2>/dev/null || true
        cp -a "$FWDEST"/gc_10_3_6_*.bin* "$BACKUP/" 2>/dev/null || true
        for blob in "$FWDIR"/*.bin; do
          [ -f "$blob" ] || continue
          bname=$(basename "$blob")
          cp "$blob" "$FWDEST/$bname"
          if zstd -f "$FWDEST/$bname" -o "$FWDEST/${bname}.zst" 2>>/tmp/autoinstall-hw.log; then
            rm -f "$FWDEST/$bname"
            echo "  Installed: $bname -> ${bname}.zst" >> /tmp/autoinstall-hw.log
          fi
        done
        ls -la "$FWDEST"/dcn_3_1_5_dmcub.bin* >> /tmp/autoinstall-hw.log 2>&1
      else
        echo "WARNING: No firmware available — pixman still safe without it" >> /tmp/autoinstall-hw.log
      fi

    # =========================================================================
    # 5. LightDM — launches Sway Wayland session
    # =========================================================================
    - curtin in-target -- bash -c 'echo "/usr/sbin/lightdm" > /etc/X11/default-display-manager'
    - curtin in-target -- dpkg-reconfigure -f noninteractive lightdm || true

    - mkdir -p /target/etc/lightdm/lightdm.conf.d
    - |
      cat > /target/etc/lightdm/lightdm.conf.d/50-sway-session.conf << 'LIGHTDM_SWAY'
      [Seat:*]
      user-session=sway-pixman
      greeter-session=lightdm-gtk-greeter
      LIGHTDM_SWAY

    # Remove GNOME/XFCE session files
    - curtin in-target -- bash -c 'rm -f /usr/share/xsessions/ubuntu.desktop 2>/dev/null || true'
    - curtin in-target -- bash -c 'rm -f /usr/share/xsessions/ubuntu-xorg.desktop 2>/dev/null || true'
    - curtin in-target -- bash -c 'dpkg-divert --rename --divert /usr/share/xsessions/gnome.desktop.disabled /usr/share/xsessions/gnome.desktop 2>/dev/null || true'
    - curtin in-target -- bash -c 'dpkg-divert --rename --divert /usr/share/xsessions/gnome-xorg.desktop.disabled /usr/share/xsessions/gnome-xorg.desktop 2>/dev/null || true'

    # =========================================================================
    # 6. Sway Wayland session file
    # =========================================================================
    - mkdir -p /target/usr/share/wayland-sessions
    - |
      cat > /target/usr/share/wayland-sessions/sway-pixman.desktop << 'SWAY_SESSION'
      [Desktop Entry]
      Name=Sway (pixman)
      Comment=Sway tiling Wayland compositor with CPU-only rendering
      Exec=env WLR_RENDERER=pixman sway
      Type=Application
      DesktopNames=sway
      SWAY_SESSION

    # =========================================================================
    # 7. Sway configuration
    #
    # i3-compatible config with sensible defaults:
    # - $mod = Super key (Win)
    # - $mod+Return = terminal (foot)
    # - $mod+d = app launcher (wofi)
    # - $mod+Shift+q = kill window
    # - hjkl/arrow focus/move
    # - Workspaces 1-4
    # - waybar status bar
    # - swayidle + swaylock
    # =========================================================================
    - mkdir -p /target/etc/sway

    - |
      cat > /target/etc/sway/config << 'SWAY_CONF'
      # Variant E: Sway config with pixman renderer
      # i3-compatible tiling Wayland compositor

      # Force pixman renderer (CPU-only, zero GFX ring)
      # Also set in session .desktop and environment.d
      set $mod Mod4
      set $term foot
      set $menu wofi --show drun

      # Force pixman via env (belt-and-suspenders)
      exec_always export WLR_RENDERER=pixman

      # Output config — auto-detect connected displays
      output * bg #1a1a2e solid_color

      # Input config
      input type:keyboard {
          xkb_layout us
          repeat_delay 300
          repeat_rate 50
      }

      # Key bindings
      bindsym $mod+Return exec $term
      bindsym $mod+d exec $menu
      bindsym $mod+Shift+q kill
      bindsym $mod+Shift+e exec swaymsg exit
      bindsym $mod+Shift+c reload

      # Focus
      bindsym $mod+h focus left
      bindsym $mod+j focus down
      bindsym $mod+k focus up
      bindsym $mod+l focus right
      bindsym $mod+Left focus left
      bindsym $mod+Down focus down
      bindsym $mod+Up focus up
      bindsym $mod+Right focus right

      # Move
      bindsym $mod+Shift+h move left
      bindsym $mod+Shift+j move down
      bindsym $mod+Shift+k move up
      bindsym $mod+Shift+l move right
      bindsym $mod+Shift+Left move left
      bindsym $mod+Shift+Down move down
      bindsym $mod+Shift+Up move up
      bindsym $mod+Shift+Right move right

      # Layout
      bindsym $mod+b splith
      bindsym $mod+v splitv
      bindsym $mod+s layout stacking
      bindsym $mod+w layout tabbed
      bindsym $mod+e layout toggle split
      bindsym $mod+f fullscreen
      bindsym $mod+Shift+space floating toggle
      bindsym $mod+space focus mode_toggle

      # Workspaces
      bindsym $mod+1 workspace number 1
      bindsym $mod+2 workspace number 2
      bindsym $mod+3 workspace number 3
      bindsym $mod+4 workspace number 4
      bindsym $mod+Shift+1 move container to workspace number 1
      bindsym $mod+Shift+2 move container to workspace number 2
      bindsym $mod+Shift+3 move container to workspace number 3
      bindsym $mod+Shift+4 move container to workspace number 4

      # Screenshots
      bindsym Print exec grim ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png
      bindsym $mod+Print exec grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png

      # Lock
      bindsym $mod+Escape exec swaylock -f -c 1a1a2e

      # File manager
      bindsym $mod+Shift+f exec thunar

      # Resize mode
      mode "resize" {
          bindsym h resize shrink width 10px
          bindsym j resize grow height 10px
          bindsym k resize shrink height 10px
          bindsym l resize grow width 10px
          bindsym Left resize shrink width 10px
          bindsym Down resize grow height 10px
          bindsym Up resize shrink height 10px
          bindsym Right resize grow width 10px
          bindsym Return mode "default"
          bindsym Escape mode "default"
      }
      bindsym $mod+r mode "resize"

      # Gaps
      gaps inner 4
      gaps outer 2

      # Window decorations
      default_border pixel 2
      default_floating_border pixel 2

      # Colors (dark theme)
      client.focused          #7c3aed #7c3aed #ffffff #7c3aed #7c3aed
      client.focused_inactive #1a1a2e #1a1a2e #888888 #1a1a2e #1a1a2e
      client.unfocused        #1a1a2e #1a1a2e #888888 #1a1a2e #1a1a2e

      # Status bar
      bar {
          swaybar_command waybar
      }

      # Autostart
      exec mako
      exec swayidle -w \
          timeout 300 'swaylock -f -c 1a1a2e' \
          timeout 900 'systemctl suspend' \
          before-sleep 'swaylock -f -c 1a1a2e'

      # XDG autostart
      exec dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=sway
      SWAY_CONF

    # =========================================================================
    # 8. Disable unwanted services
    # =========================================================================
    - curtin in-target -- systemctl disable gpu-manager.service || true
    - curtin in-target -- systemctl mask gpu-manager.service || true
    - curtin in-target -- systemctl disable gdm3.service || true
    - curtin in-target -- systemctl mask gdm3.service || true
    - curtin in-target -- systemctl disable switcheroo-control.service || true
    - curtin in-target -- systemctl mask switcheroo-control.service || true
    - curtin in-target -- systemctl disable gnome-initial-setup-first-login.service || true
    - curtin in-target -- systemctl mask gnome-initial-setup-first-login.service || true
    - curtin in-target -- bash -c 'systemctl --global disable org.gnome.Shell@x11.service 2>/dev/null || true'
    - curtin in-target -- bash -c 'systemctl --global disable org.gnome.Shell@wayland.service 2>/dev/null || true'

    # =========================================================================
    # 9. NO Xorg config needed — Sway is Wayland-native
    # =========================================================================

    # =========================================================================
    # 10. Environment
    # =========================================================================
    - mkdir -p /target/etc/environment.d
    - |
      cat > /target/etc/environment.d/50-gpu-display.conf << 'GPU_DISPLAY'
      WLR_RENDERER=pixman
      XDG_CURRENT_DESKTOP=sway
      DRI_PRIME=0
      GPU_DISPLAY

    - |
      cat > /target/etc/environment.d/90-mutter-kms.conf << 'MUTTER_KMS'
      MUTTER_DEBUG_KMS_THREAD_TYPE=user
      MUTTER_KMS

    # =========================================================================
    # 11. Diagnostics and verification
    # =========================================================================
    - mkdir -p /target/var/log/ml-workstation-setup

    - |
      for usbpath in /cdrom /media/cdrom /mnt/usb; do
        if [ -f "${usbpath}/UbuntuAutoInstall/script/diag-v2/diagnostic-enhanced.sh" ]; then
          cp "${usbpath}/UbuntuAutoInstall/script/diag-v2/diagnostic-enhanced.sh" /target/usr/local/bin/diagnostic-enhanced.sh
          chmod 0755 /target/usr/local/bin/diagnostic-enhanced.sh
          break
        fi
      done

    - |
      for usbpath in /cdrom /media/cdrom /mnt/usb; do
        if [ -f "${usbpath}/UbuntuAutoInstall/script/diag-v2/verify-boot.sh" ]; then
          cp "${usbpath}/UbuntuAutoInstall/script/diag-v2/verify-boot.sh" /target/usr/local/bin/verify-boot.sh
          chmod 0755 /target/usr/local/bin/verify-boot.sh
          break
        fi
      done

    - |
      cat > /target/etc/systemd/system/ml-boot-verify.service << 'BOOT_VERIFY'
      [Unit]
      Description=ML Workstation Boot Verification (Variant E: Sway+pixman)
      After=multi-user.target display-manager.service
      Wants=display-manager.service

      [Service]
      Type=oneshot
      ExecStartPre=/bin/sleep 30
      ExecStart=/usr/local/bin/verify-boot.sh --variant E --auto
      RemainAfterExit=yes
      StandardOutput=journal+console

      [Install]
      WantedBy=multi-user.target
      BOOT_VERIFY
    - curtin in-target -- systemctl enable ml-boot-verify.service

    - |
      cat > /target/etc/systemd/system/ml-diagnostic-capture.service << 'DIAG_CAPTURE'
      [Unit]
      Description=ML Workstation Diagnostic Capture
      After=multi-user.target display-manager.service

      [Service]
      Type=oneshot
      ExecStartPre=/bin/sleep 60
      ExecStart=/bin/bash -c 'if [ -x /usr/local/bin/diagnostic-enhanced.sh ]; then /usr/local/bin/diagnostic-enhanced.sh --auto; fi'
      RemainAfterExit=yes

      [Install]
      WantedBy=multi-user.target
      DIAG_CAPTURE
    - curtin in-target -- systemctl enable ml-diagnostic-capture.service

    # =========================================================================
    # 12. Services
    # =========================================================================
    - curtin in-target -- systemctl enable ssh.service
    - curtin in-target -- systemctl enable fstrim.timer
    - curtin in-target -- systemctl enable NetworkManager.service
    - curtin in-target -- systemctl disable cups.service || true
    - curtin in-target -- systemctl disable avahi-daemon.service || true
    - curtin in-target -- systemctl disable ModemManager.service || true
    - curtin in-target -- systemctl disable bluetooth.service || true
    - curtin in-target -- systemctl disable wpa_supplicant.service || true

    - curtin in-target -- usermod -aG video,render,sudo abraham

    # =========================================================================
    # 13. Hardware log from early-commands
    # =========================================================================
    - cp /tmp/autoinstall-hw.log /target/var/log/ml-workstation-setup/autoinstall-hw.log 2>/dev/null || true

    # =========================================================================
    # 14. INITRAMFS FIRMWARE HOOK — force-copy Raphael blobs into initramfs
    #
    # Without this hook, update-initramfs skips amdgpu firmware because the
    # driver isn't bound to hardware during chroot install. This was the root
    # cause of Variant B v2 failure (firmware on disk but not in initramfs).
    # =========================================================================
    - |
      cat > /target/etc/initramfs-tools/hooks/amdgpu-firmware << 'FWHOOK'
      #!/bin/sh
      PREREQ=""
      prereqs() { echo "$PREREQ"; }
      case "$1" in prereqs) prereqs; exit 0 ;; esac
      . /usr/share/initramfs-tools/hook-functions
      [ -z "${DESTDIR:-}" ] && exit 1
      HOSTDIR=""
      for candidate in /usr/lib/firmware/amdgpu /lib/firmware/amdgpu; do
          [ -d "$candidate" ] && HOSTDIR="$candidate" && break
      done
      [ -z "$HOSTDIR" ] && exit 0
      if [ -L "${DESTDIR}/lib/firmware" ]; then
          DESTDIRS="$(readlink -f "${DESTDIR}/lib/firmware")/amdgpu"
      else
          DESTDIRS="${DESTDIR}/lib/firmware/amdgpu ${DESTDIR}/usr/lib/firmware/amdgpu"
      fi
      COPIED=0
      for blob in dcn_3_1_5_dmcub psp_13_0_5_toc psp_13_0_5_ta psp_13_0_5_asd \
                  gc_10_3_6_ce gc_10_3_6_me gc_10_3_6_mec gc_10_3_6_mec2 \
                  gc_10_3_6_pfp gc_10_3_6_rlc sdma_5_2_6 vcn_3_1_2; do
          for ext in .bin.zst .bin; do
              [ -f "${HOSTDIR}/${blob}${ext}" ] || continue
              for dest in $DESTDIRS; do
                  mkdir -p "$dest"
                  cp "${HOSTDIR}/${blob}${ext}" "${dest}/${blob}${ext}"
              done
              COPIED=$((COPIED + 1))
              break
          done
      done
      echo "amdgpu-firmware hook: copied $COPIED Raphael blobs into initramfs"
      FWHOOK
      chmod +x /target/etc/initramfs-tools/hooks/amdgpu-firmware

    # =========================================================================
    # 15. REBUILD INITRAMFS — includes new firmware blobs. MUST BE LAST.
    # =========================================================================
    - curtin in-target -- update-initramfs -u -k all

    # Verify DMCUB blob landed in initramfs (logged to target fs for post-boot review)
    - curtin in-target -- bash -c 'lsinitramfs /boot/initrd.img-$(uname -r) 2>/dev/null | grep -q dcn_3_1_5_dmcub && echo "INITRAMFS_CHECK: DMCUB PRESENT" || echo "INITRAMFS_CHECK: DMCUB MISSING — firmware delivery failed"'

  user-data:
    runcmd:
      - systemctl disable cloud-init.service || true
      - systemctl disable cloud-config.service || true
      - systemctl disable cloud-final.service || true
    preserve_hostname: true
    manage_etc_hosts: true

  reporting:
    hook:
      type: print

  shutdown: poweroff
